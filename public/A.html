<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>極速圖片傳輸器 - 玉露寶庫</title>
    
    <!-- 引入主題設定 -->
    <script src="theme.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- React 核心 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            font-family: 'Microsoft JhengHei', sans-serif; 
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            color: #fff;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* 滾動條美化 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        ::-webkit-scrollbar-thumb { background: #3bc6e4; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #00f3ff; }

        /* 星空背景特效 */
        .space-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .star-field { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background-repeat: repeat; opacity: 0.5; animation: rotateSpace 240s linear infinite; }
        .stars-distant { background-image: radial-gradient(1px 1px at 10% 15%, #fff, transparent), radial-gradient(1px 1px at 30% 60%, #ddd, transparent); background-size: 300px 300px; }
        @keyframes rotateSpace { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 玻璃擬態卡片 */
        .glass-card {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        /* 拖曳區特效 */
        .drop-zone {
            border: 2px dashed rgba(0, 243, 255, 0.4);
            transition: all 0.3s ease;
            background: rgba(0, 0, 0, 0.3);
        }
        .drop-zone.active {
            border-color: #00ff9d;
            background: rgba(0, 255, 157, 0.1);
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.2);
        }
        
        .upload-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        .upload-item:hover {
            border-color: rgba(0, 243, 255, 0.5);
            background: rgba(255,255,255,0.08);
        }
    </style>
</head>
<body>
    <div class="space-container">
        <div class="star-field stars-distant"></div>
    </div>
    
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;
        const { createRoot } = ReactDOM;

        // --- Firebase Imports ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        // 🔥 僅保留 Storage (圖片儲存)，完全移除 Auth 與 Firestore，避免權限干擾
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        // 🔥 設定您的 Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAAo6on0f2QUbPaRfxpIEb2uvhKxDvPUvs",
            authDomain: "yulubox.firebaseapp.com",
            projectId: "yulubox",
            storageBucket: "yulubox.firebasestorage.app",
            messagingSenderId: "256466567852",
            appId: "1:256466567852:web:233b74668908ffcb9b9509"
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);

        // --- 極致壓縮引擎 (強制轉 WebP + 30% 畫質 + 最大寬高 1024px) ---
        const compressImage = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_SIZE = 1024; // 限制最大邊長
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_SIZE) {
                                height *= MAX_SIZE / width;
                                width = MAX_SIZE;
                            }
                        } else {
                            if (height > MAX_SIZE) {
                                width *= MAX_SIZE / height;
                                height = MAX_SIZE;
                            }
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        // 強制輸出為 WebP 格式，品質 0.3 (極致壓縮)
                        canvas.toBlob((blob) => {
                            if(!blob) return reject('壓縮失敗');
                            const originalName = file.name.split('.').slice(0, -1).join('.');
                            const compressedFile = new File([blob], `${originalName}.webp`, {
                                type: 'image/webp',
                                lastModified: Date.now()
                            });
                            resolve(compressedFile);
                        }, 'image/webp', 0.3);
                    };
                };
                reader.onerror = (error) => reject(error);
            });
        };

        function App() {
            const [isDragging, setIsDragging] = useState(false);
            
            // 上傳列隊與歷史紀錄 (存在本地端，免資料庫)
            const [uploads, setUploads] = useState([]); 
            const [history, setHistory] = useState([]);
            
            const [toastMsg, setToastMsg] = useState('');
            const fileInputRef = useRef(null);

            // 讀取本地歷史紀錄
            useEffect(() => {
                const localHistory = JSON.parse(localStorage.getItem('yulubox_img_history') || '[]');
                setHistory(localHistory);
            }, []);

            // 儲存至本地歷史紀錄
            const saveToHistory = (newItem) => {
                setHistory(prev => {
                    const newHistory = [newItem, ...prev];
                    localStorage.setItem('yulubox_img_history', JSON.stringify(newHistory));
                    return newHistory;
                });
            };

            // --- 拖曳與選擇檔案邏輯 ---
            const onDragOver = (e) => { e.preventDefault(); setIsDragging(true); };
            const onDragLeave = (e) => { e.preventDefault(); setIsDragging(false); };
            const onDrop = (e) => {
                e.preventDefault();
                setIsDragging(false);
                if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                    handleFiles(Array.from(e.dataTransfer.files));
                }
            };
            const onFileSelect = (e) => {
                if (e.target.files && e.target.files.length > 0) {
                    handleFiles(Array.from(e.target.files));
                }
            };

            // --- 核心上傳與壓縮邏輯 ---
            const handleFiles = async (files) => {
                const imageFiles = files.filter(file => file.type.startsWith('image/'));
                if (imageFiles.length === 0) {
                    showToast("⚠️ 請選擇圖片檔案");
                    return;
                }

                // 建立任務列隊
                const newTasks = imageFiles.map(file => ({
                    id: Math.random().toString(36).substr(2, 9),
                    originalFile: file,
                    name: file.name,
                    progress: 0,
                    url: null,
                    status: 'compressing' // 新增壓縮狀態
                }));

                setUploads(prev => [...newTasks, ...prev]);

                // 逐一壓縮並上傳
                for (let task of newTasks) {
                    try {
                        const compressedFile = await compressImage(task.originalFile);
                        task.file = compressedFile;
                        
                        setUploads(prev => prev.map(item => item.id === task.id ? { ...item, status: 'uploading' } : item));
                        startUpload(task);
                    } catch (error) {
                        console.error("壓縮失敗:", error);
                        setUploads(prev => prev.map(item => item.id === task.id ? { ...item, status: 'error' } : item));
                    }
                }
            };

            const startUpload = (uploadObj) => {
                // 產生安全的儲存路徑
                const safeName = uploadObj.name.replace(/[^a-zA-Z0-9.]/g, '_').split('.')[0] + '.webp';
                const filePath = `public_uploads/${Date.now()}_${safeName}`;
                const storageRef = ref(storage, filePath);
                
                const uploadTask = uploadBytesResumable(storageRef, uploadObj.file);

                uploadTask.on('state_changed', 
                    (snapshot) => {
                        const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                        setUploads(prev => prev.map(item => 
                            item.id === uploadObj.id ? { ...item, progress } : item
                        ));
                    }, 
                    (error) => {
                        console.error("上傳失敗:", error);
                        setUploads(prev => prev.map(item => item.id === uploadObj.id ? { ...item, status: 'error' } : item));
                        showToast("❌ 上傳失敗，請檢查 Storage 規則");
                    }, 
                    async () => {
                        // 上傳成功
                        const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);
                        setUploads(prev => prev.map(item => 
                            item.id === uploadObj.id ? { ...item, progress: 100, status: 'success', url: downloadURL } : item
                        ));

                        // 寫入本地圖庫歷史
                        saveToHistory({
                            id: uploadObj.id,
                            name: safeName,
                            url: downloadURL,
                            createdAt: new Date().toISOString()
                        });
                    }
                );
            };

            // --- 複製與 UI 功能 ---
            const copyToClipboard = (text, msg) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    showToast(msg || "✅ 已複製到剪貼簿！");
                } catch (err) {
                    showToast("❌ 複製失敗");
                }
                document.body.removeChild(textArea);
            };

            const showToast = (msg) => {
                setToastMsg(msg);
                setTimeout(() => setToastMsg(''), 3000);
            };

            const clearCompleted = () => {
                setUploads(prev => prev.filter(item => item.status === 'uploading' || item.status === 'compressing'));
            };

            const clearHistory = () => {
                if(confirm("確定要清空這台裝置的歷史圖庫嗎？(圖片不會從雲端刪除)")) {
                    localStorage.removeItem('yulubox_img_history');
                    setHistory([]);
                }
            };

            return (
                <div className="w-full max-w-5xl mx-auto px-4 py-8 md:py-12 relative z-10">
                    
                    {/* Header */}
                    <div className="w-full flex justify-between items-center mb-10">
                        <a href="vip_area.html" className="text-[#00f3ff] hover:text-white transition-colors font-bold flex items-center gap-2">
                            <i className="fa-solid fa-chevron-left"></i> 返回星員區
                        </a>
                        <div className="text-right">
                            <span className="bg-[rgba(255,255,255,0.1)] text-[#00ff9d] px-3 py-1 rounded-full text-xs font-bold">
                                <i className="fa-solid fa-bolt"></i> 免登入極速版
                            </span>
                        </div>
                    </div>

                    <div className="text-center mb-10">
                        <h1 className="text-4xl md:text-5xl font-black mb-3 text-transparent bg-clip-text bg-gradient-to-r from-[#00f3ff] to-[#bc13fe] drop-shadow-[0_0_15px_rgba(0,243,255,0.4)]">
                            星際圖片傳輸器
                        </h1>
                        <p className="text-gray-400 tracking-widest text-sm md:text-base">EXTREME COMPRESSION UPLOADER</p>
                    </div>

                    {/* 拖曳上傳區 */}
                    <div 
                        className={`glass-card rounded-3xl p-10 mb-8 text-center cursor-pointer drop-zone ${isDragging ? 'active' : ''}`}
                        onDragOver={onDragOver}
                        onDragLeave={onDragLeave}
                        onDrop={onDrop}
                        onClick={() => fileInputRef.current.click()}
                    >
                        <input 
                            type="file" 
                            multiple 
                            accept="image/*" 
                            className="hidden" 
                            ref={fileInputRef}
                            onChange={onFileSelect}
                        />
                        <div className="w-24 h-24 mx-auto bg-[rgba(0,243,255,0.1)] rounded-full flex items-center justify-center mb-6">
                            <i className="fa-solid fa-cloud-arrow-up text-5xl text-[#00f3ff]"></i>
                        </div>
                        <h3 className="text-2xl font-bold text-white mb-2">點擊或拖曳圖片至此處</h3>
                        <p className="text-gray-400 text-sm">支援批量上傳 • 自動極致壓縮 WebP • 不限次數</p>
                    </div>

                    {/* 吐司提示 */}
                    <div className={`toast ${toastMsg ? 'show' : ''}`}>{toastMsg}</div>

                    {/* 目前上傳進度 */}
                    {uploads.length > 0 && (
                        <div className="mb-10 animate-in fade-in slide-in-from-bottom-4">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="text-xl font-bold text-[#00ff9d]"><i className="fa-solid fa-satellite-dish"></i> 傳輸狀態</h3>
                                {uploads.some(u => u.status !== 'uploading' && u.status !== 'compressing') && (
                                    <button onClick={clearCompleted} className="text-xs text-gray-400 hover:text-white transition-colors bg-[rgba(255,255,255,0.1)] px-3 py-1 rounded-full">
                                        隱藏已完成
                                    </button>
                                )}
                            </div>
                            <div className="space-y-3">
                                {uploads.map(item => (
                                    <div key={item.id} className="upload-item p-4 rounded-xl flex flex-col md:flex-row gap-4 items-center">
                                        <div className="w-16 h-16 rounded-lg bg-black/50 flex-shrink-0 flex items-center justify-center overflow-hidden border border-gray-700">
                                            {item.url ? 
                                                <img src={item.url} alt="preview" className="w-full h-full object-cover" /> : 
                                                (item.status === 'compressing' ? <i className="fa-solid fa-compress text-2xl text-[#00f3ff] animate-pulse"></i> : <i className="fa-regular fa-image text-2xl text-gray-500"></i>)
                                            }
                                        </div>
                                        
                                        <div className="flex-1 w-full">
                                            <div className="flex justify-between mb-1">
                                                <span className="font-bold text-gray-200 truncate pr-4 max-w-[200px] md:max-w-[400px]">{item.name}</span>
                                                <span className="text-xs font-bold text-[#00f3ff]">
                                                    {item.status === 'success' ? '完成' : (item.status === 'error' ? '失敗' : (item.status === 'compressing' ? '極致壓縮中...' : `${Math.round(item.progress)}%`))}
                                                </span>
                                            </div>
                                            
                                            {item.status === 'uploading' && (
                                                <div className="w-full h-2 bg-gray-800 rounded-full overflow-hidden">
                                                    <div className="h-full bg-gradient-to-r from-[#00f3ff] to-[#bc13fe] transition-all duration-300" style={{width: `${item.progress}%`}}></div>
                                                </div>
                                            )}

                                            {item.status === 'success' && (
                                                <div className="mt-2 flex flex-wrap gap-2">
                                                    <input type="text" readOnly value={item.url} className="flex-1 min-w-[200px] bg-black/40 border border-gray-700 rounded-md px-3 py-1 text-xs text-gray-300 outline-none" />
                                                    <button onClick={() => copyToClipboard(item.url, "✅ 已複製網址！")} className="bg-[#00f3ff]/20 text-[#00f3ff] hover:bg-[#00f3ff] hover:text-black px-3 py-1 rounded-md text-xs font-bold transition-colors">
                                                        <i className="fa-solid fa-link"></i> 複製網址
                                                    </button>
                                                    <button onClick={() => copyToClipboard(`<img src="${item.url}" alt="${item.name}">`, "✅ 已複製 HTML 標籤！")} className="bg-[#bc13fe]/20 text-[#bc13fe] hover:bg-[#bc13fe] hover:text-white px-3 py-1 rounded-md text-xs font-bold transition-colors">
                                                        <i className="fa-solid fa-code"></i> 複製 HTML
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* 歷史圖庫區 (本機儲存) */}
                    {history.length > 0 && (
                        <div className="glass-card rounded-3xl p-6 md:p-8">
                            <div className="flex justify-between items-center mb-6 border-b border-gray-700 pb-4">
                                <h3 className="text-xl font-bold text-white">
                                    <i className="fa-solid fa-images text-[#FFD700]"></i> 本機圖庫紀錄
                                </h3>
                                <button onClick={clearHistory} className="text-xs text-red-400 hover:text-red-300 bg-red-500/10 px-3 py-1 rounded-full transition-colors">
                                    <i className="fa-solid fa-trash"></i> 清空紀錄
                                </button>
                            </div>
                            
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                                {history.map(item => (
                                    <div key={item.id} className="group relative rounded-xl overflow-hidden bg-black/50 aspect-square border border-gray-800 hover:border-[#00f3ff] transition-all">
                                        <img src={item.url} alt={item.name} className="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity" loading="lazy" />
                                        
                                        <div className="absolute inset-0 bg-black/70 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-center items-center gap-3 p-4">
                                            <p className="text-xs text-white text-center truncate w-full">{item.name}</p>
                                            <button onClick={() => copyToClipboard(item.url, "✅ 已複製網址！")} className="w-full bg-[#00f3ff] text-black py-2 rounded-lg text-sm font-bold hover:bg-white transition-colors">
                                                複製網址
                                            </button>
                                            <button onClick={() => copyToClipboard(`<img src="${item.url}" alt="image">`, "✅ 已複製 HTML！")} className="w-full bg-white/20 text-white py-2 rounded-lg text-sm font-bold hover:bg-white/40 transition-colors">
                                                複製 HTML
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
