<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>記事本 - 玉露寶庫</title>
    
    <link rel="icon" type="image/png" href="APP圖示.png">
    <link rel="apple-touch-icon" href="APP圖示.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React 核心 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            font-family: 'Microsoft JhengHei', sans-serif; 
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            color: #fff; min-height: 100vh; margin: 0; padding: 0; overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        ::-webkit-scrollbar { display: none; }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .cyber-input {
            width: 100%; padding: 12px 16px; background: rgba(0,0,0,0.5); border: 1px solid #475569;
            color: #fff; border-radius: 12px; box-sizing: border-box; transition: 0.3s;
        }
        .cyber-input:focus { border-color: #00f3ff; outline: none; box-shadow: 0 0 15px rgba(0,243,255,0.2); background: rgba(0,0,0,0.7); }
        
        /* 背景星空 (開啟 GPU 加速) */
        .space-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .star-field { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background-repeat: repeat; opacity: 0.5; animation: rotateSpace 240s linear infinite; will-change: transform; transform: translateZ(0); }
        .stars-distant { background-image: radial-gradient(1px 1px at 10% 15%, #fff, transparent); background-size: 300px 300px; }
        @keyframes rotateSpace { from { transform: rotate(0deg) translateZ(0); } to { transform: rotate(360deg) translateZ(0); } }

        /* 自訂核取方塊 */
        .custom-checkbox {
            appearance: none; background-color: rgba(0,0,0,0.5);
            margin: 0; width: 28px; height: 28px; border: 2px solid rgba(255,255,255,0.3);
            border-radius: 8px; display: grid; place-content: center; cursor: pointer;
            transition: 0.2s; flex-shrink: 0;
        }
        .custom-checkbox::before {
            content: ""; width: 14px; height: 14px; transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em #00ff9d; background-color: #00ff9d;
            transform-origin: center; clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }
        .custom-checkbox:checked { border-color: #00ff9d; background: rgba(0,255,157,0.1); }
        .custom-checkbox:checked::before { transform: scale(1); }

        .task-completed { opacity: 0.6; text-decoration: line-through; color: #94a3b8; transition: 0.3s; }
        .task-card { transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s; border: 1px solid rgba(255,255,255,0.05); }
        .task-card:hover { transform: translateY(-2px); border-color: rgba(0, 243, 255, 0.4); box-shadow: 0 5px 15px rgba(0,243,255,0.1); }

        /* 浮動提示 Toast 動畫 */
        .toast-enter { animation: toastIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes toastIn { from { transform: translate(-50%, 100px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
    </style>
</head>
<body>
    <div class="space-container"><div class="star-field stars-distant"></div></div>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useMemo } = React;

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, getDoc, query, where, orderBy, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 🔥 動態配置，支援本地 Sandbox 環境
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyAAo6on0f2QUbPaRfxpIEb2uvhKxDvPUvs",
            authDomain: "yulubox.firebaseapp.com",
            projectId: "yulubox",
            storageBucket: "yulubox.firebasestorage.app",
            messagingSenderId: "256466567852",
            appId: "1:256466567852:web:233b74668908ffcb9b9509"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 輔助：計算距離今天的天數
        const getDaysLeft = (dateString) => {
            if (!dateString) return null;
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const deadline = new Date(dateString);
            deadline.setHours(0, 0, 0, 0);
            const diffTime = deadline - today;
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        };

        function App() {
            const [user, setUser] = useState(null);
            const [todos, setTodos] = useState([]);
            const [loading, setLoading] = useState(true);
            const [filter, setFilter] = useState('pending'); // pending, completed, all
            
            const [authError, setAuthError] = useState(false);
            const [ruleError, setRuleError] = useState(false); // 🔥 新增：攔截權限不足錯誤
            const [toast, setToast] = useState(null);
            const [hasLine, setHasLine] = useState(false); // 🔥 新增：判斷是否有綁定 LINE
            
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState({
                title: '', deadline: '', note: '', priority: 'medium', remind: false
            });

            const showToast = (msg, isError = false) => {
                setToast({ msg, isError });
                setTimeout(() => setToast(null), 3000);
            };

            // 1. 初始化與讀取資料 (加入 Sandbox 驗證相容性)
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch(e) { console.error("Auth Init Error:", e); }
                };
                initAuth();

                const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
                    if (currentUser && !currentUser.isAnonymous) {
                        setUser(currentUser);
                        
                        let lineId = localStorage.getItem("lineUserId");
                        try {
                            const userDoc = await getDoc(doc(db, "users", currentUser.uid));
                            if (userDoc.exists() && userDoc.data().lineUserId) {
                                lineId = userDoc.data().lineUserId;
                            }
                        } catch (e) {}

                        if (lineId) setHasLine(true); // 🔥 設定 LINE 綁定狀態
                        else setHasLine(false);

                        const searchIds = [currentUser.uid];
                        if (lineId && !searchIds.includes(lineId)) searchIds.push(lineId);

                        fetchTodos(searchIds);
                        setAuthError(false);
                    } else {
                        setAuthError(true);
                        setLoading(false);
                    }
                });
                return () => unsubscribe();
            }, []);

            const fetchTodos = async (searchIds) => {
                setLoading(true);
                setRuleError(false);
                try {
                    const q = query(collection(db, "todos"), where("userId", "in", searchIds));
                    const snap = await getDocs(q);
                    let data = [];
                    const now = new Date();
                    
                    snap.forEach(doc => {
                        const task = { id: doc.id, ...doc.data() };
                        if (task.status === 'completed' && task.completedAt) {
                            const completedDate = new Date(task.completedAt.seconds * 1000);
                            const daysPassed = (now - completedDate) / (1000 * 60 * 60 * 24);
                            if (daysPassed <= 30) data.push(task);
                        } else {
                            data.push(task);
                        }
                    });

                    data.sort((a, b) => {
                        if (a.status === 'pending' && b.status === 'pending') {
                            if (!a.deadline) return 1; if (!b.deadline) return -1;
                            return new Date(a.deadline) - new Date(b.deadline);
                        }
                        if (a.status === 'completed' && b.status === 'completed') {
                            return (b.completedAt?.seconds || 0) - (a.completedAt?.seconds || 0);
                        }
                        return a.status === 'pending' ? -1 : 1;
                    });

                    setTodos(data);
                } catch (e) {
                    // 🔥 隱藏 console.error，避免 Sandbox 擷取錯誤後彈出遮罩擋住 UI
                    if (e.code === 'permission-denied' || (e.message && e.message.includes('permission'))) {
                        setRuleError(true);
                    } else {
                        console.error("資料庫連線異常:", e);
                        showToast("⚠️ 系統提示：資料庫連線異常", true);
                    }
                }
                setLoading(false);
            };

            // 2. 表單操作
            const openAddModal = () => {
                setFormData({ title: '', deadline: '', note: '', priority: 'medium', remind: false });
                setEditingId(null);
                setIsModalOpen(true);
            };

            const openEditModal = (task) => {
                setFormData({
                    title: task.title, deadline: task.deadline || '', note: task.note || '',
                    priority: task.priority || 'medium', remind: task.remind || false
                });
                setEditingId(task.id);
                setIsModalOpen(true);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!formData.title.trim()) {
                    showToast("⚠️ 請輸入任務名稱", true);
                    return;
                }
                
                setLoading(true);
                try {
                    if (editingId) {
                        await updateDoc(doc(db, "todos", editingId), { ...formData });
                        setTodos(prev => prev.map(t => t.id === editingId ? { ...t, ...formData } : t));
                        showToast("✅ 修改成功！");
                    } else {
                        const newTask = {
                            ...formData,
                            userId: user.uid,
                            status: 'pending',
                            createdAt: serverTimestamp()
                        };
                        const docRef = await addDoc(collection(db, "todos"), newTask);
                        setTodos(prev => [{ id: docRef.id, ...newTask }, ...prev]);
                        showToast("✅ 新增成功！");
                    }
                    setIsModalOpen(false);
                } catch (err) {
                    showToast("❌ 儲存失敗：" + err.message, true);
                }
                setLoading(false);
            };

            // 3. 狀態切換與刪除
            const toggleComplete = async (task) => {
                const newStatus = task.status === 'completed' ? 'pending' : 'completed';
                const payload = { 
                    status: newStatus,
                    completedAt: newStatus === 'completed' ? serverTimestamp() : null
                };
                
                setTodos(prev => prev.map(t => t.id === task.id ? { ...t, status: newStatus } : t));
                
                try {
                    await updateDoc(doc(db, "todos", task.id), payload);
                    if (newStatus === 'completed') showToast("🎉 任務完成！太棒了！");
                } catch (err) {
                    setTodos(prev => prev.map(t => t.id === task.id ? { ...t, status: task.status } : t));
                    showToast("❌ 更新狀態失敗", true);
                }
            };

            const deleteTask = async (id) => {
                if (!confirm("確定要刪除這筆任務嗎？")) return;
                try {
                    await deleteDoc(doc(db, "todos", id));
                    setTodos(prev => prev.filter(t => t.id !== id));
                    showToast("🗑️ 任務已刪除");
                } catch (err) {
                    showToast("❌ 刪除失敗", true);
                }
            };

            // 4. 衍生數據計算
            const filteredTodos = useMemo(() => {
                if (filter === 'all') return todos;
                return todos.filter(t => t.status === filter);
            }, [todos, filter]);

            const progress = useMemo(() => {
                const total = todos.length;
                if (total === 0) return 0;
                const completed = todos.filter(t => t.status === 'completed').length;
                return Math.round((completed / total) * 100);
            }, [todos]);

            // === 🔥 UI：資料庫規則權限不足提示 ===
            if (ruleError) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 text-center z-10 relative">
                        <div className="glass-panel p-6 md:p-8 rounded-3xl max-w-md w-full border border-[#ff4757]/50 shadow-[0_0_30px_rgba(255,71,87,0.3)]">
                            <i className="fa-solid fa-database text-5xl text-[#ff4757] mb-4"></i>
                            <h2 className="text-2xl font-bold text-white mb-2">資料庫權限不足</h2>
                            <p className="text-gray-400 mb-4 text-sm text-left leading-relaxed">
                                系統偵測到您尚未開放 Firebase 中的 <strong className="text-white">todos</strong> (記事本) 集合權限，因此被防火牆阻擋。<br/><br/>
                                請至 <span className="text-[#00f3ff]">Firebase 後台</span> ➡️ <span className="text-[#00f3ff]">Firestore Database</span> ➡️ <span className="text-[#00f3ff]">Rules</span>，在裡面加入以下代碼：
                            </p>
                            <div className="bg-black/80 p-4 rounded-xl text-left font-mono text-xs text-[#00ff9d] mb-6 overflow-x-auto whitespace-pre border border-white/10">
{`match /todos/{document} {
  allow read, write: if request.auth != null;
}`}
                            </div>
                            <button onClick={() => window.location.reload()} className="block w-full py-3 rounded-xl bg-gradient-to-r from-[#ff4757] to-[#ff6b81] text-white font-bold hover:shadow-[0_0_15px_rgba(255,71,87,0.5)] transition-all">
                                <i className="fa-solid fa-rotate-right"></i> 設定完成後點此重整
                            </button>
                        </div>
                    </div>
                );
            }

            // === UI：權限錯誤 (未登入) ===
            if (authError) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 text-center z-10 relative">
                        <div className="glass-panel p-8 rounded-3xl max-w-sm w-full">
                            <i className="fa-solid fa-user-lock text-5xl text-[#ff4757] mb-4"></i>
                            <h2 className="text-2xl font-bold text-white mb-2">權限驗證失敗</h2>
                            <p className="text-gray-400 mb-6">您需要登入會員才能檢視與管理記事本。</p>
                            <a href="login.html" className="block w-full py-3 rounded-xl bg-gradient-to-r from-[#00f3ff] to-[#bc13fe] text-white font-bold hover:shadow-[0_0_15px_rgba(0,243,255,0.5)] transition-all">
                                前往登入畫面
                            </a>
                        </div>
                    </div>
                );
            }

            // === UI：載入中 ===
            if (loading && todos.length === 0) {
                return <div className="min-h-screen flex flex-col items-center justify-center text-[#00f3ff]"><i className="fa-solid fa-circle-notch fa-spin text-5xl mb-4"></i><p className="font-bold tracking-widest">系統資料核對中...</p></div>;
            }

            return (
                <div className="w-full max-w-3xl mx-auto px-4 py-8 pb-20 relative z-10">
                    
                    {/* Toast 提示元件 */}
                    {toast && (
                        <div className={`fixed bottom-[100px] left-1/2 -translate-x-1/2 px-6 py-3 rounded-full font-bold flex items-center gap-2 z-[9999] shadow-lg toast-enter ${toast.isError ? 'bg-[#ff4757] text-white' : 'bg-[#00ff9d] text-black'}`}>
                            <i className={`fa-solid ${toast.isError ? 'fa-circle-exclamation' : 'fa-circle-check'}`}></i> {toast.msg}
                        </div>
                    )}

                    {/* Header */}
                    <div className="flex justify-between items-center mb-8">
                        <a href="vip_area.html" className="text-[#00f3ff] hover:text-white transition-colors font-bold flex items-center gap-2">
                            <i className="fa-solid fa-chevron-left"></i> 返回星員區
                        </a>
                        <button onClick={openAddModal} className="bg-gradient-to-r from-[#00f3ff] to-[#bc13fe] px-5 py-2.5 rounded-full text-sm font-bold text-white shadow-[0_0_15px_rgba(0,243,255,0.4)] hover:scale-105 transition-transform">
                            <i className="fa-solid fa-plus"></i> 新增記事
                        </button>
                    </div>

                    <div className="text-center mb-8">
                        <h1 className="text-3xl md:text-4xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-white to-[#00f3ff] drop-shadow-[0_0_10px_rgba(0,243,255,0.5)]">
                            記事本
                        </h1>
                        <p className="text-gray-400 text-sm">Task & Notepad System</p>
                    </div>

                    {/* 進度條 */}
                    <div className="glass-panel p-6 rounded-3xl mb-8">
                        <div className="flex justify-between items-end mb-3">
                            <div>
                                <h3 className="text-lg font-bold text-white">任務達成率</h3>
                                <p className="text-xs text-gray-400 mt-1">完成的任務將在 30 天後自動銷毀</p>
                            </div>
                            <span className="text-3xl font-black text-[#00ff9d]">{progress}%</span>
                        </div>
                        <div className="w-full h-3 bg-black/50 rounded-full overflow-hidden">
                            <div className="h-full bg-gradient-to-r from-[#00f3ff] to-[#00ff9d] transition-all duration-500" style={{width: `${progress}%`}}></div>
                        </div>
                    </div>

                    {/* 篩選器 */}
                    <div className="flex gap-2 mb-6 bg-black/40 p-1.5 rounded-2xl border border-white/10 w-fit mx-auto">
                        <button onClick={() => setFilter('pending')} className={`px-6 py-2 rounded-xl text-sm font-bold transition-colors ${filter==='pending' ? 'bg-[#00f3ff] text-black shadow-md' : 'text-gray-400 hover:text-white'}`}>待辦事項</button>
                        <button onClick={() => setFilter('completed')} className={`px-6 py-2 rounded-xl text-sm font-bold transition-colors ${filter==='completed' ? 'bg-gray-700 text-white shadow-md' : 'text-gray-400 hover:text-white'}`}>已完成</button>
                        <button onClick={() => setFilter('all')} className={`px-6 py-2 rounded-xl text-sm font-bold transition-colors ${filter==='all' ? 'bg-white/20 text-white shadow-md' : 'text-gray-400 hover:text-white'}`}>全部顯示</button>
                    </div>

                    {/* 任務列表 */}
                    <div className="space-y-4">
                        {filteredTodos.length === 0 ? (
                            <div className="text-center py-16 text-gray-500 flex flex-col items-center">
                                <i className="fa-solid fa-clipboard-check text-5xl mb-4 opacity-50"></i>
                                <p>這個區域目前空空如也</p>
                            </div>
                        ) : (
                            filteredTodos.map(task => {
                                const daysLeft = getDaysLeft(task.deadline);
                                const isCompleted = task.status === 'completed';
                                
                                // 優先級顏色
                                let prioColor = 'text-green-400 border-green-400/30 bg-green-400/10';
                                if(task.priority === 'high') prioColor = 'text-red-400 border-red-400/30 bg-red-400/10';
                                else if(task.priority === 'medium') prioColor = 'text-yellow-400 border-yellow-400/30 bg-yellow-400/10';

                                // 倒數標籤
                                let deadlineTag = null;
                                if (!isCompleted && task.deadline) {
                                    if (daysLeft < 0) deadlineTag = <span className="text-xs font-bold text-[#ff4757] bg-[#ff4757]/10 px-2 py-1 rounded-md"><i className="fa-solid fa-fire"></i> 已逾期</span>;
                                    else if (daysLeft === 0) deadlineTag = <span className="text-xs font-bold text-[#FFD700] bg-[#FFD700]/10 px-2 py-1 rounded-md"><i className="fa-solid fa-clock"></i> 今天到期</span>;
                                    else if (daysLeft === 1) deadlineTag = <span className="text-xs font-bold text-orange-400 bg-orange-400/10 px-2 py-1 rounded-md">明天到期</span>;
                                    else deadlineTag = <span className="text-xs text-gray-400 bg-white/5 px-2 py-1 rounded-md">剩 {daysLeft} 天</span>;
                                }

                                return (
                                    <div key={task.id} className={`task-card bg-black/40 rounded-2xl p-4 md:p-5 flex items-start gap-4 ${isCompleted ? 'opacity-70' : ''}`}>
                                        <div className="pt-1">
                                            <input type="checkbox" className="custom-checkbox" checked={isCompleted} onChange={() => toggleComplete(task)} />
                                        </div>
                                        <div className={`flex-1 min-w-0 ${isCompleted ? 'task-completed' : ''}`}>
                                            <div className="flex flex-wrap items-center gap-2 mb-1.5">
                                                <h3 className="text-lg font-bold text-white break-all">{task.title}</h3>
                                                {task.priority && !isCompleted && <span className={`text-[10px] px-2 py-0.5 rounded-full border ${prioColor} font-bold uppercase`}>{task.priority}</span>}
                                                {task.remind && !isCompleted && <span className="text-[#00f3ff] text-xs" title="已開啟提醒"><i className="fa-solid fa-bell"></i></span>}
                                            </div>
                                            
                                            {task.note && <p className="text-sm text-gray-400 mb-3 break-all whitespace-pre-wrap"><i className="fa-solid fa-align-left mr-1"></i> {task.note}</p>}
                                            
                                            <div className="flex flex-wrap items-center justify-between gap-3 mt-2 pt-3 border-t border-white/5">
                                                <div className="flex items-center gap-3">
                                                    {task.deadline && (
                                                        <span className="text-xs text-gray-500 font-mono"><i className="fa-regular fa-calendar mr-1"></i> {task.deadline}</span>
                                                    )}
                                                    {deadlineTag}
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => openEditModal(task)} className="w-8 h-8 rounded-lg bg-blue-500/20 text-blue-400 flex items-center justify-center hover:bg-blue-500 hover:text-white transition-colors"><i className="fa-solid fa-pen text-xs"></i></button>
                                                    <button onClick={() => deleteTask(task.id)} className="w-8 h-8 rounded-lg bg-red-500/20 text-red-400 flex items-center justify-center hover:bg-red-500 hover:text-white transition-colors"><i className="fa-solid fa-trash text-xs"></i></button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })
                        )}
                    </div>

                    {/* 新增/編輯 Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="glass-panel rounded-3xl p-6 md:p-8 w-full max-w-md animate-in zoom-in-95 border border-[#00f3ff]/50 shadow-[0_0_40px_rgba(0,243,255,0.2)]">
                                <h3 className="text-2xl font-bold text-[#00f3ff] mb-6 flex items-center gap-2">
                                    <i className="fa-solid fa-clipboard-list"></i> {editingId ? '修改記事' : '新增記事'}
                                </h3>
                                
                                <form onSubmit={handleSubmit} className="space-y-4">
                                    <div>
                                        <label className="text-xs text-gray-400 font-bold mb-1 block">事項名稱 <span className="text-red-400">*</span></label>
                                        <input type="text" required value={formData.title} onChange={e=>setFormData({...formData, title: e.target.value})} className="cyber-input font-bold" placeholder="例如：機車保養" />
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="text-xs text-gray-400 font-bold mb-1 block">截止日期 (選填)</label>
                                            <input type="date" value={formData.deadline} onChange={e=>setFormData({...formData, deadline: e.target.value})} className="cyber-input text-sm" />
                                        </div>
                                        <div>
                                            <label className="text-xs text-gray-400 font-bold mb-1 block">優先級</label>
                                            <select value={formData.priority} onChange={e=>setFormData({...formData, priority: e.target.value})} className="cyber-input text-sm appearance-none cursor-pointer">
                                                <option value="low">🟢 低 (Low)</option>
                                                <option value="medium">🟡 中 (Medium)</option>
                                                <option value="high">🔴 高 (High)</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="text-xs text-gray-400 font-bold mb-1 block">備註 (選填)</label>
                                        <textarea rows="3" value={formData.note} onChange={e=>setFormData({...formData, note: e.target.value})} className="cyber-input resize-none text-sm" placeholder="細節描述..."></textarea>
                                    </div>

                                    <div className={`bg-black/30 p-3 rounded-xl border border-white/10 flex items-center justify-between mt-2 ${!hasLine ? 'opacity-50 grayscale' : ''}`}>
                                        <div>
                                            <div className="text-sm font-bold text-white"><i className="fa-solid fa-bell text-[#FFD700] mr-1"></i> LINE 提醒功能</div>
                                            <div className="text-xs text-gray-500">
                                                {hasLine ? '將於截止日前一天發送通知' : '尚未綁定 LINE，提醒功能無法使用'}
                                            </div>
                                        </div>
                                        <label className="relative inline-flex items-center cursor-pointer">
                                            <input type="checkbox" className="sr-only peer" checked={hasLine && formData.remind} disabled={!hasLine} onChange={e=>setFormData({...formData, remind: e.target.checked})} />
                                            <div className="w-11 h-6 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#00ff9d]"></div>
                                        </label>
                                    </div>
                                    
                                    <div className="flex gap-3 mt-8 pt-4">
                                        <button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 py-3 rounded-xl border border-gray-600 text-gray-300 hover:bg-gray-800 font-bold transition-colors">取消</button>
                                        <button type="submit" disabled={loading} className="flex-[2] py-3 rounded-xl bg-gradient-to-r from-[#00f3ff] to-[#bc13fe] text-white font-bold hover:shadow-[0_0_20px_rgba(0,243,255,0.4)] transition-all active:scale-95 disabled:opacity-50">
                                            {loading ? '儲存中...' : '儲存事項'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
