<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帳務總覽 - 玉露寶庫</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --main-gold: #FFD700; --nebula-blue: #00f3ff; --danger-red: #ff4757;
            --glass-bg: rgba(15, 23, 42, 0.85); --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: radial-gradient(circle at top, #1B2735 0%, #090A0F 100%);
            color: #e2e8f0; font-family: 'Microsoft JhengHei', sans-serif;
            min-height: 100vh; margin: 0; padding: 20px; overflow-x: hidden;
        }

        /* 🌟 完美移植 VIP 區的背景特效 */
        .space-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; pointer-events: none; }
        .star-field { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; opacity: 0.5; animation: rotateSpace 240s linear infinite; }
        .stars-distant { background-image: radial-gradient(1px 1px at 10% 15%, #fff, transparent), radial-gradient(1px 1px at 30% 60%, #ddd, transparent), radial-gradient(1px 1px at 70% 20%, #eee, transparent); background-size: 300px 300px; }
        .stars-mid { background-image: radial-gradient(1.5px 1.5px at 25% 10%, #fff, transparent), radial-gradient(1.5px 1.5px at 60% 35%, #eef, transparent); background-size: 400px 400px; opacity: 0.6; animation-direction: reverse; animation-duration: 180s; }
        .gold-twinklers { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(2px 2px at 20% 30%, var(--main-gold), transparent), radial-gradient(3px 3px at 65% 25%, #fff59d, transparent); background-size: 100% 100%; opacity: 0; animation: occasionalFlash 12s ease-in-out infinite; }
        
        .meteor { position: absolute; height: 2px; background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,1) 50%, rgba(255,215,0,1) 100%); opacity: 0; transform: rotate(-45deg); animation: meteor-fall 3s linear infinite; filter: drop-shadow(0 0 5px var(--main-gold)); pointer-events: none; z-index: -1; }
        .meteor::before { content: ''; position: absolute; top: 50%; transform: translateY(-50%); width: 4px; height: 4px; border-radius: 50%; background: #fff; box-shadow: 0 0 10px #fff, 0 0 20px var(--main-gold); }
        
        .trail-particle { position: absolute; width: 6px; height: 6px; background: var(--main-gold); border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); z-index: 9999; box-shadow: 0 0 10px var(--main-gold); animation: particle-fade 0.8s ease-out forwards; }
        
        @keyframes rotateSpace { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes occasionalFlash { 0%, 40%, 100% { opacity: 0; } 55% { opacity: 1; filter: brightness(2) blur(1px); } 85% { opacity: 0; } }
        @keyframes meteor-fall { 0% { opacity: 0; transform: rotate(-45deg) translateX(200px); } 10% { opacity: 1; } 20% { opacity: 0; transform: rotate(-45deg) translateX(-800px); } 100% { opacity: 0; } }
        @keyframes particle-fade { 0% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(0) translateY(20px); } }

        /* --- 佈局與 UI --- */
        .dashboard-wrapper { max-width: 1800px; margin: 0 auto; width: 100%; position: relative; z-index: 2; }

        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .back-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #94a3b8; padding: 10px 20px; border-radius: 50px; text-decoration: none; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; }
        .back-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

        .account-tabs { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 10px; scrollbar-width: none; }
        .account-tabs::-webkit-scrollbar { display: none; }
        .tab-item { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 12px 25px; border-radius: 15px; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .tab-item.active { background: rgba(0, 243, 255, 0.15); border-color: var(--nebula-blue); color: var(--nebula-blue); box-shadow: 0 0 20px rgba(0, 243, 255, 0.2); }

        /* 🌟 日期篩選器 */
        .filter-group { display: flex; gap: 10px; align-items: center; background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 15px; border: 1px solid var(--glass-border); }
        select { background: #0f172a; color: #fff; border: 1px solid var(--nebula-blue); padding: 8px 12px; border-radius: 8px; outline: none; cursor: pointer; font-size: 1rem; }

        /* 🌟 通知開關面板 */
        .settings-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); border-radius: 15px; padding: 15px 25px; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; border: 1px solid var(--glass-border); }
        .switch-group { display: flex; gap: 25px; align-items: center; }
        .switch-container { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 0.95rem; color: #cbd5e1; }
        .switch-container input { display: none; }
        .slider { width: 44px; height: 22px; background: #475569; border-radius: 20px; position: relative; transition: 0.4s; }
        .slider:before { content: ""; position: absolute; height: 16px; width: 16px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.4s; }
        input:checked + .slider { background: #06C755; box-shadow: 0 0 10px rgba(6,199,85,0.5); }
        input:checked + .slider:before { transform: translateX(22px); }
        
        .btn-del-group { background: rgba(255, 71, 87, 0.1); color: #ff4757; border: 1px solid #ff4757; padding: 8px 20px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .btn-del-group:hover { background: #ff4757; color: #fff; }

        /* 數據卡片與圖表 */
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 25px; text-align: center; backdrop-filter: blur(10px); }
        .stat-card h3 { margin: 0 0 10px 0; color: #94a3b8; font-size: 1.1rem; }
        .stat-card .amount { font-size: 2.5rem; font-weight: 800; margin: 0; }

        .main-layout { display: grid; grid-template-columns: 1fr 1fr 1.2fr; gap: 25px; align-items: stretch; }
        .chart-box { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 25px; display: flex; flex-direction: column; min-height: 450px; }
        .chart-box h3 { margin-top: 0; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .record-container { flex: 1; overflow-y: auto; padding-right: 5px; }
        .record-container::-webkit-scrollbar { width: 6px; }
        .record-container::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }

        @media (max-width: 1200px) { .main-layout { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 768px) { .main-layout { grid-template-columns: 1fr; } .stat-card .amount { font-size: 2rem; } }

        .record-item { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { color: var(--danger-red); background: none; border: 1px solid var(--danger-red); width: 35px; height: 35px; border-radius: 50%; cursor: pointer; transition: 0.3s; }
        .delete-btn:hover { background: var(--danger-red); color: white; }

    </style>
</head>
<body>

<div id="meteorContainer" class="space-container"></div>
<div class="space-container">
    <div class="star-field stars-distant"></div>
    <div class="star-field stars-mid"></div>
    <div class="gold-twinklers"></div>
</div>

<div class="dashboard-wrapper">
    <div class="nav-bar">
        <a href="vip_area.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> 返回星員區</a>
        <h1 id="pageTitle" style="color:var(--main-gold); text-shadow:0 0 15px rgba(255,215,0,0.5); margin:0;">讀取中...</h1>
        
        <div class="filter-group">
            <i class="fa-solid fa-calendar-days" style="color:var(--nebula-blue); font-size:1.2rem;"></i>
            <select id="filterYear"></select>
            <select id="filterMonth"></select>
        </div>
    </div>

    <div class="account-tabs" id="accountTabs"></div>

    <div class="settings-bar" id="settingsBar">
        <div class="switch-group">
            <label class="switch-container">
                <input type="checkbox" id="monthReportNotify" onchange="toggleNotify('month')">
                <div class="slider"></div>
                <span>發送上個月 LINE 報表</span>
            </label>
            <label class="switch-container">
                <input type="checkbox" id="yearReportNotify" onchange="toggleNotify('year')">
                <div class="slider"></div>
                <span>發送前一年 LINE 報表</span>
            </label>
        </div>
        
        <div id="groupOnlyBtns" style="display:none; gap:10px;">
            <button onclick="openInviteModal()" class="back-btn" style="color:var(--nebula-blue); border-color:var(--nebula-blue);"><i class="fa-solid fa-qrcode"></i> 邀請</button>
            <button onclick="deleteCurrentGroup()" class="btn-del-group"><i class="fa-solid fa-trash-can"></i> 解散群組</button>
        </div>
    </div>

    <div class="summary-grid">
        <div class="stat-card"><h3>選定月份總支出</h3><p class="amount" id="totalExpense" style="color:var(--danger-red)">$ 0</p></div>
        <div class="stat-card"><h3>選定月份總收入</h3><p class="amount" id="totalIncome" style="color:#00ff9d">$ 0</p></div>
        <div class="stat-card"><h3>選定月份結餘</h3><p class="amount" id="netBalance" style="color:var(--nebula-blue)">$ 0</p></div>
    </div>

    <div class="main-layout">
        <div class="chart-box">
            <h3><i class="fa-solid fa-chart-pie"></i> 支出分類佔比</h3>
            <div style="flex:1; position:relative;"><canvas id="pieChart"></canvas></div>
        </div>
        
        <div class="chart-box">
            <h3><i class="fa-solid fa-chart-column"></i> 每日支出趨勢</h3>
            <div style="flex:1; position:relative;"><canvas id="barChart"></canvas></div>
        </div>

        <div class="chart-box">
            <h3><i class="fa-solid fa-list-ul"></i> 帳務明細 (選定月份)</h3>
            <div class="record-container" id="recentRecordsList">
                <p style="color:#64748b; text-align:center; margin-top:50px;">目前尚無紀錄</p>
            </div>
        </div>
    </div>
</div>

<div id="inviteModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center;">
    <div style="background:#0f172a; padding:30px; border-radius:20px; text-align:center; border:1px solid var(--nebula-blue);">
        <h2 style="color:var(--main-gold);">邀請成員加入</h2>
        <div id="qrcode" style="background:#fff; padding:10px; display:inline-block; margin:15px 0;"></div>
        <br>
        <button onclick="document.getElementById('inviteModal').style.display='none'" class="back-btn" style="width:100%; justify-content:center;">關閉</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot, doc, getDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAAo6on0f2QUbPaRfxpIEb2uvhKxDvPUvs",
        authDomain: "yulubox.firebaseapp.com",
        projectId: "yulubox",
        storageBucket: "yulubox.firebasestorage.app",
        messagingSenderId: "256466567852",
        appId: "1:256466567852:web:233b74668908ffcb9b9509"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const lineUserId = localStorage.getItem("lineUserId");
    let currentScope = "personal"; 
    let currentGroupId = null;
    let unsub = null;

    // 🌟 初始化動態流星與滑鼠特效
    function initMeteors() {
        setInterval(() => {
            const meteor = document.createElement('div');
            meteor.className = 'meteor';
            meteor.style.top = Math.random() * 50 + '%';
            meteor.style.left = Math.random() * 80 + 20 + '%';
            meteor.style.animationDuration = (Math.random() * 2 + 2) + 's';
            document.body.appendChild(meteor);
            setTimeout(() => meteor.remove(), 4000);
        }, 3000);
    }
    initMeteors();

    document.addEventListener('mousemove', (e) => {
        if(Math.random() > 0.5) return;
        const star = document.createElement('div');
        star.className = 'trail-particle';
        star.style.left = e.pageX + 'px';
        star.style.top = e.pageY + 'px';
        document.body.appendChild(star);
        setTimeout(() => star.remove(), 800);
    });

    // 🌟 初始化時間篩選器 (預設為當前年月)
    const yearSelect = document.getElementById('filterYear');
    const monthSelect = document.getElementById('filterMonth');
    const now = new Date();
    for(let y = now.getFullYear(); y >= 2024; y--) {
        yearSelect.innerHTML += `<option value="${y}">${y}年</option>`;
    }
    for(let m = 1; m <= 12; m++) {
        const selected = (m === now.getMonth() + 1) ? 'selected' : '';
        monthSelect.innerHTML += `<option value="${m}" ${selected}>${m}月</option>`;
    }

    // 切換時間自動重新撈取資料
    yearSelect.onchange = () => fetchData(currentScope);
    monthSelect.onchange = () => fetchData(currentScope);

    // 圖表實例
    Chart.defaults.color = '#cbd5e1';
    let pieChart = new Chart(document.getElementById('pieChart').getContext('2d'), { type: 'doughnut', data: { labels: [], datasets: [{ data: [], backgroundColor: ['#FFD700', '#00f3ff', '#ff4757', '#00ff9d', '#a855f7'], borderWidth: 0 }] }, options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } } });
    let barChart = new Chart(document.getElementById('barChart').getContext('2d'), { type: 'bar', data: { labels: [], datasets: [{ label: '支出金額', data: [], backgroundColor: '#00f3ff', borderRadius: 4 }] }, options: { maintainAspectRatio: false, scales: { x: { grid: { display: false } }, y: { grid: { color: 'rgba(255,255,255,0.05)' } } } } });

    window.onload = () => {
        if (!lineUserId) return alert("請先於 LINE 登入");
        loadTabs();
        switchAccount('personal', '個人專屬帳本');
    };

    function loadTabs() {
        const q = query(collection(db, "groups"), where("members", "array-contains", lineUserId));
        onSnapshot(q, (snapshot) => {
            const tabs = document.getElementById('accountTabs');
            let html = `<div class="tab-item ${currentScope==='personal'?'active':''}" onclick="switchAccount('personal', '個人專屬帳本')"><i class="fa-solid fa-user"></i> 個人專屬</div>`;
            snapshot.forEach(doc => {
                const data = doc.data();
                const gName = data.name || "未命名群組";
                html += `<div class="tab-item ${currentScope===doc.id?'active':''}" onclick="switchAccount('${doc.id}', '${gName}')"><i class="fa-solid fa-users"></i> ${gName}</div>`;
            });
            tabs.innerHTML = html;
        });
    }

    window.switchAccount = async (scope, name) => {
        currentScope = scope;
        currentGroupId = scope === 'personal' ? null : scope;
        document.getElementById('pageTitle').innerHTML = `<i class="fa-solid ${scope==='personal'?'fa-book':'fa-users-rectangle'}"></i> ${name}`;
        
        // 載入該帳本的推播設定
        loadSettings(scope);

        if (scope === 'personal') {
            document.getElementById('groupOnlyBtns').style.display = 'none';
        } else {
            document.getElementById('groupOnlyBtns').style.display = 'flex';
        }

        document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
        const targetTab = document.getElementById(`tab-${scope}`);
        if(targetTab) targetTab.classList.add('active');

        if (unsub) unsub();
        fetchData(scope);
    };

    // 🌟 讀取個人/群組的推播設定
    async function loadSettings(scope) {
        const col = scope === 'personal' ? 'users' : 'groups';
        const docId = scope === 'personal' ? lineUserId : scope;
        
        const snap = await getDoc(doc(db, col, docId));
        if (snap.exists()) {
            const data = snap.data();
            document.getElementById('monthReportNotify').checked = data.monthReportNotify || false;
            document.getElementById('yearReportNotify').checked = data.yearReportNotify || false;
        } else {
            document.getElementById('monthReportNotify').checked = false;
            document.getElementById('yearReportNotify').checked = false;
        }
    }

    // 🌟 更改推播設定並存入 Firebase
    window.toggleNotify = async (type) => {
        const field = type === 'month' ? 'monthReportNotify' : 'yearReportNotify';
        const val = document.getElementById(field).checked;
        
        const col = currentScope === 'personal' ? 'users' : 'groups';
        const docId = currentScope === 'personal' ? lineUserId : currentGroupId;
        
        try {
            await updateDoc(doc(db, col, docId), { [field]: val });
        } catch(err) {
            console.error("更新設定失敗", err);
        }
    };

    // 🌟 撈取與過濾指定月份的資料
    function fetchData(scope) {
        const year = parseInt(yearSelect.value);
        const month = parseInt(monthSelect.value);
        
        const colName = scope === 'personal' ? 'records_personal' : 'records_group';
        const q = scope === 'personal' 
            ? query(collection(db, colName), where("userId", "==", lineUserId))
            : query(collection(db, colName), where("groupId", "==", scope));

        unsub = onSnapshot(q, (snapshot) => {
            let income = 0, expense = 0;
            let catData = {}, dailyData = {};
            let records = [];

            // 準備該月的天數陣列 (用於長條圖 X 軸)
            const daysInMonth = new Date(year, month, 0).getDate();
            for(let i=1; i<=daysInMonth; i++) dailyData[i] = 0;

            snapshot.forEach(doc => {
                const d = doc.data();
                const ts = d.timestamp?.toDate() || new Date();
                
                // 判斷該筆紀錄是否屬於選擇的年月
                if (ts.getFullYear() === year && (ts.getMonth() + 1) === month) {
                    const amt = d.amount || 0;
                    if (d.transactionType === 'income') {
                        income += amt;
                    } else {
                        expense += amt;
                        catData[d.category] = (catData[d.category] || 0) + amt;
                        const day = ts.getDate();
                        dailyData[day] += amt;
                    }
                    records.push({ id: doc.id, ...d, date: ts });
                }
            });

            // 1. 更新數字看板
            document.getElementById('totalIncome').innerText = `$ ${income.toLocaleString()}`;
            document.getElementById('totalExpense').innerText = `$ ${expense.toLocaleString()}`;
            document.getElementById('netBalance').innerText = `$ ${(income - expense).toLocaleString()}`;

            // 2. 更新圓餅圖
            pieChart.data.labels = Object.keys(catData);
            pieChart.data.datasets[0].data = Object.values(catData);
            pieChart.update();

            // 3. 更新長條圖 (顯示整個月每天的支出)
            barChart.data.labels = Object.keys(dailyData).map(d => `${d}日`);
            barChart.data.datasets[0].data = Object.values(dailyData);
            barChart.update();

            // 4. 更新歷史紀錄列表
            records.sort((a,b) => b.date - a.date);
            renderRecords(records);
        });
    }

    function renderRecords(list) {
        const container = document.getElementById('recentRecordsList');
        if (list.length === 0) {
            container.innerHTML = `<p style="text-align:center; color:#64748b; margin-top:50px;">該月份尚無紀錄</p>`;
            return;
        }
        container.innerHTML = list.map(r => `
            <div class="record-item">
                <div>
                    <div style="font-weight:bold; color:#fff;">${r.category} <small style="color:#64748b; font-weight:normal;">${r.userName || ''}</small></div>
                    <div style="font-size:0.8rem; color:#94a3b8;">${r.date.toLocaleDateString()} ${r.date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})} ${r.note ? '- '+r.note : ''}</div>
                </div>
                <div style="display:flex; align-items:center; gap:15px;">
                    <span style="color:${r.transactionType==='income'?'#00ff9d':'#ff4757'}; font-weight:bold; font-size:1.1rem;">
                        ${r.transactionType==='income'?'+':'-'}$${r.amount}
                    </span>
                    <button class="delete-btn" onclick="deleteSingleRecord('${r.id}')"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>
        `).join('');
    }

    // 刪除單筆紀錄
    window.deleteSingleRecord = async (id) => {
        if (!confirm("確定要刪除這筆紀錄嗎？")) return;
        const colName = currentScope === 'personal' ? 'records_personal' : 'records_group';
        await deleteDoc(doc(db, colName, id));
    };

    // 刪除群組
    window.deleteCurrentGroup = async () => {
        if (!currentGroupId) return;
        if (!confirm("⚠️ 警告：確定要永久解散此群組嗎？此操作不可逆！")) return;
        try {
            await deleteDoc(doc(db, "groups", currentGroupId));
            alert("群組已成功解散！");
            window.switchAccount('personal', '個人專屬帳本');
        } catch (err) {
            console.error("刪除失敗:", err);
            alert("刪除失敗，請檢查網路連線或權限設定");
        }
    };

    // 打開邀請條碼
    window.openInviteModal = () => {
        if(!currentGroupId) return;
        const modal = document.getElementById('inviteModal');
        modal.style.display = 'flex';
        const url = `${window.location.origin}${window.location.pathname}?invite=${currentGroupId}`;
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById('qrcode'), { text: url, width: 160, height: 160 });
    };
</script>

</body>
</html>
