<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帳務總覽 - 玉露寶庫</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --main-gold: #FFD700; --nebula-blue: #00f3ff; --danger-red: #ff4757;
            --glass-bg: rgba(15, 23, 42, 0.85); --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: radial-gradient(circle at top, #1B2735 0%, #090A0F 100%);
            color: #e2e8f0; font-family: 'Microsoft JhengHei', sans-serif;
            min-height: 100vh; margin: 0; padding: 20px;
        }

        .dashboard-wrapper { max-width: 1800px; margin: 0 auto; width: 100%; }

        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #94a3b8; padding: 10px 20px; border-radius: 50px; text-decoration: none; transition: 0.3s; cursor: pointer; }
        .back-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

        /* 標籤與設定區 */
        .header-flex { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 20px; margin-bottom: 25px; }
        .account-tabs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        .tab-item { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 10px 20px; border-radius: 12px; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .tab-item.active { background: rgba(0, 243, 255, 0.15); border-color: var(--nebula-blue); color: var(--nebula-blue); }

        /* 🌟 篩選器樣式 */
        .filter-group { display: flex; gap: 10px; align-items: center; background: rgba(255,255,255,0.05); padding: 10px 15px; border-radius: 15px; border: 1px solid var(--glass-border); }
        select { background: #0f172a; color: #fff; border: 1px solid var(--nebula-blue); padding: 5px 10px; border-radius: 8px; outline: none; cursor: pointer; }

        /* 🌟 通知開關樣式 */
        .settings-panel { display: flex; gap: 15px; align-items: center; margin-top: 10px; font-size: 0.9rem; }
        .switch-container { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .switch-container input { display: none; }
        .slider { width: 40px; height: 20px; background: #334155; border-radius: 20px; position: relative; transition: 0.4s; }
        .slider:before { content: ""; position: absolute; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.4s; }
        input:checked + .slider { background: var(--nebula-blue); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* 佈局容器 */
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 25px; text-align: center; }
        .stat-card h3 { margin: 0; color: #94a3b8; font-size: 1rem; }
        .stat-card .amount { font-size: 2.2rem; font-weight: 800; margin-top: 10px; }

        .main-layout { display: grid; grid-template-columns: 1fr 1fr 1.2fr; gap: 25px; }
        .chart-box { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 25px; min-height: 450px; display: flex; flex-direction: column; }
        .record-container { max-height: 450px; overflow-y: auto; margin-top: 15px; }

        @media (max-width: 1200px) { .main-layout { grid-template-columns: 1fr; } }

        .record-item { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .btn-del-group { background: rgba(255, 71, 87, 0.1); color: #ff4757; border: 1px solid #ff4757; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="dashboard-wrapper">
    <div class="nav-bar">
        <a href="vip_area.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> 返回星員區</a>
        <h1 id="pageTitle">讀取中...</h1>
        <div class="filter-group">
            <i class="fa-solid fa-calendar-days" style="color:var(--nebula-blue)"></i>
            <select id="filterYear"></select>
            <select id="filterMonth"></select>
        </div>
    </div>

    <div class="header-flex">
        <div class="account-tabs" id="accountTabs"></div>
        
        <div id="groupSettings" style="display:none;" class="filter-group">
            <label class="switch-container">
                <input type="checkbox" id="monthReportNotify" onchange="toggleNotify('month')">
                <div class="slider"></div>
                <span>月報表通知</span>
            </label>
            <label class="switch-container">
                <input type="checkbox" id="yearReportNotify" onchange="toggleNotify('year')">
                <div class="slider"></div>
                <span>年報表通知</span>
            </label>
            <button onclick="openInviteModal()" class="back-btn" style="color:var(--nebula-blue); border-color:var(--nebula-blue);"><i class="fa-solid fa-user-plus"></i> 邀請</button>
            <button onclick="deleteCurrentGroup()" class="btn-del-group"><i class="fa-solid fa-trash"></i> 解散群組</button>
        </div>
    </div>

    <div class="summary-grid">
        <div class="stat-card"><h3>選定期間支出</h3><p class="amount" id="totalExpense" style="color:var(--danger-red)">$ 0</p></div>
        <div class="stat-card"><h3>選定期間收入</h3><p class="amount" id="totalIncome" style="color:#00ff9d">$ 0</p></div>
        <div class="stat-card"><h3>期間結餘</h3><p class="amount" id="netBalance" style="color:var(--nebula-blue)">$ 0</p></div>
    </div>

    <div class="main-layout">
        <div class="chart-box">
            <h3>支出分類分析</h3>
            <div style="flex:1; position:relative;"><canvas id="pieChart"></canvas></div>
        </div>
        <div class="chart-box">
            <h3>每日支出趨勢</h3>
            <div style="flex:1; position:relative;"><canvas id="barChart"></canvas></div>
        </div>
        <div class="chart-box">
            <h3>帳務明細</h3>
            <div class="record-container" id="recentRecordsList"></div>
        </div>
    </div>
</div>

<div id="inviteModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center;">
    <div style="background:#0f172a; padding:30px; border-radius:20px; text-align:center; border:1px solid var(--nebula-blue);">
        <h2>邀請成員加入</h2>
        <div id="qrcode" style="background:#fff; padding:10px; display:inline-block; margin-bottom:20px;"></div>
        <br>
        <button onclick="document.getElementById('inviteModal').style.display='none'" class="back-btn">關閉</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot, doc, getDoc, updateDoc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAAo6on0f2QUbPaRfxpIEb2uvhKxDvPUvs",
        authDomain: "yulubox.firebaseapp.com",
        projectId: "yulubox",
        storageBucket: "yulubox.firebasestorage.app",
        messagingSenderId: "256466567852",
        appId: "1:256466567852:web:233b74668908ffcb9b9509"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const lineUserId = localStorage.getItem("lineUserId");
    let currentScope = "personal"; 
    let currentGroupId = null;
    let unsub = null;

    // 初始化年份與月份下拉選單
    const yearSelect = document.getElementById('filterYear');
    const monthSelect = document.getElementById('filterMonth');
    const now = new Date();
    for(let y = now.getFullYear(); y >= 2024; y--) {
        yearSelect.innerHTML += `<option value="${y}">${y}年</option>`;
    }
    for(let m = 1; m <= 12; m++) {
        const selected = (m === now.getMonth() + 1) ? 'selected' : '';
        monthSelect.innerHTML += `<option value="${m}" ${selected}>${m}月</option>`;
    }

    yearSelect.onchange = () => fetchData(currentScope);
    monthSelect.onchange = () => fetchData(currentScope);

    // 圖表
    let pieChart = new Chart(document.getElementById('pieChart'), { type: 'doughnut', data: { labels: [], datasets: [{ data: [] }] }, options: { maintainAspectRatio: false } });
    let barChart = new Chart(document.getElementById('barChart'), { type: 'bar', data: { labels: [], datasets: [{ label: '每日支出', data: [] }] }, options: { maintainAspectRatio: false } });

    window.onload = () => {
        if (!lineUserId) return alert("請先登入");
        loadTabs();
        switchAccount('personal', '個人帳本');
    };

    function loadTabs() {
        const q = query(collection(db, "groups"), where("members", "array-contains", lineUserId));
        onSnapshot(q, (snapshot) => {
            const tabs = document.getElementById('accountTabs');
            let html = `<div class="tab-item ${currentScope==='personal'?'active':''}" onclick="switchAccount('personal', '個人帳本')">個人帳本</div>`;
            snapshot.forEach(doc => {
                const data = doc.data();
                html += `<div class="tab-item ${currentScope===doc.id?'active':''}" onclick="switchAccount('${doc.id}', '${data.name}')">${data.name}</div>`;
            });
            tabs.innerHTML = html;
        });
    }

    window.switchAccount = async (scope, name) => {
        currentScope = scope;
        currentGroupId = scope === 'personal' ? null : scope;
        document.getElementById('pageTitle').innerText = name;
        
        const groupSettings = document.getElementById('groupSettings');
        if (scope === 'personal') {
            groupSettings.style.display = 'none';
        } else {
            groupSettings.style.display = 'flex';
            loadGroupSettings(scope);
        }

        if (unsub) unsub();
        fetchData(scope);
    };

    // 🌟 載入群組通知設定
    async function loadGroupSettings(groupId) {
        const docRef = doc(db, "groups", groupId);
        const snap = await getDoc(docRef);
        if (snap.exists()) {
            const data = snap.data();
            document.getElementById('monthReportNotify').checked = data.monthReportNotify || false;
            document.getElementById('yearReportNotify').checked = data.yearReportNotify || false;
        }
    }

    // 🌟 切換通知開關
    window.toggleNotify = async (type) => {
        if (!currentGroupId) return;
        const field = type === 'month' ? 'monthReportNotify' : 'yearReportNotify';
        const val = document.getElementById(field + '').checked;
        await updateDoc(doc(db, "groups", currentGroupId), { [field]: val });
        console.log(`${type} 報表設定已更新為: ${val}`);
    };

    function fetchData(scope) {
        const year = parseInt(yearSelect.value);
        const month = parseInt(monthSelect.value);
        const colName = scope === 'personal' ? 'records_personal' : 'records_group';
        
        let q = scope === 'personal' 
            ? query(collection(db, colName), where("userId", "==", lineUserId))
            : query(collection(db, colName), where("groupId", "==", scope));

        unsub = onSnapshot(q, (snapshot) => {
            let income = 0, expense = 0, catData = {}, dailyData = {};
            let records = [];

            snapshot.forEach(doc => {
                const d = doc.data();
                const ts = d.timestamp?.toDate() || new Date();
                
                // 🌟 時間篩選邏輯
                if (ts.getFullYear() === year && (ts.getMonth() + 1) === month) {
                    const amt = d.amount || 0;
                    if (d.transactionType === 'income') {
                        income += amt;
                    } else {
                        expense += amt;
                        catData[d.category] = (catData[d.category] || 0) + amt;
                        const day = ts.getDate();
                        dailyData[day] = (dailyData[day] || 0) + amt;
                    }
                    records.push({ id: doc.id, ...d, date: ts });
                }
            });

            document.getElementById('totalIncome').innerText = `$ ${income.toLocaleString()}`;
            document.getElementById('totalExpense').innerText = `$ ${expense.toLocaleString()}`;
            document.getElementById('netBalance').innerText = `$ ${(income - expense).toLocaleString()}`;

            updateCharts(catData, dailyData);
            renderRecords(records.sort((a,b) => b.date - a.date));
        });
    }

    function updateCharts(catData, dailyData) {
        pieChart.data.labels = Object.keys(catData);
        pieChart.data.datasets[0].data = Object.values(catData);
        pieChart.update();

        const daysInMonth = new Date(yearSelect.value, monthSelect.value, 0).getDate();
        const labels = Array.from({length: daysInMonth}, (_, i) => i + 1);
        const data = labels.map(day => dailyData[day] || 0);
        
        barChart.data.labels = labels;
        barChart.data.datasets[0].data = data;
        barChart.update();
    }

    function renderRecords(list) {
        const container = document.getElementById('recentRecordsList');
        if (list.length === 0) {
            container.innerHTML = `<p style="text-align:center; color:#64748b; margin-top:30px;">本月無帳務紀錄</p>`;
            return;
        }
        container.innerHTML = list.map(r => `
            <div class="record-item">
                <div>
                    <div style="font-weight:bold;">${r.category}</div>
                    <div style="font-size:0.8rem; color:#64748b;">${r.date.toLocaleDateString()} - ${r.note || '無'}</div>
                </div>
                <div style="text-align:right;">
                    <div style="color:${r.transactionType==='income'?'#00ff9d':'#ff4757'}; font-weight:bold;">
                        ${r.transactionType==='income'?'+':'-'}$${r.amount}
                    </div>
                    <button class="delete-btn" style="border:none; background:none; color:#ff4757; cursor:pointer;" onclick="deleteSingleRecord('${r.id}')"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            </div>
        `).join('');
    }

    window.deleteSingleRecord = async (id) => {
        if (!confirm("確定刪除？")) return;
        const col = currentScope === 'personal' ? 'records_personal' : 'records_group';
        await deleteDoc(doc(db, col, id));
    };

    window.deleteCurrentGroup = async () => {
        if (!currentGroupId || !confirm("⚠️ 永久解散此群組？")) return;
        await deleteDoc(doc(db, "groups", currentGroupId));
        switchAccount('personal', '個人帳本');
    };

    window.openInviteModal = () => {
        const modal = document.getElementById('inviteModal');
        modal.style.display = 'flex';
        const url = `${window.location.origin}${window.location.pathname}?invite=${currentGroupId}`;
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById('qrcode'), { text: url, width: 150, height: 150 });
    };
</script>
</body>
</html>
