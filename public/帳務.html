<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>帳務總覽與群組 - 玉露寶庫</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.1/dist/browser-image-compression.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            var(--main-gold): #FFD700; var(--accent-amber): #FDB931; var(--deep-space): #0f172a;      
            var(--nebula-blue): #00f3ff; var(--danger-red): #ff4757; var(--neon-green): #00ff9d;
            var(--glass-bg): rgba(15, 23, 42, 0.75); var(--glass-border): rgba(255, 255, 255, 0.1);
        }

        body {
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            color: #e2e8f0; font-family: 'Microsoft JhengHei', sans-serif;
            min-height: 100vh; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
        }

        .space-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .star-field { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; opacity: 0.5; animation: rotateSpace 240s linear infinite; }
        .stars-distant { background-image: radial-gradient(1px 1px at 10% 15%, #fff, transparent), radial-gradient(1px 1px at 30% 60%, #ddd, transparent); background-size: 300px 300px; }
        @keyframes rotateSpace { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 🌟 佈局寬度升級：從 1000px 擴展到 1600px，並使用 95% 適應各種螢幕 */
        .max-container { width: 95%; max-width: 1600px; }

        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; z-index: 10; }
        .back-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.2); color: #94a3b8; padding: 10px 20px; border-radius: 30px; cursor: pointer; transition: 0.3s; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; backdrop-filter: blur(5px); }
        .back-btn:hover { background: rgba(255, 255, 255, 0.1); color: #fff; border-color: #fff; }
        h1 { margin: 0; color: #FFD700; font-size: 1.6rem; letter-spacing: 2px; text-shadow: 0 0 15px rgba(255, 215, 0, 0.4); display: flex; align-items: center; gap: 10px; }

        .account-tabs { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 20px; scrollbar-width: none; }
        .account-tabs::-webkit-scrollbar { display: none; }
        .tab-item { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 20px; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .tab-item img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; background: #000; }
        .tab-item:hover { background: rgba(255,255,255,0.1); }
        .tab-item.active { background: rgba(0, 243, 255, 0.2); border-color: #00f3ff; color: #00f3ff; box-shadow: 0 0 15px rgba(0, 243, 255, 0.3); }
        .tab-add { border: 1px dashed rgba(255,255,255,0.5); color: #94a3b8; }
        .tab-add:hover { border-color: #FFD700; color: #FFD700; }

        .group-controls { display: none; justify-content: flex-end; gap: 10px; margin-bottom: 20px; }
        .action-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 8px 15px; border-radius: 10px; cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
        .action-btn:hover { background: rgba(255,215,0,0.2); border-color: #FFD700; color: #FFD700; }
        
        /* 🌟 新增：刪除群組按鈕樣式 */
        .btn-danger { color: #ff4757; border-color: rgba(255,71,87,0.3); }
        .btn-danger:hover { background: rgba(255,71,87,0.1); border-color: #ff4757; color: #ff4757; box-shadow: 0 0 10px rgba(255,71,87,0.3); }

        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: rgba(15, 23, 42, 0.75); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 25px; text-align: center; backdrop-filter: blur(12px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .stat-card h3 { margin: 0 0 10px 0; color: #94a3b8; font-size: 1rem; }
        .stat-card .amount { font-size: 2.2rem; font-weight: 900; margin: 0; }
        .income-text { color: #00ff9d; } .expense-text { color: #ff4757; } .balance-text { color: #00f3ff; }

        .charts-wrapper { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; margin-bottom: 30px; align-items: start; }
        
        @media (max-width: 768px) {
            .charts-wrapper { grid-template-columns: 1fr; }
        }

        .chart-box { background: rgba(15, 23, 42, 0.75); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 25px; backdrop-filter: blur(12px); display: flex; flex-direction: column; align-items: center; box-sizing: border-box; }
        .chart-header { width: 100%; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;}
        .chart-header h2 { margin: 0; color: #fff; font-size: 1.2rem; }
        .canvas-container { position: relative; width: 100%; height: 350px; display: flex; justify-content: center; align-items: center; }
        .no-data-msg { display: flex; flex-direction: column; align-items: center; gap: 10px; color: #64748b; padding: 30px; }
        .no-data-msg i { font-size: 3rem; }

        /* --- 歷史紀錄列表樣式 --- */
        .record-list { width: 100%; display: flex; flex-direction: column; gap: 10px; max-height: 350px; overflow-y: auto; padding-right: 5px; }
        .record-list::-webkit-scrollbar { width: 6px; }
        .record-list::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        .record-item { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .record-item:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
        .record-info { display: flex; flex-direction: column; gap: 5px; }
        .record-cat { font-size: 1.1rem; font-weight: bold; color: #fff; }
        .record-date-note { font-size: 0.85rem; color: #94a3b8; }
        .record-actions { display: flex; align-items: center; gap: 15px; }
        .record-amt { font-size: 1.2rem; font-weight: bold; }
        .delete-btn { background: transparent; border: 1px solid #ff4757; color: #ff4757; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; }
        .delete-btn:hover { background: #ff4757; color: #fff; box-shadow: 0 0 10px rgba(255,71,87,0.5); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(5px); }
        .modal-box { background: #0f172a; border: 1px solid #00f3ff; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; position: relative; }
        .modal-box h2 { color: #FFD700; margin-top: 0; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; color: #94a3b8; cursor: pointer; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; color: #00f3ff; font-size: 0.9rem; }
        .input-group input[type="text"] { width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid #475569; border-radius: 8px; color: #fff; box-sizing: border-box; }
        .input-group input[type="file"] { color: #94a3b8; }
        .preview-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin: 10px auto; display: block; border: 2px solid #FFD700; display: none; }
        .submit-btn { background: #FFD700; color: #000; width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1.1rem; }
        
        #qrcode { background: white; padding: 15px; border-radius: 10px; display: inline-block; margin: 15px 0; }
        .share-links { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        .share-links button { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-line { background: #06C755; color: white; }
        .btn-copy { background: #475569; color: white; }

    </style>
</head>
<body>

    <div class="space-container"><div class="star-field stars-distant"></div></div>

    <div class="nav-bar max-container">
        <a href="vip_area.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> 返回星員區</a>
        <h1 id="pageTitle"><i class="fa-solid fa-book"></i> 個人帳本</h1>
    </div>

    <div class="account-tabs max-container" id="accountTabs">
        <div class="tab-item active" onclick="switchAccount('personal', '個人帳本')">
            <i class="fa-solid fa-user"></i> 個人專屬
        </div>
        <div class="tab-item tab-add" onclick="openCreateGroupModal()">
            <i class="fa-solid fa-plus"></i> 新增群組
        </div>
    </div>

    <div class="group-controls max-container" id="groupControls">
        <button class="action-btn" onclick="openInviteModal()"><i class="fa-solid fa-user-plus"></i> 邀請成員</button>
        <button class="action-btn btn-danger" onclick="deleteCurrentGroup()"><i class="fa-solid fa-trash-can"></i> 解散群組</button>
    </div>

    <div id="loading-status" style="color: #FFD700; margin-top: 50px; font-size: 1.2rem; font-weight: bold;">
        <i class="fa-solid fa-satellite-dish fa-spin"></i> 資料同步中...
    </div>

    <div id="dashboard-content" class="max-container" style="display: none; flex-direction: column; align-items: center;">
        <div class="summary-grid">
            <div class="stat-card">
                <h3><i class="fa-solid fa-arrow-trend-down"></i> 本月總支出</h3>
                <p class="amount expense-text" id="totalExpense">$ 0</p>
            </div>
            <div class="stat-card">
                <h3><i class="fa-solid fa-arrow-trend-up"></i> 本月總收入</h3>
                <p class="amount income-text" id="totalIncome">$ 0</p>
            </div>
            <div class="stat-card">
                <h3><i class="fa-solid fa-scale-balanced"></i> 目前結餘</h3>
                <p class="amount balance-text" id="netBalance">$ 0</p>
            </div>
        </div>

        <div class="charts-wrapper">
            <div class="chart-box">
                <div class="chart-header"><h2><i class="fa-solid fa-chart-pie"></i> 支出分類佔比</h2></div>
                <div class="canvas-container">
                    <canvas id="pieChart" style="display: none;"></canvas>
                    <div id="noDataPie" class="no-data-msg"><i class="fa-solid fa-folder-open"></i><p>暫無資料</p></div>
                </div>
            </div>
            
            <div class="chart-box">
                <div class="chart-header"><h2><i class="fa-solid fa-chart-column"></i> 近 7 日趨勢</h2></div>
                <div class="canvas-container">
                    <canvas id="barChart" style="display: none;"></canvas>
                    <div id="noDataBar" class="no-data-msg"><i class="fa-solid fa-folder-open"></i><p>暫無資料</p></div>
                </div>
            </div>
            
            <div class="chart-box" style="grid-column: 1 / -1; width: 100%;">
                <div class="chart-header">
                    <h2><i class="fa-solid fa-clock-rotate-left"></i> 近期紀錄列表</h2>
                    <span style="font-size: 0.85rem; color: #94a3b8;">顯示最近 20 筆</span>
                </div>
                <div class="record-list" id="recentRecordsList">
                    </div>
            </div>
        </div>
    </div>

    <div id="createGroupModal" class="modal-overlay">
        <div class="modal-box">
            <span class="close-modal" onclick="closeModal('createGroupModal')">&times;</span>
            <h2><i class="fa-solid fa-users"></i> 創建新群組</h2>
            <div class="input-group">
                <label>群組名稱</label>
                <input type="text" id="groupNameInput" placeholder="例如：日本旅遊公積金">
            </div>
            <div class="input-group">
                <label>群組大頭貼 (可選)</label>
                <input type="file" id="groupAvatarInput" accept="image/*" onchange="previewImage(event)">
                <img id="avatarPreview" class="preview-img" src="">
            </div>
            <button class="submit-btn" id="btnCreateGroup" onclick="handleCreateGroup()">確認創建</button>
        </div>
    </div>

    <div id="inviteModal" class="modal-overlay">
        <div class="modal-box">
            <span class="close-modal" onclick="closeModal('inviteModal')">&times;</span>
            <h2><i class="fa-solid fa-qrcode"></i> 邀請加入群組</h2>
            <p style="color:#94a3b8; font-size:0.9rem;">請朋友掃描條碼，或傳送連結給他們</p>
            <div id="qrcode"></div>
            <div class="share-links">
                <button class="btn-copy" onclick="copyInviteLink()"><i class="fa-solid fa-link"></i> 複製連結</button>
                <button class="btn-line" onclick="shareToLine()"><i class="fa-brands fa-line"></i> LINE 傳送</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, getDoc, setDoc, updateDoc, deleteDoc, arrayUnion, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAAo6on0f2QUbPaRfxpIEb2uvhKxDvPUvs",
            authDomain: "yulubox.firebaseapp.com",
            projectId: "yulubox",
            storageBucket: "yulubox.firebasestorage.app",
            messagingSenderId: "256466567852",
            appId: "1:256466567852:web:233b74668908ffcb9b9509"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const lineUserId = localStorage.getItem("lineUserId");
        let currentScope = "personal"; 
        let currentGroupId = null;
        let unsubscribeFinance = null; 

        Chart.defaults.color = '#cbd5e1'; 
        const chartColors = ['#FFD700', '#00f3ff', '#ff4757', '#00ff9d', '#a855f7', '#FDB931', '#3b82f6'];
        let pieChart = new Chart(document.getElementById('pieChart').getContext('2d'), { type: 'doughnut', data: { labels: [], datasets: [{ data: [], backgroundColor: chartColors, borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, cutout: '65%', plugins: { legend: { position: 'right' } } } });
        let barChart = new Chart(document.getElementById('barChart').getContext('2d'), { type: 'bar', data: { labels: [], datasets: [{ label: '每日支出', data: [], backgroundColor: '#00f3ff', borderRadius: 5 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } } } } });

        window.onload = async () => {
            if (!lineUserId) {
                document.getElementById('loading-status').innerHTML = "❌ 無法辨識身分。<br>請返回「星員區」並確保您已綁定 LINE 帳號。";
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            const inviteCode = urlParams.get('invite');
            if (inviteCode) await processInvite(inviteCode);

            document.getElementById('loading-status').style.display = "none";
            document.getElementById('dashboard-content').style.display = "flex";
            
            loadUserGroups();
            window.switchAccount('personal', '個人帳本');
        };

        async function processInvite(groupId) {
            try {
                const groupRef = doc(db, "groups", groupId);
                const groupSnap = await getDoc(groupRef);
                if (groupSnap.exists()) {
                    const groupData = groupSnap.data();
                    if (confirm(`是否要加入群組：【${groupData.name || '未命名群組'}】？`)) {
                        await updateDoc(groupRef, { members: arrayUnion(lineUserId) });
                        alert("🎉 成功加入群組！");
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                } else { alert("❌ 找不到該群組或邀請碼已失效。"); }
            } catch (err) { console.error(err); }
        }

        function loadUserGroups() {
            const q = query(collection(db, "groups"), where("members", "array-contains", lineUserId));
            onSnapshot(q, (snapshot) => {
                const tabsContainer = document.getElementById('accountTabs');
                const personalTab = tabsContainer.children[0].outerHTML;
                const addTab = tabsContainer.children[tabsContainer.children.length - 1].outerHTML;
                
                let groupsHtml = "";
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const avatar = data.avatarUrl || "https://cdn-icons-png.flaticon.com/512/615/615075.png";
                    // 🌟 防呆：如果名稱是空的或是 undefined，補上預設文字
                    const groupName = data.name || "未命名群組";
                    groupsHtml += `<div class="tab-item" id="tab-${doc.id}" onclick="switchAccount('${doc.id}', '${groupName}')"><img src="${avatar}"> ${groupName}</div>`;
                });
                tabsContainer.innerHTML = personalTab + groupsHtml + addTab;
                
                if (currentScope !== 'personal') {
                    const activeTab = document.getElementById(`tab-${currentScope}`);
                    if(activeTab) {
                        activeTab.classList.add('active');
                    } else {
                        // 如果當前群組被刪除了，自動切回個人帳本
                        window.switchAccount('personal', '個人帳本');
                    }
                }
            });
        }

        window.switchAccount = (scope, name) => {
            currentScope = scope;
            document.getElementById('pageTitle').innerHTML = scope === 'personal' ? `<i class="fa-solid fa-book"></i> ${name}` : `<i class="fa-solid fa-users"></i> ${name}`;
            
            document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
            if(scope === 'personal') {
                document.querySelector('.tab-item').classList.add('active');
                document.getElementById('groupControls').style.display = 'none';
                currentGroupId = null;
            } else {
                const activeTab = document.getElementById(`tab-${scope}`);
                if(activeTab) activeTab.classList.add('active');
                document.getElementById('groupControls').style.display = 'flex';
                currentGroupId = scope;
            }

            if(unsubscribeFinance) unsubscribeFinance();
            fetchData(scope);
        };

        function fetchData(scope) {
            let q;
            if (scope === 'personal') {
                q = query(collection(db, "records_personal"), where("userId", "==", lineUserId));
            } else {
                q = query(collection(db, "records_group"), where("groupId", "==", scope));
            }

            unsubscribeFinance = onSnapshot(q, (snapshot) => {
                let totalIncome = 0; let totalExpense = 0;
                const expenseCats = {}; const dailyExp = {}; 
                let hasExpenses = false;
                let allRecords = [];

                for(let i=6; i>=0; i--) {
                    let d = new Date(); d.setDate(d.getDate() - i);
                    dailyExp[`${d.getMonth()+1}/${d.getDate()}`] = 0;
                }

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const amount = data.amount;
                    allRecords.push({ id: doc.id, ...data });

                    let dateStr = "";
                    if (data.timestamp) { const d = data.timestamp.toDate(); dateStr = `${d.getMonth()+1}/${d.getDate()}`; }

                    if (data.transactionType === "income") { totalIncome += amount; } 
                    else {
                        totalExpense += amount;
                        expenseCats[data.category] = (expenseCats[data.category] || 0) + amount;
                        if (dailyExp[dateStr] !== undefined) dailyExp[dateStr] += amount;
                        hasExpenses = true;
                    }
                });

                document.getElementById('totalIncome').innerText = `$ ${totalIncome.toLocaleString()}`;
                document.getElementById('totalExpense').innerText = `$ ${totalExpense.toLocaleString()}`;
                document.getElementById('netBalance').innerText = `$ ${(totalIncome - totalExpense).toLocaleString()}`;

                const noDataPie = document.getElementById('noDataPie'); const pieCanvas = document.getElementById('pieChart');
                if(!hasExpenses){ pieCanvas.style.display='none'; noDataPie.style.display='flex'; } 
                else { pieCanvas.style.display='block'; noDataPie.style.display='none'; pieChart.data.labels=Object.keys(expenseCats); pieChart.data.datasets[0].data=Object.values(expenseCats); pieChart.update(); }

                const noDataBar = document.getElementById('noDataBar'); const barCanvas = document.getElementById('barChart');
                if(!Object.values(dailyExp).some(v=>v>0)){ barCanvas.style.display='none'; noDataBar.style.display='flex'; } 
                else { barCanvas.style.display='block'; noDataBar.style.display='none'; barChart.data.labels=Object.keys(dailyExp); barChart.data.datasets[0].data=Object.values(dailyExp); barChart.update(); }

                allRecords.sort((a, b) => {
                    const timeA = a.timestamp ? a.timestamp.toDate().getTime() : 0;
                    const timeB = b.timestamp ? b.timestamp.toDate().getTime() : 0;
                    return timeB - timeA;
                });

                const recordsContainer = document.getElementById('recentRecordsList');
                let recordsHtml = '';
                
                if (allRecords.length === 0) {
                    recordsHtml = '<div class="no-data-msg"><p>目前沒有任何紀錄</p></div>';
                } else {
                    allRecords.slice(0, 20).forEach(r => { // 顯示最近 20 筆
                        const isIncome = r.transactionType === 'income';
                        const typeIcon = isIncome ? '<i class="fa-solid fa-arrow-trend-up income-text"></i>' : '<i class="fa-solid fa-arrow-trend-down expense-text"></i>';
                        const amtColor = isIncome ? 'income-text' : 'expense-text';
                        const dateText = r.timestamp ? r.timestamp.toDate().toLocaleString('zh-TW', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}) : '剛才';
                        const noteText = r.note ? ` - ${r.note}` : '';
                        const recorder = currentScope !== 'personal' && r.userName ? `<br><small style="color:#64748b;">${r.userName}</small>` : '';
                        
                        recordsHtml += `
                            <div class="record-item">
                                <div class="record-info">
                                    <span class="record-cat">${typeIcon} ${r.category}</span>
                                    <span class="record-date-note">${dateText}${noteText}${recorder}</span>
                                </div>
                                <div class="record-actions">
                                    <span class="record-amt ${amtColor}">$ ${r.amount}</span>
                                    <button class="delete-btn" onclick="deleteRecord('${r.id}')"><i class="fa-solid fa-trash"></i></button>
                                </div>
                            </div>
                        `;
                    });
                }
                recordsContainer.innerHTML = recordsHtml;
            });
        }

        window.deleteRecord = async (docId) => {
            if(!confirm("⚠️ 確定要刪除這筆紀錄嗎？刪除後無法復原喔！")) return;
            const collectionName = currentScope === 'personal' ? 'records_personal' : 'records_group';
            try {
                await deleteDoc(doc(db, collectionName, docId));
            } catch (err) {
                console.error(err); alert("刪除失敗，請稍後再試。");
            }
        };

        // 🌟 新增：刪除 / 解散群組功能
        window.deleteCurrentGroup = async () => {
            if(!currentGroupId) return;
            if(!confirm("⚠️ 警告：確定要解散並刪除這個群組嗎？\n此動作將無法復原，所有成員都將失去此群組！")) return;

            try {
                // 從資料庫中刪除群組文件
                await deleteDoc(doc(db, "groups", currentGroupId));
                alert("✅ 群組已成功解散！");
                
                // 切換回個人帳本
                window.switchAccount('personal', '個人帳本');
            } catch (error) {
                console.error(error);
                alert("刪除失敗，請確認您的網路狀態或稍後再試。");
            }
        };

        window.openCreateGroupModal = () => { document.getElementById('createGroupModal').style.display = 'flex'; };
        window.closeModal = (id) => { document.getElementById(id).style.display = 'none'; };
        window.previewImage = (event) => { const file = event.target.files[0]; if(file) { const reader = new FileReader(); reader.onload = e => { document.getElementById('avatarPreview').src = e.target.result; document.getElementById('avatarPreview').style.display = 'block'; }; reader.readAsDataURL(file); } };

        window.handleCreateGroup = async () => {
            const name = document.getElementById('groupNameInput').value.trim();
            const fileInput = document.getElementById('groupAvatarInput');
            const btn = document.getElementById('btnCreateGroup');
            if(!name) return alert("請輸入群組名稱！");
            btn.innerText = "創建中..."; btn.disabled = true;

            try {
                let avatarUrl = "";
                if (fileInput.files.length > 0) {
                    const imageFile = fileInput.files[0];
                    const options = { maxSizeMB: 0.2, maxWidthOrHeight: 500, useWebWorker: true }; 
                    const compressedFile = await imageCompression(imageFile, options);
                    const storageRef = ref(storage, `group_avatars/${Date.now()}_${compressedFile.name}`);
                    await uploadBytes(storageRef, compressedFile);
                    avatarUrl = await getDownloadURL(storageRef);
                }
                const groupId = "G" + Math.floor(10000000 + Math.random() * 90000000).toString(); 
                await setDoc(doc(db, "groups", groupId), { name: name, avatarUrl: avatarUrl, owner: lineUserId, members: [lineUserId], createdAt: serverTimestamp() });
                alert("✅ 群組創建成功！");
                closeModal('createGroupModal'); document.getElementById('groupNameInput').value = ""; document.getElementById('avatarPreview').style.display = "none"; fileInput.value = "";
                window.switchAccount(groupId, name);
            } catch (error) { console.error(error); alert("創建失敗，請稍後再試。"); } finally { btn.innerText = "確認創建"; btn.disabled = false; }
        };

        let qrcodeObj = null;
        window.openInviteModal = () => {
            if(!currentGroupId) return;
            document.getElementById('inviteModal').style.display = 'flex';
            const inviteUrl = `${window.location.origin}${window.location.pathname}?invite=${currentGroupId}`;
            const qrContainer = document.getElementById('qrcode'); qrContainer.innerHTML = "";
            qrcodeObj = new QRCode(qrContainer, { text: inviteUrl, width: 150, height: 150, colorDark : "#000000", colorLight : "#ffffff" });
            window.copyInviteLink = () => { navigator.clipboard.writeText(inviteUrl).then(() => alert("✅ 連結已複製！請傳送給朋友。")); };
            window.shareToLine = () => { window.open(`https://line.me/R/msg/text/?邀請您加入玉露寶庫記帳群組！\n點擊連結立即加入：\n${encodeURIComponent(inviteUrl)}`, '_blank'); };
        };
    </script>
</body>
</html>
