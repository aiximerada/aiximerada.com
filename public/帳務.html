<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帳務總覽 - 玉露寶庫</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.1/dist/browser-image-compression.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --main-gold: #FFD700; --nebula-blue: #00f3ff; --danger-red: #ff4757;
            --glass-bg: rgba(15, 23, 42, 0.85); --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: radial-gradient(circle at top, #1B2735 0%, #090A0F 100%);
            color: #e2e8f0; font-family: 'Microsoft JhengHei', sans-serif;
            min-height: 100vh; margin: 0; padding: 20px;
        }

        /* 🌟 全螢幕適配容器 */
        .dashboard-wrapper {
            max-width: 1800px; /* 增加最大寬度 */
            margin: 0 auto;
            width: 100%;
        }

        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .back-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #94a3b8; padding: 12px 25px; border-radius: 50px; text-decoration: none; transition: 0.3s; }
        .back-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

        /* 標籤區優化 */
        .account-tabs { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 25px; }
        .tab-item { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 12px 25px; border-radius: 15px; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .tab-item.active { background: rgba(0, 243, 255, 0.15); border-color: var(--nebula-blue); color: var(--nebula-blue); box-shadow: 0 0 20px rgba(0, 243, 255, 0.2); }

        /* 🌟 數據卡片佈局 */
        .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 30px; text-align: center; backdrop-filter: blur(10px); }
        .stat-card .amount { font-size: 2.5rem; font-weight: 800; margin-top: 10px; }

        /* 🌟 核心圖表與列表佈局 (重點優化) */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr 1.2fr; /* 三欄式：圓餅圖、長條圖、紀錄列表 */
            gap: 25px;
            align-items: stretch;
        }

        .chart-box { 
            background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 25px; 
            display: flex; flex-direction: column; min-height: 450px;
        }

        /* 紀錄列表高度自適應 */
        .record-container { 
            max-height: 500px; overflow-y: auto; padding-right: 10px; 
        }

        /* 手機板適配 */
        @media (max-width: 1200px) {
            .main-layout { grid-template-columns: 1fr 1fr; } /* 變兩欄 */
            .summary-grid { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
        }
        @media (max-width: 768px) {
            .main-layout { grid-template-columns: 1fr; } /* 變一欄 */
            .stat-card .amount { font-size: 1.8rem; }
        }

        .record-item { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { color: var(--danger-red); background: none; border: 1px solid var(--danger-red); width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }
        .delete-btn:hover { background: var(--danger-red); color: white; }

        .group-btns { margin-bottom: 20px; display: flex; gap: 10px; justify-content: flex-end; }
        .btn-del-group { background: rgba(255, 71, 87, 0.1); color: #ff4757; border: 1px solid #ff4757; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="dashboard-wrapper">
    <div class="nav-bar">
        <a href="vip_area.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> 返回星員區</a>
        <h1 id="pageTitle">讀取中...</h1>
    </div>

    <div class="account-tabs" id="accountTabs">
        </div>

    <div class="group-btns" id="groupControls" style="display:none;">
        <button onclick="openInviteModal()" class="back-btn" style="color:var(--nebula-blue)"><i class="fa-solid fa-user-plus"></i> 邀請</button>
        <button onclick="deleteCurrentGroup()" class="btn-del-group"><i class="fa-solid fa-trash"></i> 解散群組</button>
    </div>

    <div class="summary-grid">
        <div class="stat-card"><h3>總支出</h3><p class="amount" id="totalExpense" style="color:var(--danger-red)">$ 0</p></div>
        <div class="stat-card"><h3>總收入</h3><p class="amount" id="totalIncome" style="color:#00ff9d">$ 0</p></div>
        <div class="stat-card"><h3>結餘</h3><p class="amount" id="netBalance" style="color:var(--nebula-blue)">$ 0</p></div>
    </div>

    <div class="main-layout">
        <div class="chart-box">
            <h3>支出分類</h3>
            <div style="flex:1; position:relative;"><canvas id="pieChart"></canvas></div>
        </div>
        
        <div class="chart-box">
            <h3>近七日趨勢</h3>
            <div style="flex:1; position:relative;"><canvas id="barChart"></canvas></div>
        </div>

        <div class="chart-box">
            <h3>近期紀錄 (最新20筆)</h3>
            <div class="record-container" id="recentRecordsList">
                <p style="color:#64748b; text-align:center; margin-top:50px;">目前尚無紀錄</p>
            </div>
        </div>
    </div>
</div>

<div id="inviteModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center;">
    <div style="background:#0f172a; padding:30px; border-radius:20px; text-align:center; border:1px solid var(--nebula-blue);">
        <h2>邀請成員</h2>
        <div id="qrcode" style="background:#fff; padding:10px; display:inline-block; margin-bottom:20px;"></div>
        <br>
        <button onclick="document.getElementById('inviteModal').style.display='none'" class="back-btn">關閉</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot, doc, getDoc, setDoc, updateDoc, deleteDoc, arrayUnion, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAAo6on0f2QUbPaRfxpIEb2uvhKxDvPUvs",
        authDomain: "yulubox.firebaseapp.com",
        projectId: "yulubox",
        storageBucket: "yulubox.firebasestorage.app",
        messagingSenderId: "256466567852",
        appId: "1:256466567852:web:233b74668908ffcb9b9509"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const lineUserId = localStorage.getItem("lineUserId");
    let currentScope = "personal"; 
    let currentGroupId = null;
    let unsub = null;

    // 圖表初始化
    const pieCtx = document.getElementById('pieChart').getContext('2d');
    const barCtx = document.getElementById('barChart').getContext('2d');
    let pieChart = new Chart(pieCtx, { type: 'doughnut', data: { labels: [], datasets: [{ data: [], backgroundColor: ['#FFD700', '#00f3ff', '#ff4757', '#00ff9d', '#a855f7'] }] }, options: { maintainAspectRatio: false } });
    let barChart = new Chart(barCtx, { type: 'bar', data: { labels: [], datasets: [{ label: '金額', data: [], backgroundColor: '#00f3ff' }] }, options: { maintainAspectRatio: false } });

    window.onload = () => {
        if (!lineUserId) return alert("請先於 LINE 登入");
        loadTabs();
        switchAccount('personal', '個人帳本');
    };

    function loadTabs() {
        const q = query(collection(db, "groups"), where("members", "array-contains", lineUserId));
        onSnapshot(q, (snapshot) => {
            const tabs = document.getElementById('accountTabs');
            let html = `<div class="tab-item ${currentScope==='personal'?'active':''}" onclick="switchAccount('personal', '個人帳本')"><i class="fa-solid fa-user"></i> 個人帳本</div>`;
            snapshot.forEach(doc => {
                const data = doc.data();
                const gName = data.name || "未命名群組";
                html += `<div class="tab-item ${currentScope===doc.id?'active':''}" onclick="switchAccount('${doc.id}', '${gName}')"><i class="fa-solid fa-users"></i> ${gName}</div>`;
            });
            tabs.innerHTML = html;
        });
    }

    window.switchAccount = (scope, name) => {
        currentScope = scope;
        currentGroupId = scope === 'personal' ? null : scope;
        document.getElementById('pageTitle').innerText = name;
        document.getElementById('groupControls').style.display = scope === 'personal' ? 'none' : 'flex';
        
        if (unsub) unsub();
        fetchData(scope);
    };

    function fetchData(scope) {
        const colName = scope === 'personal' ? 'records_personal' : 'records_group';
        const q = scope === 'personal' 
            ? query(collection(db, colName), where("userId", "==", lineUserId))
            : query(collection(db, colName), where("groupId", "==", scope));

        unsub = onSnapshot(q, (snapshot) => {
            let income = 0, expense = 0, catData = {}, dailyData = {};
            let records = [];

            snapshot.forEach(doc => {
                const d = doc.data();
                const amt = d.amount || 0;
                if (d.transactionType === 'income') income += amt;
                else {
                    expense += amt;
                    catData[d.category] = (catData[d.category] || 0) + amt;
                }
                records.push({ id: doc.id, ...d });
            });

            // 更新數據
            document.getElementById('totalIncome').innerText = `$ ${income.toLocaleString()}`;
            document.getElementById('totalExpense').innerText = `$ ${expense.toLocaleString()}`;
            document.getElementById('netBalance').innerText = `$ ${(income - expense).toLocaleString()}`;

            // 更新圓餅圖
            pieChart.data.labels = Object.keys(catData);
            pieChart.data.datasets[0].data = Object.values(catData);
            pieChart.update();

            // 更新列表
            records.sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
            renderRecords(records.slice(0, 20));
        });
    }

    function renderRecords(list) {
        const container = document.getElementById('recentRecordsList');
        if (list.length === 0) {
            container.innerHTML = `<p style="text-align:center; margin-top:50px; color:#64748b;">尚無紀錄</p>`;
            return;
        }
        container.innerHTML = list.map(r => `
            <div class="record-item">
                <div>
                    <div style="font-weight:bold;">${r.category} <small style="color:#64748b; font-weight:normal;">${r.userName || ''}</small></div>
                    <div style="font-size:0.8rem; color:#64748b;">${r.note || '無備註'}</div>
                </div>
                <div style="display:flex; align-items:center; gap:15px;">
                    <span style="color:${r.transactionType==='income'?'#00ff9d':'#ff4757'}; font-weight:bold;">
                        ${r.transactionType==='income'?'+':'-'}$${r.amount}
                    </span>
                    <button class="delete-btn" onclick="deleteSingleRecord('${r.id}')"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>
        `).join('');
    }

    // 🌟 刪除單筆紀錄
    window.deleteSingleRecord = async (id) => {
        if (!confirm("確定要刪除這筆紀錄嗎？")) return;
        const colName = currentScope === 'personal' ? 'records_personal' : 'records_group';
        await deleteDoc(doc(db, colName, id));
    };

    // 🌟 強制刪除群組修正
    window.deleteCurrentGroup = async () => {
        if (!currentGroupId) return;
        if (!confirm("⚠️ 確定要永久解散此群組嗎？此操作不可逆！")) return;

        try {
            const groupRef = doc(db, "groups", currentGroupId);
            await deleteDoc(groupRef);
            alert("群組已成功解散");
            window.switchAccount('personal', '個人帳本');
        } catch (err) {
            console.error("刪除失敗:", err);
            alert("刪除失敗，請檢查權限設定");
        }
    };

    window.openInviteModal = () => {
        const modal = document.getElementById('inviteModal');
        modal.style.display = 'flex';
        const url = `${window.location.origin}${window.location.pathname}?invite=${currentGroupId}`;
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById('qrcode'), { text: url, width: 150, height: 150 });
    };
</script>

</body>
</html>
