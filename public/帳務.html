<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>帳務報表 - 玉露寶庫</title>
    
    <link rel="icon" type="image/png" href="APP圖示.png">
    <link rel="apple-touch-icon" href="APP圖示.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 🔥 升級版匯出套件：ExcelJS (支援圖表插入) 與 html2pdf -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            font-family: 'Microsoft JhengHei', sans-serif; 
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            color: #fff; min-height: 100vh; margin: 0; padding: 0; overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        ::-webkit-scrollbar { display: none; }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .cyber-input {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid #475569;
            color: #fff; border-radius: 12px; box-sizing: border-box; transition: 0.3s;
        }
        .cyber-input:focus { border-color: #00f3ff; outline: none; box-shadow: 0 0 15px rgba(0,243,255,0.2); }
        
        .space-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .star-field { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background-repeat: repeat; opacity: 0.5; animation: rotateSpace 240s linear infinite; }
        .stars-distant { background-image: radial-gradient(1px 1px at 10% 15%, #fff, transparent); background-size: 300px 300px; }
        @keyframes rotateSpace { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 🔥 PDF 匯出模式樣式優化，保護圖表暗色背景 */
        .pdf-export-mode {
            background: #ffffff !important; color: #000000 !important;
            padding: 20px !important;
        }
        .pdf-export-mode .glass-panel:not(.preserve-dark) { background: #ffffff; border: 1px solid #ccc; box-shadow: none; color: #000; }
        .pdf-export-mode .preserve-dark { background: #0f172a !important; border: 1px solid #333 !important; }
        .pdf-export-mode .text-white:not(.preserve-dark *) { color: #000 !important; }
        .pdf-export-mode .text-gray-400:not(.preserve-dark *) { color: #555 !important; }
        .pdf-export-mode .border-white\/10 { border-color: #ccc !important; }
        .pdf-export-mode .bg-black\/40 { background: #f8f9fa !important; }
        .pdf-export-mode .pdf-show { display: block !important; }
    </style>
</head>
<body>
    <div class="space-container"><div class="star-field stars-distant"></div></div>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef, useMemo } = React;

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, updateDoc, doc, getDoc, query, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAAo6on0f2QUbPaRfxpIEb2uvhKxDvPUvs",
            authDomain: "yulubox.firebaseapp.com",
            projectId: "yulubox",
            storageBucket: "yulubox.firebasestorage.app",
            messagingSenderId: "256466567852",
            appId: "1:256466567852:web:233b74668908ffcb9b9509"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Chart.js 通用元件包裝器 (加入強制深色背景外掛，確保截圖匯出時不會變透明黑底字)
        const ChartComponent = ({ type, data, options }) => {
            const canvasRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (!canvasRef.current) return;
                const ctx = canvasRef.current.getContext('2d');
                
                if (chartInstance.current) {
                    chartInstance.current.destroy();
                }
                
                chartInstance.current = new Chart(ctx, {
                    type: type,
                    data: data,
                    options: options,
                    plugins: [{
                        id: 'customCanvasBackgroundColor',
                        beforeDraw: (chart) => {
                            const {ctx} = chart;
                            ctx.save();
                            ctx.globalCompositeOperation = 'destination-over';
                            ctx.fillStyle = '#0f172a';
                            ctx.fillRect(0, 0, chart.width, chart.height);
                            ctx.restore();
                        }
                    }]
                });

                return () => {
                    if (chartInstance.current) chartInstance.current.destroy();
                };
            }, [type, data, options]);

            return <canvas ref={canvasRef}></canvas>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [records, setRecords] = useState([]);
            const [loading, setLoading] = useState(true);
            const [filterMonth, setFilterMonth] = useState('all');
            const [authError, setAuthError] = useState(false);
            
            const [editingRecord, setEditingRecord] = useState(null);
            const [editForm, setEditForm] = useState({});

            useEffect(() => {
                const now = new Date();
                const currentMonthStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

                const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
                    if (currentUser && !currentUser.isAnonymous) {
                        setUser(currentUser);
                        
                        let lineId = localStorage.getItem("lineUserId");
                        try {
                            const userDoc = await getDoc(doc(db, "users", currentUser.uid));
                            if (userDoc.exists() && userDoc.data().lineUserId) {
                                lineId = userDoc.data().lineUserId;
                            }
                        } catch (e) {
                            console.error("讀取用戶資料庫失敗:", e);
                        }

                        const searchIds = [currentUser.uid];
                        if (lineId && !searchIds.includes(lineId)) {
                            searchIds.push(lineId);
                        }

                        fetchRecords(searchIds, currentMonthStr);
                    } else {
                        setAuthError(true);
                        setLoading(false);
                    }
                });
                return () => unsubscribe();
            }, []);

            const fetchRecords = async (searchIds, defaultMonth) => {
                setLoading(true);
                try {
                    const q = query(collection(db, "records_personal"), where("userId", "in", searchIds));
                    const snap = await getDocs(q);
                    let data = [];
                    snap.forEach(doc => {
                        const rec = doc.data();
                        if (rec.timestamp) {
                            data.push({ id: doc.id, ...rec });
                        }
                    });

                    data.sort((a, b) => b.timestamp.seconds - a.timestamp.seconds);

                    data = data.map(rec => {
                        const date = new Date(rec.timestamp.seconds * 1000);
                        return {
                            ...rec,
                            dateStr: `${date.getFullYear()}/${String(date.getMonth() + 1).padStart(2, '0')}/${String(date.getDate()).padStart(2, '0')}`,
                            monthKey: `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`
                        };
                    });

                    setRecords(data);
                    
                    if (data.some(r => r.monthKey === defaultMonth)) {
                        setFilterMonth(defaultMonth);
                    } else {
                        setFilterMonth('all');
                    }
                } catch (e) {
                    console.error("讀取帳務紀錄失敗:", e);
                }
                setLoading(false);
            };

            const filteredRecords = useMemo(() => {
                return records.filter(r => filterMonth === 'all' || r.monthKey === filterMonth);
            }, [records, filterMonth]);

            const totalIncome = filteredRecords.filter(r => r.transactionType === 'income').reduce((sum, r) => sum + r.amount, 0);
            const totalExpense = filteredRecords.filter(r => r.transactionType === 'expense').reduce((sum, r) => sum + r.amount, 0);
            const netIncome = totalIncome - totalExpense;
            
            const doughnutData = useMemo(() => {
                const categorySums = {};
                filteredRecords.forEach(r => {
                    if (r.transactionType === 'expense') {
                        categorySums[r.category] = (categorySums[r.category] || 0) + r.amount;
                    }
                });
                return {
                    labels: Object.keys(categorySums),
                    datasets: [{
                        data: Object.values(categorySums),
                        backgroundColor: ['#ff4757', '#ffa502', '#2ed573', '#1e90ff', '#3742fa', '#bc13fe', '#FFD700', '#ff6348'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                };
            }, [filteredRecords]);

            const barData = useMemo(() => {
                const trendData = {};
                filteredRecords.forEach(r => {
                    const key = filterMonth === 'all' ? r.monthKey : r.dateStr.split('/')[2]; 
                    if (!trendData[key]) trendData[key] = { income: 0, expense: 0 };
                    trendData[key][r.transactionType] += r.amount;
                });
                const sortedKeys = Object.keys(trendData).sort();
                return {
                    labels: sortedKeys.map(k => filterMonth === 'all' ? k : `${k}日`),
                    datasets: [
                        { label: '收入', data: sortedKeys.map(k => trendData[k].income), backgroundColor: '#00ff9d', borderRadius: 4 },
                        { label: '支出', data: sortedKeys.map(k => trendData[k].expense), backgroundColor: '#ff4757', borderRadius: 4 }
                    ]
                };
            }, [filteredRecords, filterMonth]);

            const doughnutOptions = useMemo(() => ({
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { position: 'right', labels: { color: '#e2e8f0', padding: 20, font: { family: 'Microsoft JhengHei' } } } },
                cutout: '70%',
            }), []);

            const barOptions = useMemo(() => ({
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { position: 'top', labels: { color: '#e2e8f0', font: { family: 'Microsoft JhengHei' } } } },
                scales: {
                    y: { beginAtZero: true, ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.05)' }, border: { display: false } },
                    x: { ticks: { color: '#94a3b8', font: { family: 'Microsoft JhengHei' } }, grid: { display: false }, border: { display: false } }
                }
            }), []);

            // 🔥 匯出 Excel (使用 ExcelJS，支援插入圖表)
            const exportExcel = async () => {
                const workbook = new ExcelJS.Workbook();
                const worksheet = workbook.addWorksheet('帳務報表');

                worksheet.columns = [
                    { header: '日期', key: 'date', width: 15 },
                    { header: '類型', key: 'type', width: 10 },
                    { header: '分類', key: 'category', width: 20 },
                    { header: '金額', key: 'amount', width: 15 },
                    { header: '備註', key: 'note', width: 30 }
                ];
                worksheet.getRow(1).font = { bold: true };

                filteredRecords.forEach(r => {
                    worksheet.addRow({
                        date: r.dateStr,
                        type: r.transactionType === 'income' ? '收入' : '支出',
                        category: r.category,
                        amount: r.amount,
                        note: r.note || '無'
                    });
                });

                worksheet.addRow({});
                worksheet.addRow({ date: '總收入', type: totalIncome });
                worksheet.addRow({ date: '總支出', type: totalExpense });
                worksheet.addRow({ date: '結餘', type: netIncome });

                const lastRow = worksheet.lastRow.number;
                worksheet.getRow(lastRow - 2).font = { bold: true, color: { argb: 'FF00B050' } };
                worksheet.getRow(lastRow - 1).font = { bold: true, color: { argb: 'FFFF0000' } };
                worksheet.getRow(lastRow).font = { bold: true };

                // 抓取頁面上的 Canvas 圖表並轉換為 Base64 寫入 Excel
                const canvases = document.querySelectorAll('canvas');
                if (canvases.length >= 2) {
                    try {
                        const pieBase64 = canvases[0].toDataURL('image/png');
                        const barBase64 = canvases[1].toDataURL('image/png');

                        const pieImageId = workbook.addImage({ base64: pieBase64, extension: 'png' });
                        const barImageId = workbook.addImage({ base64: barBase64, extension: 'png' });

                        worksheet.addImage(pieImageId, { tl: { col: 6, row: 1 }, ext: { width: 400, height: 250 } });
                        worksheet.addImage(barImageId, { tl: { col: 6, row: 15 }, ext: { width: 500, height: 250 } });
                    } catch (err) {
                        console.error('圖表匯出失敗:', err);
                    }
                }

                const buffer = await workbook.xlsx.writeBuffer();
                saveAs(new Blob([buffer]), `玉露寶庫_帳務報表_${filterMonth === 'all' ? '全部' : filterMonth}.xlsx`);
            };

            // 🔥 下載 PDF (自動隱藏不必要的按鈕，保留圖表)
            const exportPDF = () => {
                const element = document.getElementById('report-area');
                element.classList.add('pdf-export-mode'); 
                
                const opt = {
                    margin:       [10, 10, 10, 10], 
                    filename:     `玉露寶庫_財務報表_${filterMonth === 'all' ? '全部' : filterMonth}.pdf`,
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2, useCORS: true },
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };

                setTimeout(() => {
                    html2pdf().set(opt).from(element).save().then(() => {
                        element.classList.remove('pdf-export-mode');
                    });
                }, 100);
            };

            const openEditModal = (record) => {
                setEditingRecord(record);
                setEditForm({ category: record.category, amount: record.amount, transactionType: record.transactionType, note: record.note || '' });
            };

            const saveEdit = async () => {
                if (!editForm.category || !editForm.amount) return alert("請填寫完整資訊");
                try {
                    await updateDoc(doc(db, "records_personal", editingRecord.id), {
                        category: editForm.category, amount: Number(editForm.amount), transactionType: editForm.transactionType, note: editForm.note
                    });
                    setRecords(prev => prev.map(r => r.id === editingRecord.id ? { ...r, ...editForm, amount: Number(editForm.amount) } : r));
                    setEditingRecord(null);
                } catch (e) { alert("修改失敗：" + e.message); }
            };

            const deleteRecord = async (id) => {
                if (!confirm("確定要刪除這筆紀錄嗎？這無法復原。")) return;
                try {
                    await deleteDoc(doc(db, "records_personal", id));
                    setRecords(prev => prev.filter(r => r.id !== id));
                } catch (e) { alert("刪除失敗"); }
            };

            if (loading) {
                return <div className="min-h-screen flex flex-col items-center justify-center text-[#00f3ff]"><i className="fa-solid fa-circle-notch fa-spin text-5xl mb-4"></i><p className="font-bold tracking-widest">系統資料核對中...</p></div>;
            }

            if (authError) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 text-center z-10 relative">
                        <div className="glass-panel p-8 rounded-3xl max-w-sm w-full">
                            <i className="fa-solid fa-user-lock text-5xl text-[#ff4757] mb-4"></i>
                            <h2 className="text-2xl font-bold text-white mb-2">權限驗證失敗</h2>
                            <p className="text-gray-400 mb-6">您需要登入會員才能檢視與管理個人帳務報表。</p>
                            <a href="login.html" className="block w-full py-3 rounded-xl bg-gradient-to-r from-[#00f3ff] to-[#bc13fe] text-white font-bold hover:shadow-[0_0_15px_rgba(0,243,255,0.5)] transition-all">前往登入畫面</a>
                        </div>
                    </div>
                );
            }

            const monthOptions = Array.from(new Set(records.map(r => r.monthKey)));

            return (
                <div className="w-full max-w-5xl mx-auto px-4 py-8 pb-20 relative z-10">
                    <div className="flex flex-col md:flex-row justify-between items-center gap-4 mb-8">
                        <a href="vip_area.html" className="text-[#00f3ff] hover:text-white transition-colors font-bold self-start md:self-auto flex items-center gap-2">
                            <i className="fa-solid fa-chevron-left"></i> 返回星員區
                        </a>
                        <div className="flex gap-2 w-full md:w-auto">
                            <button onClick={exportExcel} className="flex-1 md:flex-none bg-emerald-600/80 hover:bg-emerald-500 border border-emerald-500 px-4 py-2.5 rounded-xl text-sm font-bold transition-all shadow-[0_0_15px_rgba(16,185,129,0.3)] flex items-center justify-center gap-2">
                                <i className="fa-solid fa-file-excel"></i> 匯出 Excel
                            </button>
                            <button onClick={exportPDF} className="flex-1 md:flex-none bg-red-600/80 hover:bg-red-500 border border-red-500 px-4 py-2.5 rounded-xl text-sm font-bold transition-all shadow-[0_0_15px_rgba(239,68,68,0.3)] flex items-center justify-center gap-2">
                                <i className="fa-solid fa-file-pdf"></i> 下載 PDF
                            </button>
                        </div>
                    </div>

                    <div id="report-area" className="p-2">
                        <div className="text-center mb-10">
                            <h1 className="text-3xl md:text-4xl font-black mb-2 text-[#FFD700] tracking-widest drop-shadow-[0_0_10px_rgba(255,215,0,0.5)]">財務結算報表</h1>
                            <p className="text-gray-400 text-sm mt-1">Personal Financial Report</p>
                        </div>

                        <div className="flex flex-col md:flex-row justify-end items-center mb-4 gap-4" data-html2canvas-ignore>
                            <div className="relative w-full md:w-auto">
                                <i className="fa-regular fa-calendar absolute left-4 top-1/2 -translate-y-1/2 text-[#00f3ff]"></i>
                                <select value={filterMonth} onChange={(e) => setFilterMonth(e.target.value)} className="w-full md:w-auto bg-black/60 border border-[#00f3ff]/50 rounded-xl pl-10 pr-6 py-3 text-white font-bold outline-none focus:border-[#FFD700] transition-colors appearance-none shadow-[0_0_10px_rgba(0,243,255,0.2)]">
                                    <option value="all">顯示所有歷史紀錄</option>
                                    {monthOptions.map(m => <option key={m} value={m}>{m.replace('-', ' 年 ')} 月份</option>)}
                                </select>
                            </div>
                        </div>
                        
                        <div className="hidden pdf-show text-lg font-bold text-gray-600 text-right mb-4">
                            報表區間: {filterMonth === 'all' ? '所有紀錄' : filterMonth}
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                            <div className="glass-panel p-6 rounded-2xl text-center border-t-4 border-[#00ff9d]">
                                <p className="text-gray-400 text-sm font-bold mb-2">總收入</p>
                                <p className="text-3xl font-black text-[#00ff9d] drop-shadow-[0_0_8px_rgba(0,255,157,0.5)]">$ {totalIncome.toLocaleString()}</p>
                            </div>
                            <div className="glass-panel p-6 rounded-2xl text-center border-t-4 border-[#ff4757]">
                                <p className="text-gray-400 text-sm font-bold mb-2">總支出</p>
                                <p className="text-3xl font-black text-[#ff4757] drop-shadow-[0_0_8px_rgba(255,71,87,0.5)]">$ {totalExpense.toLocaleString()}</p>
                            </div>
                            <div className="glass-panel p-6 rounded-2xl text-center border-t-4 border-[#00f3ff] relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-full bg-gradient-to-br from-[#00f3ff]/10 to-transparent pointer-events-none"></div>
                                <p className="text-gray-400 text-sm font-bold mb-2 relative z-10">本期結餘</p>
                                <p className={`text-4xl font-black drop-shadow-[0_0_10px_rgba(0,243,255,0.5)] relative z-10 ${netIncome >= 0 ? 'text-[#00f3ff]' : 'text-[#ff4757]'}`}>$ {netIncome.toLocaleString()}</p>
                            </div>
                        </div>

                        {/* 🔥 移除了 data-html2canvas-ignore，並加入 preserve-dark 使圖表在 PDF 也能保持暗系背景與白字 */}
                        {filteredRecords.length > 0 && (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                                <div className="glass-panel preserve-dark p-6 rounded-3xl">
                                    <h3 className="text-lg font-bold mb-4 text-white flex items-center gap-2">
                                        <i className="fa-solid fa-chart-pie text-[#FFD700]"></i> 支出分類佔比
                                    </h3>
                                    <div className="relative h-64 w-full">
                                        {totalExpense > 0 ? (
                                            <ChartComponent type="doughnut" data={doughnutData} options={doughnutOptions} />
                                        ) : (
                                            <div className="w-full h-full flex items-center justify-center text-gray-500 text-sm">無支出紀錄</div>
                                        )}
                                    </div>
                                </div>
                                
                                <div className="glass-panel preserve-dark p-6 rounded-3xl">
                                    <h3 className="text-lg font-bold mb-4 text-white flex items-center gap-2">
                                        <i className="fa-solid fa-chart-column text-[#00f3ff]"></i> 收支趨勢圖
                                    </h3>
                                    <div className="relative h-64 w-full">
                                        <ChartComponent type="bar" data={barData} options={barOptions} />
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="glass-panel rounded-3xl p-6 md:p-8">
                            <h2 className="text-xl font-bold flex items-center gap-2 text-white mb-6 border-b border-white/10 pb-4">
                                <i className="fa-solid fa-list-ul text-[#bc13fe]"></i> 收支明細紀錄
                            </h2>

                            {filteredRecords.length === 0 ? (
                                <div className="text-center py-16 text-gray-500 flex flex-col items-center gap-3">
                                    <i className="fa-solid fa-box-open text-4xl"></i>
                                    <p>此區間尚無帳務紀錄</p>
                                </div>
                            ) : (
                                <div className="space-y-3">
                                    {filteredRecords.map(r => (
                                        <div key={r.id} className="bg-black/40 border border-white/10 rounded-xl p-4 flex flex-col md:flex-row justify-between items-center gap-4 hover:border-[#00f3ff] transition-colors">
                                            <div className="flex items-center gap-4 w-full md:w-auto">
                                                <div className={`w-12 h-12 rounded-full flex items-center justify-center text-xl shadow-lg flex-shrink-0 ${r.transactionType === 'income' ? 'bg-[#00ff9d]/20 text-[#00ff9d]' : 'bg-[#ff4757]/20 text-[#ff4757]'}`}>
                                                    <i className={`fa-solid ${r.transactionType === 'income' ? 'fa-arrow-down' : 'fa-arrow-up'}`}></i>
                                                </div>
                                                <div className="flex-1">
                                                    <div className="font-bold text-lg text-white flex items-center gap-2">
                                                        {r.category}
                                                        {r.note && <span className="bg-white/10 text-gray-300 text-[10px] px-2 py-0.5 rounded-md truncate max-w-[150px]"><i className="fa-solid fa-pen-clip"></i> {r.note}</span>}
                                                    </div>
                                                    <div className="text-xs text-gray-400 mt-1"><i className="fa-regular fa-clock"></i> {r.dateStr}</div>
                                                </div>
                                            </div>

                                            <div className="flex items-center justify-between w-full md:w-auto gap-6 border-t md:border-t-0 border-white/5 pt-3 md:pt-0 mt-2 md:mt-0">
                                                <div className={`font-black text-2xl tracking-wider ${r.transactionType === 'income' ? 'text-[#00ff9d]' : 'text-[#ff4757]'}`}>
                                                    {r.transactionType === 'income' ? '+' : '-'} $ {r.amount.toLocaleString()}
                                                </div>
                                                <div className="flex gap-2" data-html2canvas-ignore>
                                                    <button onClick={() => openEditModal(r)} className="w-9 h-9 rounded-lg bg-blue-500/20 text-blue-400 flex items-center justify-center hover:bg-blue-500 hover:text-white transition-colors" title="編輯">
                                                        <i className="fa-solid fa-pen text-sm"></i>
                                                    </button>
                                                    <button onClick={() => deleteRecord(r.id)} className="w-9 h-9 rounded-lg bg-red-500/20 text-red-400 flex items-center justify-center hover:bg-red-500 hover:text-white transition-colors" title="刪除">
                                                        <i className="fa-solid fa-trash text-sm"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>

                    {editingRecord && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="glass-panel rounded-3xl p-6 md:p-8 w-full max-w-md animate-in zoom-in-95 border border-[#FFD700]/50 shadow-[0_0_40px_rgba(255,215,0,0.2)]">
                                <h3 className="text-2xl font-bold text-[#FFD700] mb-6 flex items-center gap-2">
                                    <i className="fa-solid fa-pen-to-square"></i> 修改交易明細
                                </h3>
                                <div className="space-y-5">
                                    <div>
                                        <label className="text-xs text-gray-400 font-bold mb-1 block">收支類型</label>
                                        <select value={editForm.transactionType} onChange={e=>setEditForm({...editForm, transactionType: e.target.value})} className="cyber-input appearance-none cursor-pointer">
                                            <option value="expense">支出 (Expense)</option>
                                            <option value="income">收入 (Income)</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-xs text-gray-400 font-bold mb-1 block">分類名稱</label>
                                        <input type="text" value={editForm.category} onChange={e=>setEditForm({...editForm, category: e.target.value})} className="cyber-input" placeholder="例如：午餐、薪水" />
                                    </div>
                                    <div>
                                        <label className="text-xs text-gray-400 font-bold mb-1 block">金額</label>
                                        <input type="number" value={editForm.amount} onChange={e=>setEditForm({...editForm, amount: e.target.value})} className="cyber-input font-bold text-2xl text-[#00f3ff]" />
                                    </div>
                                    <div>
                                        <label className="text-xs text-gray-400 font-bold mb-1 block">備註說明</label>
                                        <input type="text" value={editForm.note} onChange={e=>setEditForm({...editForm, note: e.target.value})} className="cyber-input" placeholder="選填" />
                                    </div>
                                </div>
                                <div className="flex gap-3 mt-8">
                                    <button onClick={() => setEditingRecord(null)} className="flex-1 py-3 rounded-xl border border-gray-500 text-gray-300 hover:bg-gray-800 font-bold transition-colors">取消</button>
                                    <button onClick={saveEdit} className="flex-[2] py-3 rounded-xl bg-gradient-to-r from-[#00f3ff] to-[#bc13fe] text-white font-bold hover:shadow-[0_0_20px_rgba(0,243,255,0.4)] transition-all active:scale-95">儲存變更</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
