<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>2026北海道之旅</title>
    
    <!-- 🔥 PWA 與 加入主畫面 (Add to Home Screen) 專屬設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="2026北海道之旅">
    <meta name="application-name" content="2026北海道之旅">
    <meta name="theme-color" content="#0A0E1A">
    
    <!-- APP 圖示 -->
    <link rel="icon" type="image/png" href="APP圖示.png">
    <link rel="apple-touch-icon" href="APP圖示.png">

    <!-- 動態產生 PWA Manifest -->
    <link rel="manifest" id="dynamic-manifest">
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const manifest = {
                name: "2026北海道之旅",
                short_name: "北海道之旅",
                start_url: window.location.pathname,
                display: "standalone",
                background_color: "#0A0E1A",
                theme_color: "#0A0E1A",
                icons: [
                    { src: "APP圖示.png", sizes: "192x192", type: "image/png" },
                    { src: "APP圖示.png", sizes: "512x512", type: "image/png", purpose: "any maskable" }
                ]
            };
            const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
            document.getElementById('dynamic-manifest').href = URL.createObjectURL(blob);
        });
    </script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React 核心 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root { color-scheme: dark; }

        body { 
            font-family: 'Microsoft JhengHei', 'Noto Serif TC', serif; 
            background-color: #0A0E1A;
            margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* 隱藏橫向滾動條 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 特效動畫 */
        @keyframes snowfall {
            0% { transform: translateY(-10px); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(200px); opacity: 0; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease forwards; }

        /* 輸入框美化 */
        input, textarea, select {
            background: #131827 !important;
            border: 1px solid #252C42 !important;
            color: #E8ECF4 !important;
            padding: 10px 12px !important;
            border-radius: 8px !important;
            font-family: inherit !important;
            font-size: 16px !important; 
            outline: none !important;
            transition: border-color 0.2s !important;
            width: 100%;
            box-sizing: border-box;
        }
        input:focus, textarea:focus, select:focus {
            border-color: #E63946 !important;
        }
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(1); opacity: 0.6; cursor: pointer;
        }
        
        /* 修正搜尋與排序輸入框跟圖示重疊的問題 */
        .pl-icon {
            padding-left: 38px !important;
        }

        button:active { transform: scale(0.96); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;
        const { createRoot } = ReactDOM;

        // --- Firebase Imports ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        // 🔥 Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAAo6on0f2QUbPaRfxpIEb2uvhKxDvPUvs",
            authDomain: "yulubox.firebaseapp.com",
            projectId: "yulubox",
            storageBucket: "yulubox.firebasestorage.app",
            messagingSenderId: "256466567852",
            appId: "1:256466567852:web:233b74668908ffcb9b9509"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // ============ DEFAULT DATA ============
        const DEFAULT_DATA = {
            tripTitle: '北海道 2026',
            tripDates: '2026.07.11 - 07.19 · 9 天 8 夜',
            countdown: '2026-07-11',
            itinerary: [], family: [], luggage: [], flights: [], hotels: [], 
            transport: [], foods: [], tickets: [], coupons: [], shopping: [], expenses: [], ideas: '',
        };

        const theme = {
            bg: '#0A0E1A', bgCard: '#131827', bgCardHover: '#1A2033', border: '#252C42', 
            text: '#E8ECF4', textMuted: '#8A93A8', textDim: '#5A6378',
            accent: '#E63946', accent2: '#F4A261', success: '#52B788', snow: '#E8F1F8',
        };

        // ============ HELPERS ============
        const compressImage = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_SIZE = 1200;
                        let { width, height } = img;
                        if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                        else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob(async (blob) => {
                            if(!blob) return reject('壓縮失敗');
                            try {
                                const safeName = `hokkaido_2026_${Date.now()}_${Math.random().toString(36).substr(2,5)}.webp`;
                                const storageRef = ref(storage, `artifacts/ghost-trip-hokkaido/public/data/${safeName}`);
                                const uploadTask = await uploadBytesResumable(storageRef, blob);
                                const url = await getDownloadURL(uploadTask.ref);
                                resolve(url);
                            } catch(e) { reject('雲端上傳失敗'); }
                        }, 'image/webp', 0.6);
                    };
                };
                reader.onerror = error => reject(error);
            });
        };

        const matchSearch = (item, term) => {
            if (!term) return true;
            const lowerTerm = term.toLowerCase();
            return Object.values(item).some(val => String(val).toLowerCase().includes(lowerTerm));
        };

        const sortData = (dataArray, sortBy, dateField = 'date', nameField = 'name', priceField = 'amount') => {
            return [...dataArray].sort((a, b) => {
                if (sortBy === 'date_asc') {
                    const strA = (a[dateField] || '') + ' ' + (a.time || '');
                    const strB = (b[dateField] || '') + ' ' + (b.time || '');
                    return strA.localeCompare(strB);
                }
                if (sortBy === 'date_desc') {
                    const strA = (a[dateField] || '') + ' ' + (a.time || '');
                    const strB = (b[dateField] || '') + ' ' + (b.time || '');
                    return strB.localeCompare(strA);
                }
                if (sortBy === 'name_asc') return String(a[nameField] || '').localeCompare(String(b[nameField] || ''));
                if (sortBy === 'price_desc') return (Number(b[priceField]) || 0) - (Number(a[priceField]) || 0);
                if (sortBy === 'rating_desc') return (Number(b.rating) || 0) - (Number(a.rating) || 0);
                return 0;
            });
        };

        // ============ MAIN APP ============
        function App() {
            const [data, setData] = useState(DEFAULT_DATA);
            const [activeTab, setActiveTab] = useState('home');
            const [loading, setLoading] = useState(true);
            const [syncStatus, setSyncStatus] = useState('syncing');
            const [exchangeRate, setExchangeRate] = useState(0.21); 

            useEffect(() => {
                fetch('https://open.er-api.com/v6/latest/JPY')
                    .then(res => res.json())
                    .then(apiData => {
                        if(apiData && apiData.rates && apiData.rates.TWD) {
                            setExchangeRate(parseFloat(apiData.rates.TWD.toFixed(4)));
                        }
                    }).catch(e => console.error("無法取得即時匯率:", e));

                const localData = localStorage.getItem('hokkaido_trip_data');
                if (localData) {
                    try { setData(JSON.parse(localData)); setLoading(false); } catch(e){}
                }

                const initAuth = async () => {
                    try { await signInAnonymously(auth); } 
                    catch (e) { console.error("Auth Error", e); setLoading(false); setSyncStatus('error'); }
                };
                initAuth();

                const unsubscribeAuth = onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        const docRef = doc(db, 'artifacts', 'ghost-trip-hokkaido', 'public', 'data', 'trip_data', 'main');
                        const unsubscribeDb = onSnapshot(docRef, (docSnap) => {
                            if (docSnap.exists()) {
                                const dbData = { ...DEFAULT_DATA, ...docSnap.data() };
                                setData(dbData);
                                localStorage.setItem('hokkaido_trip_data', JSON.stringify(dbData));
                            } else {
                                setDoc(docRef, DEFAULT_DATA).catch(e => {
                                    console.error("建立初始檔案失敗", e);
                                    setSyncStatus('error');
                                });
                                setData(DEFAULT_DATA);
                            }
                            setLoading(false);
                            setSyncStatus('synced');
                        }, (error) => {
                            console.error("Snapshot Error", error);
                            setSyncStatus('error');
                            if (error.code === 'permission-denied') {
                                alert("⚠️ 資料庫連線失敗：權限不足！\n請確認 Firebase Rules 是否允許存取。");
                            }
                        });
                        return () => unsubscribeDb();
                    } else {
                        try { await signInAnonymously(auth); } catch (e) { console.error("匿名連線失敗", e); setLoading(false); setSyncStatus('error'); }
                    }
                });
                return () => unsubscribeAuth();
            }, []);

            const saveData = async (newData) => {
                setData(newData);
                localStorage.setItem('hokkaido_trip_data', JSON.stringify(newData));
                setSyncStatus('syncing');
                try {
                    const docRef = doc(db, 'artifacts', 'ghost-trip-hokkaido', 'public', 'data', 'trip_data', 'main');
                    await setDoc(docRef, newData, { merge: true });
                    setSyncStatus('synced');
                } catch (e) { 
                    console.error("Save Error", e); 
                    setSyncStatus('error'); 
                    alert("儲存失敗！請確認網路連線。資料已暫存在您的手機中。");
                }
            };

            const uploadImageFn = compressImage;
            const daysLeft = Math.ceil((new Date(data.countdown) - new Date()) / (1000 * 60 * 60 * 24));

            const tabs = [
                { id: 'home', icon: 'fa-solid fa-wand-magic-sparkles', label: '總覽' },
                { id: 'itinerary', icon: 'fa-regular fa-calendar-days', label: '日程表' },
                { id: 'family', icon: 'fa-solid fa-users', label: '成員' },
                { id: 'luggage', icon: 'fa-solid fa-suitcase', label: '行李' },
                { id: 'flights', icon: 'fa-solid fa-plane-departure', label: '航班' },
                { id: 'hotels', icon: 'fa-solid fa-hotel', label: '住宿' },
                { id: 'transport', icon: 'fa-solid fa-train-subway', label: '交通' },
                { id: 'tickets', icon: 'fa-solid fa-ticket-simple', label: '門票' },
                { id: 'foods', icon: 'fa-solid fa-utensils', label: '美食' },
                { id: 'shopping', icon: 'fa-solid fa-bag-shopping', label: '購物' },
                { id: 'coupons', icon: 'fa-solid fa-ticket', label: '優惠券' },
                { id: 'expenses', icon: 'fa-solid fa-wallet', label: '記帳' },
                { id: 'extras', icon: 'fa-solid fa-language', label: '小幫手' },
            ];

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#0A0E1A] text-[#8A93A8]">
                        <div className="text-center">
                            <div className="text-6xl mb-4 animate-bounce">🇯🇵</div>
                            <div className="tracking-widest text-sm animate-pulse">連線到北海道...</div>
                        </div>
                    </div>
                );
            }

            return (
                <div style={{ minHeight: '100vh', background: `linear-gradient(180deg, ${theme.bg} 0%, #0F1422 100%)`, color: theme.text }}>
                    <div style={{ position: 'relative', height: 180, background: `linear-gradient(135deg, #1a1f3a 0%, #2d1b3d 50%, #1a1f3a 100%)`, overflow: 'hidden', borderBottom: `1px solid ${theme.border}` }}>
                        <div style={{ position: 'absolute', inset: 0, opacity: 0.6 }}>
                            {[...Array(30)].map((_, i) => (
                                <div key={i} style={{
                                    position: 'absolute', left: `${(i * 37) % 100}%`, top: `${(i * 23) % 100}%`,
                                    width: 2 + (i % 3), height: 2 + (i % 3), borderRadius: '50%', background: theme.snow,
                                    opacity: 0.3 + (i % 5) * 0.1, animation: `snowfall ${8 + (i % 5)}s linear infinite`, animationDelay: `${i * 0.3}s`
                                }} />
                            ))}
                        </div>
                        <div className="relative px-6 py-6 flex justify-between items-start max-w-6xl mx-auto h-full pt-10">
                            <div>
                                <div className="text-3xl mb-1">🇯🇵</div>
                                <h1 style={{ fontSize: '2rem', fontWeight: 900, margin: 0, letterSpacing: 2, background: `linear-gradient(90deg, ${theme.snow} 0%, ${theme.accent} 100%)`, WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>
                                    {data.tripTitle}
                                </h1>
                                <div style={{ fontSize: 12, color: theme.textMuted, letterSpacing: 1, marginTop: 4 }}>{data.tripDates}</div>
                            </div>
                            <div className="text-right">
                                <div className={`text-[10px] tracking-widest px-2 py-1 rounded-md border flex items-center gap-1 mb-2 inline-flex ${syncStatus === 'error' ? 'bg-red-500/20 border-red-500 text-red-500' : 'bg-white/5 border-white/10 text-[#5A6378]'}`}>
                                    {syncStatus === 'syncing' && <><i className="fa-solid fa-rotate fa-spin text-[#00f3ff]"></i> 同步中</>}
                                    {syncStatus === 'synced' && <><i className="fa-solid fa-cloud-check text-[#00ff9d]"></i> 已儲存</>}
                                    {syncStatus === 'error' && <><i className="fa-solid fa-triangle-exclamation"></i> 離線/錯誤</>}
                                </div>
                                {daysLeft > 0 && (
                                    <div>
                                        <div style={{ fontSize: 10, color: theme.textDim, letterSpacing: 2 }}>倒數</div>
                                        <div style={{ fontSize: 28, fontWeight: 900, color: theme.accent }}>{daysLeft}</div>
                                        <div style={{ fontSize: 10, color: theme.textDim }}>天</div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    <div className="flex flex-col md:flex-row w-full max-w-6xl mx-auto">
                        <nav className="flex md:flex-col overflow-x-auto md:overflow-visible bg-[#131827] md:bg-transparent sticky top-0 z-50 md:z-auto border-b md:border-b-0 md:border-r border-[#252C42] no-scrollbar p-2 md:p-6 md:w-56 flex-shrink-0 gap-2 md:gap-1">
                            {tabs.map(tab => {
                                const active = activeTab === tab.id;
                                return (
                                    <button key={tab.id} onClick={() => setActiveTab(tab.id)} 
                                        className={`flex items-center gap-2 px-4 py-2.5 md:py-3 rounded-lg font-bold text-sm whitespace-nowrap transition-all border-b-2 md:border-b-0 md:border-l-4 ${active ? 'bg-[#E63946]/10 text-white border-[#E63946]' : 'text-[#8A93A8] border-transparent hover:bg-white/5'}`}>
                                        <i className={tab.icon}></i>
                                        <span>{tab.label}</span>
                                        {active && <i className="fa-solid fa-chevron-right hidden md:block ml-auto text-[10px]"></i>}
                                    </button>
                                );
                            })}
                        </nav>

                        <main className="flex-1 p-4 md:p-8 min-w-0 pb-24">
                            {activeTab === 'home' && <HomeTab data={data} save={saveData} daysLeft={daysLeft} setActiveTab={setActiveTab} exchangeRate={exchangeRate} />}
                            {activeTab === 'itinerary' && <ItineraryTab data={data} save={saveData} />}
                            {activeTab === 'family' && <FamilyTab data={data} save={saveData} uploadImageFn={uploadImageFn} />}
                            {activeTab === 'luggage' && <LuggageTab data={data} save={saveData} />}
                            {activeTab === 'flights' && <FlightsTab data={data} save={saveData} uploadImageFn={uploadImageFn} />}
                            {activeTab === 'hotels' && <HotelsTab data={data} save={saveData} uploadImageFn={uploadImageFn} />}
                            {activeTab === 'transport' && <TransportTab data={data} save={saveData} />}
                            {activeTab === 'tickets' && <TicketsTab data={data} save={saveData} uploadImageFn={uploadImageFn} />}
                            {activeTab === 'foods' && <FoodsTab data={data} save={saveData} uploadImageFn={uploadImageFn} />}
                            {activeTab === 'shopping' && <ShoppingTab data={data} save={saveData} uploadImageFn={uploadImageFn} />}
                            {activeTab === 'coupons' && <CouponsTab data={data} save={saveData} uploadImageFn={uploadImageFn} />}
                            {activeTab === 'expenses' && <ExpensesTab data={data} save={saveData} exchangeRate={exchangeRate} />}
                            {activeTab === 'extras' && <ExtrasTab data={data} save={saveData} exchangeRate={exchangeRate} />}
                        </main>
                    </div>
                </div>
            );
        }

        // ============ REUSABLE COMPONENTS ============
        function SectionTitle({ children, action }) {
            return (
                <div className="flex items-center justify-between mb-5">
                    <h2 className="text-xl md:text-2xl font-bold text-[#E8F1F8] border-l-4 border-[#E63946] pl-3 tracking-wider">{children}</h2>
                    {action}
                </div>
            );
        }

        function AddButton({ onClick, label = '新增' }) {
            return (
                <button onClick={onClick} className="bg-[#E63946] text-white border-none px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 hover:bg-red-600 transition-colors shadow-lg">
                    <i className="fa-solid fa-plus"></i> {label}
                </button>
            );
        }

        function Card({ children, style = {}, className = "" }) {
            return <div className={`bg-[#131827] border border-[#252C42] rounded-xl p-4 md:p-5 mb-3 shadow-sm relative overflow-hidden ${className}`} style={style}>{children}</div>;
        }

        function IconBtn({ icon, onClick, color = theme.textMuted, title }) {
            return (
                <button onClick={onClick} title={title} className="bg-transparent border-none p-2 rounded-lg inline-flex items-center hover:bg-white/10 transition-colors" style={{ color }}>
                    <i className={icon}></i>
                </button>
            );
        }

        function MapLinks({ query, gmapUrl }) {
            if (!query && !gmapUrl) return null;
            const target = gmapUrl ? gmapUrl : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`;
            return (
                <a href={target} target="_blank" rel="noreferrer" className="inline-flex items-center justify-center gap-2 text-xs font-bold text-[#0A0E1A] bg-[#00f3ff] hover:bg-white rounded-lg px-4 py-2 mt-2 w-full sm:w-auto transition-colors shadow-[0_0_10px_rgba(0,243,255,0.4)]">
                    <i className="fa-solid fa-map-location-dot"></i> {gmapUrl ? '開啟地圖導航' : '搜尋 Google Maps'}
                </a>
            );
        }

        function Field({ label, value, onChange, type = 'text', placeholder, required = false }) {
            return (
                <div className="mb-3 w-full">
                    <div className="text-[11px] text-[#5A6378] tracking-widest mb-1.5 uppercase font-bold">{label} {required && <span className="text-red-500">*</span>}</div>
                    {type === 'textarea' ? (
                        <textarea value={value || ''} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={3} className="resize-y" />
                    ) : (
                        <input type={type} value={value || ''} onChange={e => onChange(e.target.value)} placeholder={placeholder} />
                    )}
                </div>
            );
        }

        function ImageUploadField({ label, url, onUpload, uploadImageFn }) {
            const [uploading, setUploading] = useState(false);
            const ref = useRef();
            const handleChange = async (e) => {
                const file = e.target.files[0];
                if(!file) return;
                setUploading(true);
                try {
                    const newUrl = await uploadImageFn(file);
                    onUpload(newUrl);
                } catch(e) { alert('圖片上傳失敗，請稍後再試'); }
                setUploading(false);
            };
            return (
                <div className="mb-3 w-full">
                    <div className="text-[11px] text-[#5A6378] tracking-widest mb-1.5 uppercase font-bold">{label}</div>
                    <div
                        onClick={() => { if(!uploading) ref.current?.click() }}
                        className="w-full h-32 border-2 border-dashed border-[#252C42] rounded-lg flex items-center justify-center cursor-pointer hover:border-[#E63946]/50 transition-colors relative overflow-hidden bg-black/20"
                    >
                        {uploading ? (
                            <div className="text-[#E63946] flex flex-col items-center gap-2"><i className="fa-solid fa-spinner fa-spin text-2xl"></i><span className="text-xs font-bold tracking-widest">極速壓縮上傳中...</span></div>
                        ) : url ? (
                            <div className="relative w-full h-full group">
                                <img src={url} className="w-full h-full object-contain opacity-80 group-hover:opacity-100 transition-opacity" />
                                <div className="absolute inset-0 bg-black/50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                    <span className="text-white text-xs font-bold px-3 py-1 bg-black/60 rounded-full"><i className="fa-solid fa-pen"></i> 點擊更換照片</span>
                                </div>
                            </div>
                        ) : (
                            <div className="text-[#5A6378] flex flex-col items-center gap-2"><i className="fa-solid fa-cloud-arrow-up text-2xl"></i><span className="text-xs font-bold tracking-widest">點擊上傳</span></div>
                        )}
                    </div>
                    <input type="file" accept="image/*" hidden ref={ref} onChange={handleChange} />
                </div>
            );
        }

        function ListControls({ searchTerm, onSearch, sortBy, onSort, sortOptions }) {
            return (
                <div className="flex flex-col sm:flex-row gap-3 mb-4 bg-white/5 p-3 rounded-xl border border-[#252C42]">
                    <div className="flex-1 relative flex items-center">
                        <i className="fa-solid fa-search absolute left-3 text-[#5A6378] pointer-events-none"></i>
                        <input
                            type="text"
                            value={searchTerm}
                            onChange={(e) => onSearch(e.target.value)}
                            placeholder="輸入關鍵字搜尋..."

                    {sortOptions && sortOptions.length > 0 && (
                        <div className="sm:w-48 relative flex items-center">
                            <i className="fa-solid fa-arrow-up-short-wide absolute left-3 text-[#5A6378] pointer-events-none"></i>
                            <select
                                value={sortBy}
                                onChange={(e) => onSort(e.target.value)}
                                className="w-full bg-black/40 border border-[#252C42] rounded-lg pl-icon pr-8 py-2 text-sm text-white focus:border-[#E63946] outline-none appearance-none cursor-pointer"
                            >
                                {sortOptions.map(opt => <option key={opt.value} value={opt.value}>{opt.label}</option>)}

                            <i className="fa-solid fa-chevron-down absolute right-3 text-[#5A6378] text-[10px] pointer-events-none"></i>
                        </div>
                    )}

            );

        // 🔥 共用地區篩選器元件
        function AreaFilter({ items, filterField, currentFilter, setFilter, icon = "fa-location-dot" }) {
            const areas = ['全部', ...new Set(items.map(i => i[filterField]).filter(Boolean))];
            if (areas.length <= 1) return null;
            return (
                <div className="flex items-center gap-2 overflow-x-auto no-scrollbar mb-6 pb-2">
                    <div className="text-[#8A93A8] text-xs font-bold whitespace-nowrap pl-1"><i className={`fa-solid ${icon}`}></i> 地區篩選:</div>
                    {areas.map(a => (
                        <button key={a} onClick={() => setFilter(a)} className={`whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold transition-all border ${currentFilter === a ? 'bg-[#F4A261] border-[#F4A261] text-[#0A0E1A] shadow-[0_0_10px_rgba(244,162,97,0.4)]' : 'bg-[#131827] border-[#252C42] text-[#8A93A8] hover:border-[#F4A261]/50 hover:text-[#F4A261]'}`}>
                            {a}
                        </button>
                    ))}
                </div>
            );
        }

        const btnPrimary = { background: theme.accent, color: '#fff', border: 'none', padding: '10px 16px', borderRadius: '8px', fontWeight: 'bold', display: 'inline-flex', alignItems: 'center', gap: '6px', cursor: 'pointer', transition: '0.2s' };
        const btnGhost = { background: 'transparent', color: theme.textMuted, border: `1px solid ${theme.border}`, padding: '10px 16px', borderRadius: '8px', fontWeight: 'bold', cursor: 'pointer', transition: '0.2s' };

        function EmptyState({ text }) {
            return <div className="text-center py-16 text-[#5A6378] text-sm font-bold bg-[#131827]/50 rounded-xl border border-dashed border-[#252C42]">{text}</div>;
        }

        // 🔥 頂部嵌入式表單 (Inline Form)
        function InlineForm({ title, children, onSave, onCancel }) {
            return (
                <div className="animate-fade-in w-full bg-[#0A0E1A] rounded-2xl shadow-[0_10px_40px_rgba(0,0,0,0.5)] flex flex-col overflow-hidden border border-[#E63946]/50 mb-8 mt-2 relative z-50">
                    <div className="shrink-0 p-4 md:p-5 border-b border-[#252C42] flex justify-between items-center bg-[#131827]">
                        <h3 className="text-lg md:text-xl font-bold text-white flex items-center gap-2">
                            <i className="fa-solid fa-pen-to-square text-[#E63946]"></i> {title}
                        </h3>
                        <button onClick={onCancel} className="w-8 h-8 flex items-center justify-center rounded-full bg-white/10 text-gray-400 hover:text-white hover:bg-white/20 transition-colors">
                            <i className="fa-solid fa-xmark"></i>
                        </button>
                    </div>
                    <div className="p-4 md:p-6 space-y-4">
                        {children}
                    </div>
                    <div className="shrink-0 p-4 md:p-5 border-t border-[#252C42] bg-[#131827] flex gap-3">
                        <button onClick={onCancel} className="flex-1 py-3.5 rounded-xl border border-[#5A6378] text-[#8A93A8] font-bold hover:bg-white/10 transition-colors">取消</button>
                        <button onClick={onSave} className="flex-[2] py-3.5 rounded-xl bg-gradient-to-r from-[#E63946] to-[#ff4757] text-white font-bold hover:shadow-[0_0_20px_rgba(230,57,70,0.4)] transition-all active:scale-95 flex justify-center items-center gap-2">
                            <i className="fa-solid fa-check"></i> 儲存
                        </button>
                    </div>
                </div>
            );
        }

        // ============ HOME TAB ============
        function HomeTab({ data, save, daysLeft, setActiveTab }) {
            const [editSettings, setEditSettings] = useState(false);
            const [settingsDraft, setSettingsDraft] = useState({ tripTitle: data.tripTitle, tripDates: data.tripDates, countdown: data.countdown });

            const saveSettings = () => { save({ ...data, ...settingsDraft }); setEditSettings(false); };

            const stats = [
                { label: '行程項目', value: data.itinerary?.length || 0, tab: 'itinerary', icon: 'fa-solid fa-calendar' },
                { label: '家庭成員', value: data.family?.length || 0, tab: 'family', icon: 'fa-solid fa-users' },
                { label: '住宿安排', value: data.hotels?.length || 0, tab: 'hotels', icon: 'fa-solid fa-hotel' },
                { label: '購物清單', value: data.shopping?.length || 0, tab: 'shopping', icon: 'fa-solid fa-bag-shopping' },
            ];

            const people = (data.family || []).map(f => f.name).filter(Boolean);
            
            let luggageTotal = 0; let luggageChecked = 0;
            (data.luggage || []).forEach(item => {
                if (item.assignee === '全部') {
                    luggageTotal += people.length;
                    luggageChecked += (item.preparedBy || []).length;
                } else {
                    luggageTotal += 1;
                    if ((item.preparedBy || []).length > 0) luggageChecked += 1;
                }
            });

            return (
                <div className="animate-fade-in">
                    <SectionTitle>總覽</SectionTitle>

                    <div className="bg-[#131827] border border-[#252C42] rounded-xl p-5 relative overflow-hidden mb-6">
                        <div className="absolute top-0 left-0 w-1 h-full bg-[#E63946]"></div>
                        <div className="flex justify-between items-center mb-4">
                            <div className="text-xs text-[#8A93A8] tracking-widest font-bold">旅行設定</div>
                            {!editSettings && (
                                <button onClick={() => { setEditSettings(true); setSettingsDraft({ tripTitle: data.tripTitle, tripDates: data.tripDates, countdown: data.countdown }); window.scrollTo({top:0, behavior:'smooth'}); }} className="text-xs text-[#8A93A8] hover:text-white border border-[#252C42] px-3 py-1.5 rounded-md transition-colors">
                                    <i className="fa-solid fa-pen mr-1"></i> 編輯
                                </button>
                            )}
                        </div>
                        {editSettings ? (
                            <InlineForm title="編輯旅行設定" onSave={saveSettings} onCancel={() => setEditSettings(false)}>
                                <Field label="旅行標題" value={settingsDraft.tripTitle} onChange={v => setSettingsDraft({ ...settingsDraft, tripTitle: v })} />
                                <Field label="顯示的日期文字" value={settingsDraft.tripDates} onChange={v => setSettingsDraft({ ...settingsDraft, tripDates: v })} />
                                <Field label="出發日（選日曆）" type="date" value={settingsDraft.countdown} onChange={v => setSettingsDraft({ ...settingsDraft, countdown: v })} />
                            </InlineForm>
                        ) : (
                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                <div><div className="text-[10px] text-[#5A6378] font-bold mb-1">標題</div><div className="font-bold text-lg text-white">{data.tripTitle}</div></div>
                                <div><div className="text-[10px] text-[#5A6378] font-bold mb-1">日期</div><div className="font-bold text-white">{data.tripDates}</div></div>
                                <div><div className="text-[10px] text-[#5A6378] font-bold mb-1">倒數基準日</div><div className="font-bold font-mono text-[#00f3ff]">{data.countdown}</div></div>
                            </div>
                        )}
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
                        {stats.map(s => (
                            <button key={s.label} onClick={() => setActiveTab(s.tab)} className="bg-[#131827] border border-[#252C42] rounded-xl p-4 text-left hover:border-[#E63946]/50 transition-colors group">
                                <i className={`${s.icon} text-[#E63946] text-lg group-hover:scale-110 transition-transform`}></i>
                                <div className="text-2xl font-black mt-2 text-[#E8F1F8]">{s.value}</div>
                                <div className="text-xs text-[#8A93A8] mt-1">{s.label}</div>
                            </button>
                        ))}
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div className="bg-[#131827] border border-[#252C42] rounded-xl p-5">
                            <div className="text-[11px] text-[#8A93A8] tracking-widest font-bold flex justify-between">
                                <span>行李打包進度</span>
                                <span className="text-[#52B788]">{luggageChecked} / {luggageTotal}</span>
                            </div>
                            <div className="bg-[#252C42] h-2 rounded-full mt-3 overflow-hidden">
                                <div className="bg-[#52B788] h-full transition-all duration-500" style={{ width: `${luggageTotal ? (luggageChecked / luggageTotal) * 100 : 0}%` }} />
                            </div>
                            <button onClick={() => setActiveTab('luggage')} className="mt-4 w-full text-xs text-[#8A93A8] bg-white/5 py-2 rounded-lg hover:bg-white/10 hover:text-white transition-colors">前往檢查行李</button>
                        </div>
                        <div className="bg-[#131827] border border-[#252C42] rounded-xl p-5">
                            <div className="text-[11px] text-[#8A93A8] tracking-widest font-bold">下一站</div>
                            <div className="text-lg font-bold mt-2 truncate text-white">{(data.itinerary || [])[0]?.title || '還沒安排'}</div>
                            <div className="text-xs text-[#5A6378] mt-1">{(data.itinerary || [])[0]?.date} {(data.itinerary || [])[0]?.time}</div>
                            <button onClick={() => setActiveTab('itinerary')} className="mt-4 w-full text-xs text-[#8A93A8] bg-white/5 py-2 rounded-lg hover:bg-white/10 hover:text-white transition-colors">查看完整行程</button>
                        </div>
                    </div>
                </div>
            );
        }

        // ============ ITINERARY TAB ============
        function ItineraryTab({ data, save }) {
            const [editId, setEditId] = useState(null);
            const [draft, setDraft] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [sortBy, setSortBy] = useState('date_asc');

            const add = () => {
                setEditId('new');
                setDraft({ id: Date.now(), day: '第 1 天', date: '', time: '', title: '', location: '', note: '', type: '景點' });
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };
            const saveEdit = () => {
                if(!draft.title) return alert("請輸入標題");
                if (editId === 'new') save({ ...data, itinerary: [...(data.itinerary || []), draft] });
                else save({ ...data, itinerary: (data.itinerary || []).map(i => i.id === editId ? draft : i) });
                setEditId(null); setDraft(null);
            };
            const del = (id) => { if (confirm('確定刪除這個行程？')) save({ ...data, itinerary: (data.itinerary || []).filter(i => i.id !== id) }); };

            const filtered = (data.itinerary || []).filter(i => matchSearch(i, searchTerm));
            const sorted = sortData(filtered, sortBy, 'date', 'title');

            const grouped = sorted.reduce((acc, i) => { (acc[i.day] = acc[i.day] || []).push(i); return acc; }, {});
            const sortedDays = Object.keys(grouped).sort((a, b) => {
                const numA = parseInt(a.replace(/\D/g, '')) || 999;
                const numB = parseInt(b.replace(/\D/g, '')) || 999;
                return numA - numB;
            });

            return (
                <div className="animate-fade-in">
                    <SectionTitle action={editId !== 'new' && <AddButton onClick={add} label="新增行程" />}>日程表</SectionTitle>
                    
                    <ListControls 
                        searchTerm={searchTerm} onSearch={setSearchTerm} 
                        sortBy={sortBy} onSort={setSortBy} 
                        sortOptions={[
                            {label: '日期時間 (最近的優先)', value: 'date_asc'},
                            {label: '日期時間 (最遠的優先)', value: 'date_desc'},
                            {label: '標題 (A-Z)', value: 'name_asc'}
                        ]} 
                    />

                    {editId && (
                        <InlineForm title={editId === 'new' ? '新增行程' : '編輯行程'} onSave={saveEdit} onCancel={() => { setEditId(null); setDraft(null); }}>
                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-3">
                                <div>
                                    <div className="text-[11px] text-[#5A6378] tracking-widest mb-1.5 uppercase font-bold">天數</div>
                                    <select value={draft.day} onChange={e => setDraft({ ...draft, day: e.target.value })}>
                                        {Array.from({length: 15}, (_, i) => <option key={i+1} value={`第 ${i+1} 天`}>第 {i+1} 天</option>)}
                                        <option value="行前準備">行前準備</option>
                                        <option value="其他">其他</option>
                                    </select>
                                </div>
                                <Field label="日期" type="date" value={draft.date} onChange={v => setDraft({ ...draft, date: v })} />
                                <Field label="時間" type="time" value={draft.time} onChange={v => setDraft({ ...draft, time: v })} />
                            </div>
                            <Field label="標題 *" value={draft.title} onChange={v => setDraft({ ...draft, title: v })} />
                            <Field label="地點（填地址或名稱）" value={draft.location} onChange={v => setDraft({ ...draft, location: v })} />
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                <div>
                                    <div className="text-[11px] text-[#5A6378] tracking-widest mb-1.5 uppercase font-bold">類型</div>
                                    <select value={draft.type} onChange={e => setDraft({ ...draft, type: e.target.value })}>
                                        <option>景點</option><option>美食</option><option>交通</option><option>住宿</option><option>購物</option><option>其他</option>
                                    </select>
                                </div>
                                <Field label="備註" value={draft.note} onChange={v => setDraft({ ...draft, note: v })} />
                            </div>
                        </InlineForm>
                    )}
                    
                    <div className="space-y-6">
                        {sortedDays.map(day => {
                            const dayItems = grouped[day].filter(i => i.id !== editId);
                            if (dayItems.length === 0) return null;
                            
                            return (
                                <div key={day} className="mb-8">
                                    <div className="text-[#E63946] font-bold tracking-widest mb-3 flex items-center gap-2 text-lg">
                                        <i className="fa-solid fa-flag"></i> {day} <span className="text-sm text-[#5A6378]">{dayItems[0]?.date}</span>
                                    </div>
                                    {dayItems.map(item => (
                                        <Card key={item.id}>
                                            <div className="flex gap-3 md:gap-4 items-start">
                                                <div className="min-w-[70px] text-center pt-1 border-r border-[#252C42] pr-3">
                                                    <div className="text-xs text-[#8A93A8] mb-1 font-mono">{item.date || '未定日期'}</div>
                                                    <div className="text-lg md:text-xl font-bold text-[#F4A261]">{item.time || '--:--'}</div>
                                                    <div className="text-[10px] text-[#E63946] bg-[#E63946]/10 px-2 py-0.5 rounded mt-1 inline-block font-bold">{item.type}</div>
                                                </div>
                                                <div className="flex-1 pl-1">
                                                    <div className="text-base md:text-lg font-bold text-white leading-tight">{item.title}</div>
                                                    <MapLinks query={item.location} />
                                                    {item.note && <div className="text-xs text-[#5A6378] mt-2 bg-black/20 p-2 rounded-md italic">{item.note}</div>}
                                                </div>
                                                <div className="flex flex-col md:flex-row gap-1">
                                                    <IconBtn icon="fa-solid fa-pen" onClick={() => {setEditId(item.id); setDraft({...item}); window.scrollTo({top:0, behavior:'smooth'});}} />
                                                    <IconBtn icon="fa-solid fa-trash" onClick={() => del(item.id)} color={theme.accent} />
                                                </div>
                                            </div>
                                        </Card>
                                    ))}
                                </div>
                            );
                        })}
                    </div>
                    {sorted.length === 0 && !editId && <EmptyState text="找不到符合的行程！" />}
                </div>
            );
        }

        // ============ FAMILY TAB ============
        function FamilyTab({ data, save, uploadImageFn }) {
            const [editId, setEditId] = useState(null);
            const [draft, setDraft] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [sortBy, setSortBy] = useState('name_asc');

            const add = () => {
                setEditId('new');
                setDraft({ id: Date.now(), name: '', engName: '', twPhone: '', jpPhone: '', passport: '', note: '', photo: '' });
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };
            const saveEdit = () => { 
                if(!draft.name) return alert('請填寫中文名稱');
                if (editId === 'new') save({ ...data, family: [...(data.family || []), draft] });
                else save({ ...data, family: (data.family || []).map(i => i.id === editId ? draft : i) });
                setEditId(null); setDraft(null); 
            };
            const del = (id) => { if (confirm('確定刪除？')) save({ ...data, family: (data.family || []).filter(i => i.id !== id) }); };

            const filtered = (data.family || []).filter(i => matchSearch(i, searchTerm));
            const sorted = sortData(filtered, sortBy, null, 'name');

            return (
                <div className="animate-fade-in">
                    <SectionTitle action={editId !== 'new' && <AddButton onClick={add} label="新增成員" />}>旅行成員</SectionTitle>
                    
                    <ListControls 
                        searchTerm={searchTerm} onSearch={setSearchTerm} 
                        sortBy={sortBy} onSort={setSortBy} 
                        sortOptions={[ {label: '名稱排序 (A-Z)', value: 'name_asc'} ]} 
                    />

                    {editId && (
                        <InlineForm title={editId === 'new' ? '新增成員' : '編輯成員'} onSave={saveEdit} onCancel={() => { setEditId(null); setDraft(null); }}>
                            <Field label="中文名稱 *" value={draft.name} onChange={v => setDraft({ ...draft, name: v })} />
                            <Field label="英文名稱 (同護照)" value={draft.engName} onChange={v => setDraft({ ...draft, engName: v })} />
                            <ImageUploadField label="個人大頭貼" url={draft.photo} onUpload={url => setDraft({...draft, photo: url})} uploadImageFn={uploadImageFn} />
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">
                                <Field label="台灣電話" type="tel" value={draft.twPhone} onChange={v => setDraft({ ...draft, twPhone: v })} />
                                <Field label="日本電話" type="tel" value={draft.jpPhone} onChange={v => setDraft({ ...draft, jpPhone: v })} />
                            </div>
                            <Field label="護照號碼 (方便填表)" value={draft.passport} onChange={v => setDraft({ ...draft, passport: v })} />
                            <Field label="備註 (過敏、偏好)" value={draft.note} onChange={v => setDraft({ ...draft, note: v })} type="textarea" />
                        </InlineForm>
                    )}
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {sorted.filter(m => m.id !== editId).map(m => (
                            <Card key={m.id}>
                                <div className="flex items-center gap-4">
                                    <div style={{ width: 64, height: 64, borderRadius: '50%', background: m.photo ? `url(${m.photo}) center/cover` : `linear-gradient(135deg, ${theme.accent}, ${theme.accent2})`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 24, fontWeight: 900, color: '#fff', border: `2px solid ${theme.border}` }}>
                                        {!m.photo && (m.name || '?').charAt(0)}
                                    </div>
                                    <div className="flex-1">
                                        <div className="text-xl font-bold text-white">{m.name || '（未命名）'}</div>
                                        {m.engName && <div className="text-sm text-[#F4A261] font-bold">{m.engName}</div>}
                                    </div>
                                </div>
                                <div className="mt-4 space-y-1">
                                    {m.twPhone && <div className="text-xs text-[#8A93A8]"><i className="fa-solid fa-mobile-screen mr-1"></i> TW: <span className="font-mono text-white">{m.twPhone}</span></div>}
                                    {m.jpPhone && <div className="text-xs text-[#8A93A8]"><i className="fa-solid fa-mobile-screen mr-1"></i> JP: <span className="font-mono text-[#00ff9d]">{m.jpPhone}</span></div>}
                                    {m.passport && <div className="text-xs text-[#8A93A8] bg-black/20 p-2 rounded mt-2"><i className="fa-solid fa-passport mr-1"></i> 護照：<span className="font-mono text-white">{m.passport}</span></div>}
                                </div>
                                {m.note && <div className="text-xs text-[#5A6378] mt-2 italic bg-[#E63946]/5 border-l-2 border-[#E63946] p-2">"{m.note}"</div>}
                                <div className="flex justify-end gap-1 mt-4 pt-3 border-t border-[#252C42]">
                                    <IconBtn icon="fa-solid fa-pen" onClick={() => { setEditId(m.id); setDraft({ ...m }); window.scrollTo({top:0, behavior:'smooth'}); }} />
                                    <IconBtn icon="fa-solid fa-trash" onClick={() => del(m.id)} color={theme.accent} />
                                </div>
                            </Card>
                        ))}
                    </div>
                    {sorted.length === 0 && !editId && <EmptyState text="找不到符合的成員！" />}
                </div>
            );
        }

        // ============ LUGGAGE TAB ============
        function LuggageTab({ data, save }) {
            const [newItem, setNewItem] = useState({ category: '衣物', item: '', assignee: '全部' });
            const [searchTerm, setSearchTerm] = useState('');

            const add = () => {
                if (!newItem.item.trim()) return;
                save({ ...data, luggage: [...(data.luggage || []), { id: Date.now(), ...newItem, preparedBy: [] }] });
                setNewItem({ ...newItem, item: '' });
            };
            
            const togglePrepare = (id, personName) => {
                save({ 
                    ...data, 
                    luggage: (data.luggage || []).map(i => {
                        if(i.id === id) {
                            const prepared = i.preparedBy || [];
                            const isPrepared = prepared.includes(personName);
                            return { ...i, preparedBy: isPrepared ? prepared.filter(p => p !== personName) : [...prepared, personName] };
                        }
                        return i;
                    })
                });
            };

            const del = (id) => save({ ...data, luggage: (data.luggage || []).filter(i => i.id !== id) });

            const filtered = (data.luggage || []).filter(i => matchSearch(i, searchTerm));
            const grouped = filtered.reduce((acc, i) => { (acc[i.category] = acc[i.category] || []).push(i); return acc; }, {});

            return (
                <div className="animate-fade-in">
                    <SectionTitle>行李清單</SectionTitle>
                    <ListControls searchTerm={searchTerm} onSearch={setSearchTerm} sortOptions={[]} />

                const adults = (Number(d.priceAdult) || 0) * (Number(d.countAdult) || 0);
                const children = (Number(d.priceChild) || 0) * (Number(d.countChild) || 0);
                const seniors = (Number(d.priceSenior) || 0) * (Number(d.countSenior) || 0);
                return adults + children + seniors;

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        
                        <Card>
                            <div className="text-sm font-bold text-[#E63946] mb-3 border-b border-[#252C42] pb-2"><i className="fa-solid fa-language mr-1"></i> 常用日語小抄</div>
                            <div className="space-y-3">
                                {phrases.map((p, i) => (
                                    <div key={i} className="bg-black/20 p-2 rounded-lg">
                                        <div className="font-bold text-[#E8F1F8]">{p.jp}</div>
                                        <div className="text-[10px] text-[#F4A261] font-mono mb-1">{p.romaji}</div>
                                        <div className="text-xs text-[#8A93A8]">{p.zh}</div>
                                    </div>
                                ))}
                            </div>
                        </Card>

                        <div className="space-y-4">
                            <Card>
                                <div className="text-sm font-bold text-[#3bc6e4] mb-3 border-b border-[#252C42] pb-2"><i className="fa-solid fa-calculator mr-1"></i> 快速匯率換算 (日圓轉台幣)</div>
                                <RateCalc exchangeRate={exchangeRate} />
                            </Card>

                            <Card>
                                <div className="text-sm font-bold text-[#FFD700] mb-3 border-b border-[#252C42] pb-2"><i className="fa-solid fa-cloud-sun mr-1"></i> 北海道天氣查詢</div>
                                <div className="flex flex-wrap gap-2">
                                    {['新千歲', '洞爺湖', '函館', '小樽', 'Tomamu', '旭川', '札幌'].map(city => (
                                        <a key={city} href={`https://www.google.com/search?q=${encodeURIComponent(city + ' 天氣')}`} target="_blank" rel="noreferrer" 
                                            className="bg-[#252C42] hover:bg-[#FFD700] hover:text-black text-xs text-[#E8ECF4] px-3 py-1.5 rounded-full transition-colors">
                                            {city} <i className="fa-solid fa-arrow-up-right-from-square ml-1 text-[10px]"></i>
                                        </a>
                                    ))}
                                </div>
                                <div className="text-[11px] text-[#8A93A8] mt-3 leading-relaxed">
                                    💡 7月均溫 18-26°C，早晚溫差大，記得帶薄外套。富良野賞花最佳季節，偶有陣雨需備雨具。
                                </div>
                            </Card>

                            <Card>
                                <div className="text-sm font-bold text-[#52B788] mb-3 border-b border-[#252C42] pb-2"><i className="fa-solid fa-phone mr-1"></i> 緊急聯絡電話</div>
                                <div className="space-y-2">
                                    <a href="tel:110" className="block bg-[#52B788]/10 hover:bg-[#52B788]/20 border border-[#52B788]/30 p-2 rounded-lg text-white no-underline flex justify-between items-center transition-colors">
                                        <span className="text-xs text-[#8A93A8]">報警 (日本)</span><span className="font-bold text-[#52B788]">110</span>
                                    </a>
                                    <a href="tel:119" className="block bg-[#E63946]/10 hover:bg-[#E63946]/20 border border-[#E63946]/30 p-2 rounded-lg text-white no-underline flex justify-between items-center transition-colors">
                                        <span className="text-xs text-[#8A93A8]">救護/消防 (日本)</span><span className="font-bold text-[#E63946]">119</span>
                                    </a>
                                    <div className="bg-[#252C42] p-2 rounded-lg text-xs flex justify-between items-center">
                                        <span className="text-[#8A93A8]">台北駐日代表處(札幌)</span><span className="font-bold text-white">+81-11-222-2930</span>
                                    </div>
                                </div>
                            </Card>
                        </div>
                    </div>
                </div>
            );
        }

        function RateCalc({ exchangeRate }) {
            const [jpy, setJpy] = useState(10000);
            const [rate, setRate] = useState(exchangeRate); 
            
            useEffect(() => { setRate(exchangeRate); }, [exchangeRate]);

            return (
                <div>
                    <div className="flex items-center gap-3 mb-2">
                        <input type="number" value={jpy} onChange={e => setJpy(Number(e.target.value))} className="w-24 text-center font-bold bg-[#131827] border border-[#252C42] text-white rounded p-1 outline-none focus:border-[#3bc6e4]" />
                        <span className="text-xs text-[#8A93A8]">JPY</span>
                        <span className="text-[#F4A261]"><i className="fa-solid fa-arrow-right"></i></span>
                        <span className="text-xl font-black text-[#F4A261]">NT$ {Math.round(jpy * rate).toLocaleString()}</span>
                    </div>
                    <div className="text-[10px] text-[#5A6378] flex items-center gap-2 mt-2">
                        今日匯率參考: 1 JPY ≈ <input type="number" step="0.001" value={rate} onChange={e => setRate(Number(e.target.value))} className="w-16 px-1 py-0.5 text-center text-white bg-[#131827] border border-[#252C42] rounded outline-none" /> TWD
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
