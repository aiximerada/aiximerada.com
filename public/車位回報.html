<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 🔥 完美支援 PWA 與 iOS 瀏海 (viewport-fit=cover) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="重機停車">
    <meta name="theme-color" content="#090A0F">
    
    <title>重機停車</title>
    
    <!-- 🔥 桌面捷徑圖示 (改用您上傳的 頭像.png) -->
    <link rel="icon" type="image/png" href="./頭像.png">
    <link rel="apple-touch-icon" href="./頭像.png">
    
    <!-- 預先連線 CDN 以加速載入 -->
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 🔥 Leaflet.js 地圖引擎 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <!-- 加入 SheetJS 用於 Excel 解析與匯入/匯出 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* 強制滿版，徹底消滅容器塌陷，支援手機原生滑動手勢 */
        html, body { 
            width: 100vw; height: 100vh; margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #090A0F; color: #fff;
            overflow: hidden; 
            -webkit-tap-highlight-color: transparent;
        }
        
        #root { width: 100vw; height: 100vh; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #00f3ff; border-radius: 10px; }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .leaflet-container { font-family: inherit; background: #090A0F; outline: none; }
        .leaflet-control-attribution { display: none !important; }
        
        /* 地圖暗黑濾鏡 */
        .dark-map-tiles { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
        
        /* 客製化彈窗 (Popup) */
        .leaflet-popup-content-wrapper {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid #00f3ff; color: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 243, 255, 0.3);
            padding: 0; overflow: hidden;
        }
        .leaflet-popup-content { margin: 0; width: 220px !important; }
        .leaflet-popup-tip { background: rgba(15, 23, 42, 0.95); border-bottom: 1px solid #00f3ff; border-right: 1px solid #00f3ff; }
        .leaflet-popup-close-button { color: #fff !important; text-shadow: 0 0 5px black; top: 5px !important; right: 5px !important; }
        
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .bottom-sheet { animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* 🔥 iOS 瀏海與底部安全區域防護 (Safe Area Insets) */
        .safe-top-search { top: calc(1rem + env(safe-area-inset-top, 0px)); }
        .safe-top-admin { top: calc(4.5rem + env(safe-area-inset-top, 0px)); }
        .safe-bottom-fab { bottom: calc(2rem + env(safe-area-inset-bottom, 0px)); }
        .safe-bottom-locate { bottom: calc(6.5rem + env(safe-area-inset-bottom, 0px)); }
        
        /* 管理中心專用安全墊距，防止被瀏海蓋住 */
        .safe-padding-top { padding-top: calc(1.5rem + env(safe-area-inset-top, 20px)); }
        .safe-padding-bottom { padding-bottom: calc(1.5rem + env(safe-area-inset-bottom, 20px)); }

        /* 啟動畫面特效 */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #090A0F; display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 999999; color: #00f3ff; transition: opacity 0.5s ease-out;
        }
    </style>
</head>
<body>

    <!-- 啟動畫面 -->
    <div id="splash-screen">
        <i class="fa-solid fa-star fa-spin text-6xl mb-6 drop-shadow-[0_0_15px_rgba(0,243,255,0.8)]"></i>
        <h2 class="text-2xl font-black tracking-widest">系統初始化...</h2>
        <p class="text-gray-400 mt-2 text-sm">載入星際雷達地圖</p>
    </div>

    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, where, serverTimestamp, getDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAAo6on0f2QUbPaRfxpIEb2uvhKxDvPUvs",
            authDomain: "yulubox.firebaseapp.com",
            projectId: "yulubox",
            storageBucket: "yulubox.firebasestorage.app",
            messagingSenderId: "256466567852",
            appId: "1:256466567852:web:233b74668908ffcb9b9509"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app);

        const TAIWAN_CITIES = ['基隆市', '台北市', '新北市', '桃園市', '新竹市', '新竹縣', '苗栗縣', '台中市', '彰化縣', '南投縣', '雲林縣', '嘉義市', '嘉義縣', '台南市', '高雄市', '屏東縣', '宜蘭縣', '花蓮縣', '台東縣', '澎湖縣', '金門縣', '連江縣'];

        const formatTime = (ts) => {
            if (!ts) return '未知時間';
            try {
                if (ts.toDate) return ts.toDate().toLocaleString('zh-TW', { hour12: false });
                return new Date(ts).toLocaleString('zh-TW', { hour12: false });
            } catch(e) { return '時間解析錯誤'; }
        };

        function App() {
            const [view, setView] = useState('map'); 
            const [user, setUser] = useState(null);
            const [role, setRole] = useState(null);

            useEffect(() => {
                const splash = document.getElementById('splash-screen');
                if(splash) {
                    splash.style.opacity = '0';
                    setTimeout(() => splash.style.display = 'none', 500);
                }

                const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
                    if (currentUser) {
                        setUser(currentUser);
                        if (!currentUser.isAnonymous) {
                            try {
                                const userDoc = await getDoc(doc(db, "users", currentUser.uid));
                                if (userDoc.exists() && userDoc.data().role) {
                                    setRole(userDoc.data().role);
                                } else {
                                    const q = query(collection(db, "users"), where("email", "==", currentUser.email));
                                    const snap = await getDocs(q);
                                    let foundRole = 'member';
                                    snap.forEach(d => { if(d.data().role) foundRole = d.data().role; });
                                    setRole(foundRole);
                                }
                            } catch (error) { setRole('member'); }
                        } else {
                            setRole('guest'); 
                        }
                    } else {
                        setUser(null); setRole(null);
                        try { 
                            await signInAnonymously(auth); 
                        } catch (e) { 
                            console.error("匿名登入失敗", e); 
                        }
                    }
                });
                return () => unsubscribe();
            }, []);

            return (
                <div className="w-full h-full relative bg-black flex flex-col overflow-hidden">
                    {view === 'map' ? (
                        <MapScreen db={db} storage={storage} user={user} role={role} onSwitchToAdmin={() => setView('admin')} />
                    ) : (
                        <div className="w-full h-full flex flex-col bg-[radial-gradient(ellipse_at_bottom,_#1B2735_0%,_#090A0F_100%)]">
                            <div style={{ height: 'env(safe-area-inset-top)' }} className="w-full shrink-0"></div>
                            
                            <div className="flex-1 overflow-y-auto px-4 pb-12" style={{ paddingBottom: 'env(safe-area-inset-bottom)' }}>
                                {/* 🔥 修改容器寬度，讓電腦版 Dashboard 有滿版的感覺 */}
                                <div className="max-w-6xl mx-auto pt-4 relative w-full">
                                    <button onClick={() => setView('map')} className="mb-6 inline-flex items-center text-gray-400 hover:text-white px-4 py-2 rounded-xl bg-white/5 border border-white/10 z-10 transition-colors shadow-lg">
                                        <i className="fa-solid fa-chevron-left mr-2"></i> 返回地圖
                                    </button>
                                    <div className="w-full">
                                        <AdminPanel db={db} auth={auth} user={user} role={role} />
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function MapScreen({ db, storage, user, role, onSwitchToAdmin }) {
            const mapRef = useRef(null);
            const mapInstanceRef = useRef(null);
            const markerGroupRef = useRef(null); 
            
            const [locations, setLocations] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [isSearching, setIsSearching] = useState(false);
            const [isReportOpen, setIsReportOpen] = useState(false);
            const [isIssueOpen, setIsIssueOpen] = useState(false); // 控制問題回報彈窗
            
            const [reportLocation, setReportLocation] = useState(null);
            const [showDragHint, setShowDragHint] = useState(true);

            useEffect(() => {
                const timer = setTimeout(() => setShowDragHint(false), 4000);
                return () => clearTimeout(timer);
            }, []);

            useEffect(() => {
                const fetchApprovedSpots = async () => {
                    const q = query(collection(db, "parking_locations"), where("status", "==", "approved"));
                    const snap = await getDocs(q);
                    const spots = [];
                    snap.forEach(doc => spots.push({ id: doc.id, ...doc.data() }));
                    setLocations(spots);
                };
                fetchApprovedSpots();
            }, []);

            useEffect(() => {
                if (!mapRef.current) return;
                if (mapInstanceRef.current) return; 

                const map = L.map(mapRef.current, { zoomControl: false }).setView([23.6978, 120.9605], 8);
                
                L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
                    maxZoom: 20,
                    className: 'dark-map-tiles'
                }).addTo(map);

                map.on('dragstart', () => setShowDragHint(false));
                map.on('touchstart', () => setShowDragHint(false));

                mapInstanceRef.current = map;
                markerGroupRef.current = L.layerGroup().addTo(map);

                setTimeout(() => map.invalidateSize(), 100);
                setTimeout(() => map.invalidateSize(), 500);
                setTimeout(() => map.invalidateSize(), 1000);

                return () => {
                    if (mapInstanceRef.current) {
                        mapInstanceRef.current.remove();
                        mapInstanceRef.current = null;
                    }
                };
            }, []);

            useEffect(() => {
                if (!mapInstanceRef.current || !markerGroupRef.current) return;

                const map = mapInstanceRef.current;
                markerGroupRef.current.clearLayers(); 

                locations.forEach(spot => {
                    if (spot.lat && spot.lng) {
                        const customIcon = L.divIcon({
                            className: 'custom-div-icon',
                            html: `<div class="text-[#00f3ff] text-2xl drop-shadow-[0_0_10px_rgba(0,243,255,1)] text-center leading-none">
                                     <i class="fa-solid fa-star"></i>
                                   </div>`,
                            iconSize: [24, 24],
                            iconAnchor: [12, 12]
                        });

                        const marker = L.marker([spot.lat, spot.lng], { icon: customIcon });
                        const navLink = spot.gmap || `https://www.google.com/maps/dir/?api=1&destination=${spot.lat},${spot.lng}`;
                        
                        const popupHtml = `
                            <div class="flex flex-col">
                                ${spot.image_url ? `<img src="${spot.image_url}" class="w-full h-32 object-cover border-b border-[#00f3ff]/30" />` : ''}
                                <div class="p-3">
                                    <h3 class="text-lg font-bold text-[#00f3ff] mb-1 leading-tight">${spot.name}</h3>
                                    <p class="text-xs text-gray-300 mb-1 truncate"><i class="fa-solid fa-location-dot"></i> ${spot.city}</p>
                                    <p class="text-sm font-bold text-[#00ff9d] mb-2"><i class="fa-solid fa-coins"></i> ${spot.price}</p>
                                    ${spot.note ? `<p class="text-xs text-gray-400 bg-white/10 p-2 rounded mb-2">${spot.note}</p>` : ''}
                                    <a href="${navLink}" target="_blank" class="block w-full py-2 bg-gradient-to-r from-[#00f3ff] to-[#bc13fe] text-center text-white font-bold rounded-lg text-sm transition-all hover:opacity-90 mt-2">
                                        <i class="fa-solid fa-location-arrow"></i> 導航前往
                                    </a>
                                </div>
                            </div>
                        `;
                        marker.bindPopup(popupHtml);
                        markerGroupRef.current.addLayer(marker);
                    }
                });
            }, [locations]);

            const handleSearch = async (e) => {
                e.preventDefault();
                if (!searchQuery.trim()) return;
                setIsSearching(true);
                
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(searchQuery)}&countrycodes=tw&limit=1`);
                    const data = await res.json();
                    
                    if (data && data.length > 0) {
                        const { lat, lon } = data[0];
                        mapInstanceRef.current.flyTo([lat, lon], 16, { duration: 1.5 });
                    } else {
                        alert("找不到該地標，請嘗試其他關鍵字！");
                    }
                } catch (err) { console.error(err); }
                setIsSearching(false);
                document.activeElement.blur(); 
            };

            const locateMe = () => {
                if (!navigator.geolocation) return alert('不支援定位功能');
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const { latitude, longitude } = pos.coords;
                        mapInstanceRef.current.flyTo([latitude, longitude], 16, { duration: 1.5 });
                        
                        L.circleMarker([latitude, longitude], {
                            icon: L.divIcon({
                                className: 'user-loc',
                                html: `<div class="w-5 h-5 bg-[#ff4757] rounded-full border-[3px] border-white shadow-[0_0_20px_#ff4757] animate-pulse"></div>`,
                                iconSize: [20, 20], iconAnchor: [10, 10]
                            })
                        }).addTo(mapInstanceRef.current).bindPopup(`
                            <div class="flex flex-col items-center justify-center p-1">
                                <div class="text-[#ff4757] font-black text-[15px] mb-2 drop-shadow-md"><i class="fa-solid fa-crosshairs"></i> 您目前的位置</div>
                                <div class="bg-white/10 px-3 py-1.5 rounded-lg text-xs text-gray-300 font-mono border border-white/5 w-full text-center">Lat: ${latitude.toFixed(5)}</div>
                                <div class="bg-white/10 px-3 py-1.5 rounded-lg text-xs text-gray-300 font-mono border border-white/5 w-full text-center mt-1">Lng: ${longitude.toFixed(5)}</div>
                            </div>
                        `, { closeButton: false }).openPopup();
                    },
                    (err) => alert('無法取得定位，請確認手機已開啟位置權限。'),
                    { enableHighAccuracy: true }
                );
            };

            const handleOpenReport = () => {
                if (mapInstanceRef.current) {
                    const center = mapInstanceRef.current.getCenter();
                    setReportLocation({ lat: center.lat, lng: center.lng });
                }
                setIsReportOpen(true);
            };

            return (
                <div className="w-full h-full relative overflow-hidden flex-1">
                    <div ref={mapRef} style={{width: '100%', height: '100%'}} className="absolute inset-0 z-0"></div>

                    <div className="absolute inset-0 z-[50] pointer-events-none">
                        <div className="absolute left-4 right-4 sm:left-1/2 sm:-translate-x-1/2 sm:w-[400px] pointer-events-auto safe-top-search">
                            <form onSubmit={handleSearch} className="flex items-center glass-panel rounded-full overflow-hidden shadow-lg p-1">
                                <a href="index.html" className="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-white transition-colors">
                                    <i className="fa-solid fa-house"></i>
                                </a>
                                <input 
                                    type="text" 
                                    placeholder="搜尋地標或縣市..." 
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    className="flex-1 bg-transparent border-none text-white px-2 focus:outline-none text-base"
                                />
                                <button type="submit" className="w-10 h-10 bg-[#00f3ff]/20 text-[#00f3ff] rounded-full flex items-center justify-center hover:bg-[#00f3ff] hover:text-black transition-colors">
                                    {isSearching ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-magnifying-glass"></i>}
                                </button>
                            </form>
                        </div>

                        {/* 🔥 確保：只有管理員才能看到後台按鈕 */}
                        {(role === 'admin' || role === 'silver') && (
                            <button 
                                onClick={onSwitchToAdmin}
                                className="absolute right-4 w-12 h-12 glass-panel rounded-full text-[#bc13fe] flex items-center justify-center shadow-lg pointer-events-auto hover:bg-[#bc13fe]/20 safe-top-admin"
                                title="管理中心"
                            >
                                <i className="fa-solid fa-user-shield text-xl"></i>
                            </button>
                        )}
                        
                        {/* 🔥 畫面正中央：高度還原截圖的「拖曳定位指示」與紅心座標 */}
                        {showDragHint && (
                            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-[55px] z-[40] pointer-events-none flex flex-col items-center animate-pulse">
                                <div className="bg-[#af3dff] text-white text-[13px] font-extrabold px-4 py-2 rounded-full shadow-[0_5px_15px_rgba(175,61,255,0.5)] whitespace-nowrap">
                                    拖曳地圖以定出車位
                                </div>
                                {/* 紫色倒三角形指標 */}
                                <div className="w-0 h-0 border-l-[6px] border-l-transparent border-r-[6px] border-r-transparent border-t-[8px] border-t-[#af3dff] -mt-[1px]"></div>
                            </div>
                        )}
                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-full z-[40] pointer-events-none flex flex-col items-center">
                            <i className="fa-solid fa-location-dot text-[40px] text-[#ff4757] drop-shadow-[0_5px_5px_rgba(0,0,0,0.5)]"></i>
                        </div>

                        {/* 🔥 新增：左下角問題回報按鈕 */}
                        <button 
                            onClick={() => setIsIssueOpen(true)}
                            className="absolute left-5 w-12 h-12 bg-white/10 backdrop-blur border border-white/20 text-white rounded-full flex items-center justify-center shadow-lg pointer-events-auto hover:bg-[#ff4757]/40 hover:border-[#ff4757] hover:text-[#ff4757] transition-colors safe-bottom-locate"
                            title="問題回報與建議"
                        >
                            <i className="fa-solid fa-headset text-xl"></i>
                        </button>

                        <button 
                            onClick={locateMe}
                            className="absolute right-5 w-12 h-12 bg-white/10 backdrop-blur border border-white/20 text-white rounded-full flex items-center justify-center shadow-lg pointer-events-auto hover:bg-white/20 transition-colors safe-bottom-locate"
                            title="目前位置"
                        >
                            <i className="fa-solid fa-crosshairs text-xl"></i>
                        </button>

                        <button 
                            onClick={handleOpenReport}
                            className="absolute right-5 w-16 h-16 bg-gradient-to-tr from-[#00f3ff] to-[#bc13fe] text-white rounded-full flex items-center justify-center shadow-[0_5px_25px_rgba(0,243,255,0.5)] pointer-events-auto hover:scale-105 active:scale-95 transition-all z-[60] safe-bottom-fab"
                            title="新增車位"
                        >
                            <i className="fa-solid fa-plus text-3xl"></i>
                        </button>
                    </div>

                    {/* 車位回報 Modal */}
                    {isReportOpen && (
                        <div className="absolute inset-0 z-[100] flex items-end sm:items-center justify-center bg-black/60 backdrop-blur-sm pointer-events-auto">
                            <div className="absolute inset-0" onClick={() => setIsReportOpen(false)}></div>
                            <div className="w-full max-w-lg bg-[#0f172a] rounded-t-3xl sm:rounded-3xl border-t sm:border border-[#00f3ff]/30 shadow-2xl relative bottom-sheet max-h-[90dvh] overflow-y-auto overflow-x-hidden safe-padding-bottom">
                                <div className="w-12 h-1.5 bg-gray-600 rounded-full mx-auto my-3 sm:hidden"></div>
                                <button onClick={() => setIsReportOpen(false)} className="absolute top-4 right-4 w-8 h-8 bg-white/10 rounded-full flex items-center justify-center hover:bg-white/20 transition-colors z-10">
                                    <i className="fa-solid fa-xmark text-white"></i>
                                </button>
                                <div className="p-6 pt-2">
                                    <ReportForm db={db} storage={storage} user={user} onClose={() => setIsReportOpen(false)} initialLocation={reportLocation} />
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 問題回報 Modal */}
                    {isIssueOpen && (
                        <div className="absolute inset-0 z-[100] flex items-end sm:items-center justify-center bg-black/60 backdrop-blur-sm pointer-events-auto">
                            <div className="absolute inset-0" onClick={() => setIsIssueOpen(false)}></div>
                            <div className="w-full max-w-lg bg-[#0f172a] rounded-t-3xl sm:rounded-3xl border-t sm:border border-[#ff4757]/30 shadow-2xl relative bottom-sheet max-h-[90dvh] overflow-y-auto overflow-x-hidden safe-padding-bottom">
                                <div className="w-12 h-1.5 bg-gray-600 rounded-full mx-auto my-3 sm:hidden"></div>
                                <button onClick={() => setIsIssueOpen(false)} className="absolute top-4 right-4 w-8 h-8 bg-white/10 rounded-full flex items-center justify-center hover:bg-white/20 transition-colors z-10">
                                    <i className="fa-solid fa-xmark text-white"></i>
                                </button>
                                <div className="p-6 pt-2">
                                    <IssueForm db={db} user={user} onClose={() => setIsIssueOpen(false)} />
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );

        // === 新增：問題回報表單 (防呆 & 防垃圾訊息) ===
        function IssueForm({ db, user, onClose }) {
            const [content, setContent] = useState('');
            const [loading, setLoading] = useState(false);
            const [msg, setMsg] = useState('');

            // 防垃圾訊息過濾機制
            const isSpam = (text) => {
                // 1. 拒絕包含外部連結的留言 (防止廣告網址)
                if (/(http|https):\/\/[^\s]+/g.test(text)) return true;
                // 2. 拒絕連續重複 4 次以上的字元 (例如 aaaaa)
                if (/(.)\1{4,}/.test(text)) return true;
                // 3. 拒絕字數過少
                if (text.trim().length < 5) return true;
                // 4. 常見廣告詐騙詞彙黑名單
                const badWords = ['加賴', '加line', '借款', '娛樂城', '博役', '博弈', '投注', '詐騙', '援交', '私訊', '賺錢'];
                if (badWords.some(word => text.toLowerCase().includes(word))) return true;
                
                return false;
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setMsg('');

                // 檢查冷卻時間 (防惡意連點，限制 60 秒發一次)
                const lastReportTime = localStorage.getItem('lastParkingIssueTime');
                if (lastReportTime && Date.now() - parseInt(lastReportTime) < 60000) {
                    return setMsg('⏳ 您的手速太快了，請稍後 1 分鐘再提交新的回報！');
                }

                // 防呆檢查
                if (isSpam(content)) {
                    return setMsg('⚠️ 系統偵測到您的內容可能包含不合規的字眼、網址或字數過短，請修正後再送出。');
                }

                setLoading(true);
                try {
                    await addDoc(collection(db, "parking_issues"), {
                        content: content.trim(),
                        userId: user ? user.uid : 'anonymous',
                        status: 'unread',
                        createdAt: serverTimestamp()
                    });

                    // 寫入本地端冷卻時間紀錄
                    localStorage.setItem('lastParkingIssueTime', Date.now().toString());

                    alert('✅ 感謝您的回報！總部已收到您的建議。');
                    onClose();
                } catch (error) {
                    setMsg('❌ 傳送失敗，請確認網路連線。');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <form onSubmit={handleSubmit} className="space-y-4">
                    <h2 className="text-2xl font-bold mb-4 text-center text-[#ff4757]"><i className="fa-solid fa-headset"></i> 意見反饋與報錯</h2>
                    <p className="text-sm text-gray-400 text-center mb-6">任何系統 Bug、車位標示錯誤或是建議，都歡迎告訴我們！</p>
                    
                    <div>
                        <textarea 
                            required
                            rows="5"
                            placeholder="請詳細描述您的問題或建議 (最少 5 個字)..."
                            value={content}
                            onChange={(e) => setContent(e.target.value)}
                            className="w-full bg-black/40 border border-[#ff4757]/30 rounded-xl p-4 text-white outline-none focus:border-[#ff4757] resize-none"
                        ></textarea>
                    </div>

                    {msg && <div className="text-[#FFD700] text-center text-sm font-bold bg-black/40 p-2 rounded-lg">{msg}</div>}
                    
                    <button disabled={loading} type="submit" className="w-full py-4 bg-gradient-to-r from-[#ff4757] to-[#bc13fe] text-white font-bold rounded-xl mt-2 active:scale-95 transition-transform disabled:opacity-50">
                        {loading ? '傳送中...' : '送出回報'}
                    </button>
                </form>
            );
        }

                    .then(data => {

                            const addr = data.address;

            const compressImage = (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (e) => {
                        const img = new Image(); img.src = e.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let { width, height } = img;
                            if (width > 800) { height *= 800 / width; width = 800; }
                            canvas.width = width; canvas.height = height;
                            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                            canvas.toBlob(blob => blob ? resolve(new File([blob], `${Date.now()}.webp`, { type: 'image/webp' })) : reject(), 'image/webp', 0.5);
                        };
                    };
                });
            };

            const handleSubmit = async (e) => {

                            <label className="text-xs text-[#00f3ff]">縣市 *</label>

                                {TAIWAN_CITIES.map(c => <option key={c} value={c} className="bg-gray-900">{c}</option>)}
                            </select>
                        </div>
                        
                        <div>
                            <label className="text-xs text-[#00f3ff]">詳細地址</label>
                            <input type="text" value={formData.address} onChange={e => setFormData({...formData, address: e.target.value})} className="w-full bg-black/40 border border-[#00f3ff]/30 rounded-xl px-3 py-2 text-white outline-none focus:border-[#bc13fe]" />
                        </div>
                    </div>

                    <div className="bg-black/40 border border-[#00f3ff]/20 rounded-2xl p-4 shadow-inner">
                        <div className="flex justify-between items-center mb-3">
                            <div className="flex items-center gap-2">

                            <div className="flex-1 relative">
                                <div className="absolute left-3 top-1/2 -translate-y-1/2 flex items-center gap-1.5">

        // === 5. 管理員後台元件 (🔥🔥 電腦版排版與網格系統大幅優化) ===
        function AdminPanel({ db, auth, user, role }) {
            const [spots, setSpots] = useState([]);
            const [issues, setIssues] = useState([]); // 問題回報的 State
            const [loading, setLoading] = useState(true);
            const [adminTab, setAdminTab] = useState('pending'); // 'pending' | 'approved' | 'issues'
            const [editingSpot, setEditingSpot] = useState(null);

            const fetchAllData = async () => {
                if(user && !user.isAnonymous && (role === 'admin' || role === 'silver')) {
                    setLoading(true);
                    try {
                        // 1. 抓取車位
                        const snap = await getDocs(collection(db, "parking_locations"));
                        const allSpots = []; 
                        snap.forEach(d => allSpots.push({ id: d.id, ...d.data() })); 
                        allSpots.sort((a,b) => (b.created_at?.seconds || 0) - (a.created_at?.seconds || 0));
                        setSpots(allSpots);

                        // 2. 抓取問題回報
                        const issuesSnap = await getDocs(collection(db, "parking_issues"));
                        const allIssues = [];
                        issuesSnap.forEach(d => allIssues.push({ id: d.id, ...d.data() }));
                        allIssues.sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                        setIssues(allIssues);

                    } catch(e) { alert("讀取資料失敗"); }
                    setLoading(false);
                }
            };

            useEffect(() => { fetchAllData(); }, [user, role]);

            if (!user || user.isAnonymous || role === 'guest') return <div className="text-center mt-10">請先登入管理員帳號</div>;
            if (role !== 'admin' && role !== 'silver') return <div className="text-center mt-10 text-red-500 font-bold">權限不足</div>;

            const displaySpots = spots.filter(s => s.status === adminTab);

            const handleAction = async (id, action) => {
                const actionName = action === 'approved' ? '核准上架' : '強制刪除';
                if(!confirm(`確定要【${actionName}】這筆資料嗎？`)) return;
                try {
                    if(action === 'approved') {
                        await updateDoc(doc(db, "parking_locations", id), { status: "approved" });
                        setSpots(spots.map(s => s.id === id ? { ...s, status: 'approved' } : s));
                    } else {
                        await deleteDoc(doc(db, "parking_locations", id));
                        setSpots(spots.filter(s => s.id !== id));
                    }
                } catch (e) { alert("操作失敗"); }
            };

            const saveEdit = async () => {
                try {
                    await updateDoc(doc(db, "parking_locations", editingSpot.id), {
                        name: editingSpot.name, address: editingSpot.address,
                        price: editingSpot.price, note: editingSpot.note,
                        provider: editingSpot.provider
                    });
                    setSpots(spots.map(s => s.id === editingSpot.id ? editingSpot : s));
                    setEditingSpot(null); alert("✅ 修改成功！");
                } catch(e) { alert("❌ 修改失敗"); }
            };

            // 問題回報的處理 (標記已讀 / 刪除)
            const handleIssueAction = async (id, action) => {
                try {
                    if (action === 'read') {
                        await updateDoc(doc(db, "parking_issues", id), { status: 'read' });
                        setIssues(issues.map(i => i.id === id ? { ...i, status: 'read' } : i));
                    } else if (action === 'delete') {
                        if (!confirm("確定要刪除這筆回報嗎？")) return;
                        await deleteDoc(doc(db, "parking_issues", id));
                        setIssues(issues.filter(i => i.id !== id));

            };

                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();

                    try {
                        const data = new Uint8Array(e.target.result);

                                        note: String(row['備註'] || ''),
                                        provider: row['提供者'] || '官方管理員',
                                        status: 'approved', 
                                        image_url: '', gmap: '', created_at: serverTimestamp()

                            alert("✅ 批次上架成功！");

                reader.readAsArrayBuffer(file);
                e.target.value = null;

                                問題回報

                                <i className="fa-solid fa-file-arrow-down"></i> 下載範本

                            <label className="flex-1 xl:flex-none px-5 py-3 bg-blue-600/20 text-blue-400 border border-blue-500/30 rounded-2xl text-sm font-bold hover:bg-blue-600 hover:text-white transition-colors cursor-pointer flex items-center justify-center gap-2">
                                <i className="fa-solid fa-file-excel"></i> 批次匯入
                                <input type="file" accept=".xlsx, .xls" className="hidden" onChange={handleExcelImport} />
                            </label>
                        </div>
                    </div>

                    {loading ? (
                        <p className="text-center py-20 text-[#00f3ff] text-lg font-bold animate-pulse"><i className="fa-solid fa-spinner fa-spin mr-2"></i>資料載入中...</p>
                    ) : (
                        <>
                            {/* 問題回報分頁內容 */}
                            {adminTab === 'issues' ? (
                                issues.length === 0 ? <p className="text-center text-gray-500 py-20 font-bold">目前無任何問題回報</p> : (
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {issues.map(issue => (
                                            <div key={issue.id} className={`bg-black/50 border ${issue.status === 'unread' ? 'border-[#ff4757]/50' : 'border-white/10'} rounded-2xl p-5 relative flex flex-col h-full`}>
                                                {issue.status === 'unread' && <div className="absolute top-0 right-0 bg-[#ff4757] text-xs font-bold px-2 py-1 rounded-bl-lg rounded-tr-lg">未讀</div>}
                                                <div className="text-xs text-gray-500 mb-3 flex items-center gap-2">
                                                    <i className="fa-regular fa-clock"></i> {formatTime(issue.createdAt)}
                                                </div>
                                                <div className="text-sm text-gray-200 mb-4 flex-1 whitespace-pre-wrap leading-relaxed">{issue.content}</div>
                                                <div className="flex gap-2 mt-auto border-t border-white/5 pt-4">
                                                    {issue.status === 'unread' && (
                                                        <button onClick={() => handleIssueAction(issue.id, 'read')} className="flex-1 bg-[#00f3ff]/10 text-[#00f3ff] py-2 rounded-xl text-sm font-bold hover:bg-[#00f3ff] hover:text-black transition-colors">標記已讀</button>
                                                    )}
                                                    <button onClick={() => handleIssueAction(issue.id, 'delete')} className="flex-1 bg-[#ff4757]/10 text-[#ff4757] py-2 rounded-xl text-sm font-bold hover:bg-[#ff4757] hover:text-white transition-colors">刪除</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )
                            ) : (
                                /* 車位審核分頁內容 (採用強大的 Grid 網格佈局) */
                                displaySpots.length === 0 ? <p className="text-center text-gray-500 py-20 font-bold">此區域目前無資料</p> : (
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {displaySpots.map(spot => (
                                            <div key={spot.id} className="bg-black/50 border border-white/10 rounded-2xl p-5 relative group flex flex-col h-full hover:border-[#bc13fe]/50 transition-colors">
                                                <div className={`absolute top-0 left-0 w-1.5 h-full ${spot.status === 'approved' ? 'bg-[#00f3ff]' : 'bg-[#bc13fe]'} rounded-l-2xl`}></div>
                                                
                                                {spot.image_url && <img src={spot.image_url} className="w-full h-40 object-cover rounded-xl mb-4 border border-white/5" />}
                                                
                                                <div className="flex justify-between items-start mb-2">
                                                    <div className="font-bold text-[#FFD700] text-lg leading-tight pr-2 line-clamp-1" title={spot.name}>{spot.name}</div>
                                                </div>

                                                <div className="text-sm text-gray-300 mb-2 bg-white/5 p-2.5 rounded-lg line-clamp-2"><i className="fa-solid fa-location-dot text-[#00f3ff] mr-2"></i>【{spot.city}】{spot.address}</div>
                                                <div className="text-sm font-bold text-[#00ff9d] mb-4"><i className="fa-solid fa-coins mr-2"></i>{spot.price || '免費'}</div>
                                                
                                                <div className="text-xs text-gray-400 mb-4 bg-black/40 p-3 rounded-lg border border-white/5 space-y-1.5 flex-1">
                                                    <p className="flex justify-between"><span>📍 座標</span> <span className="text-gray-300 font-mono">{spot.lat}, {spot.lng}</span></p>
                                                    <p className="flex justify-between"><span>📝 備註</span> <span className="text-gray-300 truncate max-w-[120px]" title={spot.note}>{spot.note || '無'}</span></p>
                                                    <p className="flex justify-between"><span>👤 提供者</span> <span className="text-[#bc13fe] font-bold truncate max-w-[120px]">{spot.provider || '未知車友'}</span></p>
                                                    <p className="flex justify-between pt-1 mt-1 border-t border-white/10"><span>🕒 時間</span> <span className="text-gray-500">{formatTime(spot.created_at)}</span></p>
                                                </div>
                                                
                                                <div className="flex gap-2 mt-auto">
                                                    {spot.status === 'pending' ? (
                                                        <>
                                                            <button onClick={() => handleAction(spot.id, 'approved')} className="flex-1 bg-[#00ff9d]/20 text-[#00ff9d] py-2.5 rounded-xl font-bold hover:bg-[#00ff9d] hover:text-black transition-colors shadow-sm"><i className="fa-solid fa-check mr-1"></i> 核准上架</button>
                                                            <button onClick={() => handleAction(spot.id, 'rejected')} className="flex-1 bg-[#ff4757]/20 text-[#ff4757] py-2.5 rounded-xl font-bold hover:bg-[#ff4757] hover:text-white transition-colors shadow-sm"><i className="fa-solid fa-trash mr-1"></i> 拒絕</button>
                                                        </>
                                                    ) : (
                                                        <>
                                                            <button onClick={() => setEditingSpot(spot)} className="flex-1 bg-blue-500/20 text-blue-400 py-2.5 rounded-xl font-bold hover:bg-blue-500 hover:text-white transition-colors shadow-sm"><i className="fa-solid fa-pen mr-1"></i> 編輯</button>
                                                            <button onClick={() => handleAction(spot.id, 'rejected')} className="flex-1 bg-[#ff4757]/20 text-[#ff4757] py-2.5 rounded-xl font-bold hover:bg-[#ff4757] hover:text-white transition-colors shadow-sm"><i className="fa-solid fa-trash-can mr-1"></i> 下架</button>
                                                        </>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )
                            )}
                        </>
                    )}

                    {/* 編輯用 Modal */}
                    {editingSpot && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
                            <div className="bg-[#0f172a] rounded-3xl border border-[#00f3ff]/30 p-6 w-full max-w-md shadow-2xl animate-in zoom-in-95">
                                <h3 className="text-xl font-bold text-[#00f3ff] mb-4"><i className="fa-solid fa-pen-to-square"></i> 修改車位資訊</h3>
                                <div className="space-y-3">
                                    <div><label className="text-xs text-gray-400">名稱</label><input type="text" value={editingSpot.name} onChange={e=>setEditingSpot({...editingSpot, name: e.target.value})} className="w-full bg-black/40 border border-[#00f3ff]/30 rounded-xl px-3 py-2 text-white outline-none focus:border-[#bc13fe]"/></div>
                                    <div><label className="text-xs text-gray-400">詳細地址</label><input type="text" value={editingSpot.address} onChange={e=>setEditingSpot({...editingSpot, address: e.target.value})} className="w-full bg-black/40 border border-[#00f3ff]/30 rounded-xl px-3 py-2 text-white outline-none focus:border-[#bc13fe]"/></div>
                                    <div><label className="text-xs text-gray-400">收費標準</label><input type="text" value={editingSpot.price} onChange={e=>setEditingSpot({...editingSpot, price: e.target.value})} className="w-full bg-black/40 border border-[#00f3ff]/30 rounded-xl px-3 py-2 text-white outline-none focus:border-[#bc13fe]"/></div>
                                    <div><label className="text-xs text-gray-400">提供者</label><input type="text" value={editingSpot.provider} onChange={e=>setEditingSpot({...editingSpot, provider: e.target.value})} className="w-full bg-black/40 border border-[#00f3ff]/30 rounded-xl px-3 py-2 text-[#FFD700] outline-none focus:border-[#bc13fe]"/></div>
                                    <div><label className="text-xs text-gray-400">備註</label><textarea value={editingSpot.note} onChange={e=>setEditingSpot({...editingSpot, note: e.target.value})} className="w-full bg-black/40 border border-[#00f3ff]/30 rounded-xl px-3 py-2 text-white outline-none focus:border-[#bc13fe] h-20 resize-none"></textarea></div>
                                </div>
                                <div className="flex gap-3 mt-6">
                                    <button onClick={()=>setEditingSpot(null)} className="flex-1 border border-gray-600 text-gray-300 py-3 rounded-xl font-bold hover:bg-gray-800 transition-colors">取消</button>
                                    <button onClick={saveEdit} className="flex-1 bg-gradient-to-r from-[#00f3ff] to-[#bc13fe] text-white py-3 rounded-xl font-bold active:scale-95 transition-transform">儲存修改</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
