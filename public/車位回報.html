<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 🔥 完美支援 PWA 與 iOS 瀏海 (viewport-fit=cover) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="重機停車">
    <meta name="theme-color" content="#090A0F">
    
    <title>重機停車</title>
    
    <!-- 🔥 APP 預設藍色星星圖示 (Base64 SVG) -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230f172a'/%3E%3Cpath d='M50 15 L61 38 L85 41 L67 58 L72 82 L50 70 L28 82 L33 58 L15 41 L39 38 Z' fill='%2300f3ff' stroke='%23fff' stroke-width='2' stroke-linejoin='round'/%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230f172a'/%3E%3Cpath d='M50 15 L61 38 L85 41 L67 58 L72 82 L50 70 L28 82 L33 58 L15 41 L39 38 Z' fill='%2300f3ff' stroke='%23fff' stroke-width='2' stroke-linejoin='round'/%3E%3C/svg%3E">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 🔥 Leaflet.js 地圖引擎 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* 強制滿版，徹底消滅容器塌陷，支援手機原生滑動手勢 */
        html, body { 
            width: 100vw; height: 100vh; margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #090A0F; color: #fff;
            overflow: hidden; 
            -webkit-tap-highlight-color: transparent;
        }
        
        #root { width: 100vw; height: 100vh; }
        
        ::-webkit-scrollbar { display: none; }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .leaflet-container { font-family: inherit; background: #090A0F; outline: none; }
        .leaflet-control-attribution { display: none !important; }
        
        /* 地圖暗黑濾鏡：將 Google Maps 轉為超高質感的星際深色 */
        .dark-map-tiles { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
        
        /* 客製化彈窗 (Popup) */
        .leaflet-popup-content-wrapper {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid #00f3ff; color: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 243, 255, 0.3);
            padding: 0; overflow: hidden;
        }
        .leaflet-popup-content { margin: 0; width: 220px !important; }
        .leaflet-popup-tip { background: rgba(15, 23, 42, 0.95); border-bottom: 1px solid #00f3ff; border-right: 1px solid #00f3ff; }
        .leaflet-popup-close-button { color: #fff !important; text-shadow: 0 0 5px black; top: 5px !important; right: 5px !important; }
        
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .bottom-sheet { animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* 🔥 iOS 瀏海與底部安全區域防護 (Safe Area Insets) */
        .safe-top-search { top: calc(1rem + env(safe-area-inset-top, 0px)); }
        .safe-top-admin { top: calc(4.5rem + env(safe-area-inset-top, 0px)); }
        .safe-bottom-fab { bottom: calc(2rem + env(safe-area-inset-bottom, 0px)); }
        .safe-bottom-locate { bottom: calc(6.5rem + env(safe-area-inset-bottom, 0px)); }
        .safe-padding-bottom { padding-bottom: env(safe-area-inset-bottom, 20px); }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, where, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAAo6on0f2QUbPaRfxpIEb2uvhKxDvPUvs",
            authDomain: "yulubox.firebaseapp.com",
            projectId: "yulubox",
            storageBucket: "yulubox.firebasestorage.app",
            messagingSenderId: "256466567852",
            appId: "1:256466567852:web:233b74668908ffcb9b9509"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app);

        const TAIWAN_CITIES = ['基隆市', '台北市', '新北市', '桃園市', '新竹市', '新竹縣', '苗栗縣', '台中市', '彰化縣', '南投縣', '雲林縣', '嘉義市', '嘉義縣', '台南市', '高雄市', '屏東縣', '宜蘭縣', '花蓮縣', '台東縣', '澎湖縣', '金門縣', '連江縣'];

        function App() {
            const [view, setView] = useState('map'); 
            const [user, setUser] = useState(null);
            const [role, setRole] = useState(null);

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
                    if (currentUser) {
                        setUser(currentUser);
                        if (!currentUser.isAnonymous) {
                            try {
                                const userDoc = await getDoc(doc(db, "users", currentUser.uid));
                                if (userDoc.exists() && userDoc.data().role) {
                                    setRole(userDoc.data().role);
                                } else {
                                    const q = query(collection(db, "users"), where("email", "==", currentUser.email));
                                    const snap = await getDocs(q);
                                    let foundRole = 'member';
                                    snap.forEach(d => { if(d.data().role) foundRole = d.data().role; });
                                    setRole(foundRole);
                                }
                            } catch (error) { setRole('member'); }
                        } else {
                            setRole('guest'); 
                        }
                    } else {
                        setUser(null); setRole(null);
                        try { 
                            await signInAnonymously(auth); 
                        } catch (e) { 
                            console.error("匿名登入失敗", e); 
                        }
                    }
                });
                return () => unsubscribe();
            }, []);

            return (
                <div className="w-full h-full relative bg-black flex flex-col overflow-hidden">
                    {view === 'map' ? (
                        <MapScreen db={db} storage={storage} user={user} role={role} onSwitchToAdmin={() => setView('admin')} />
                    ) : (
                        <div className="w-full h-full overflow-y-auto pt-6 px-4 pb-12 safe-padding-bottom bg-[radial-gradient(ellipse_at_bottom,_#1B2735_0%,_#090A0F_100%)]">
                            <div className="max-w-md mx-auto relative pt-10">
                                <button onClick={() => setView('map')} className="absolute top-0 left-0 text-gray-400 hover:text-white px-3 py-2 rounded-lg bg-white/5 border border-white/10">
                                    <i className="fa-solid fa-chevron-left"></i> 返回地圖
                                </button>
                                <div className="mt-8">
                                    <AdminPanel db={db} auth={auth} user={user} role={role} />
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function MapScreen({ db, storage, user, role, onSwitchToAdmin }) {
            const mapRef = useRef(null);
            const mapInstanceRef = useRef(null);
            const markerGroupRef = useRef(null); 
            
            const [locations, setLocations] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [isSearching, setIsSearching] = useState(false);
            const [isReportOpen, setIsReportOpen] = useState(false);
            
            // 儲存從地圖中心擷取的座標
            const [reportLocation, setReportLocation] = useState(null);

            useEffect(() => {
                const fetchApprovedSpots = async () => {
                    const q = query(collection(db, "parking_locations"), where("status", "==", "approved"));
                    const snap = await getDocs(q);
                    const spots = [];
                    snap.forEach(doc => spots.push({ id: doc.id, ...doc.data() }));
                    setLocations(spots);
                };
                fetchApprovedSpots();
            }, []);

            // 🚀 地圖初始化 (Google Maps 引擎)
            useEffect(() => {
                if (!mapRef.current) return;
                if (mapInstanceRef.current) return; 

                const map = L.map(mapRef.current, { zoomControl: false }).setView([23.6978, 120.9605], 8);
                
                L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
                    maxZoom: 20,
                    className: 'dark-map-tiles'
                }).addTo(map);

                mapInstanceRef.current = map;
                markerGroupRef.current = L.layerGroup().addTo(map);

                setTimeout(() => map.invalidateSize(), 100);
                setTimeout(() => map.invalidateSize(), 500);
                setTimeout(() => map.invalidateSize(), 1000);

                return () => {
                    if (mapInstanceRef.current) {
                        mapInstanceRef.current.remove();
                        mapInstanceRef.current = null;
                    }
                };
            }, []);

            // 畫圖釘
            useEffect(() => {
                if (!mapInstanceRef.current || !markerGroupRef.current) return;

                const map = mapInstanceRef.current;
                markerGroupRef.current.clearLayers(); 

                locations.forEach(spot => {
                    if (spot.lat && spot.lng) {
                        const customIcon = L.divIcon({
                            className: 'custom-div-icon',
                            html: `<div class="w-4 h-4 bg-[#00f3ff] rounded-full border-2 border-white shadow-[0_0_15px_#00f3ff]"></div>`,
                            iconSize: [16, 16],
                            iconAnchor: [8, 8]
                        });

                        const marker = L.marker([spot.lat, spot.lng], { icon: customIcon });
                        
                        const navLink = spot.gmap || `https://www.google.com/maps/search/?api=1&query=${spot.lat},${spot.lng}`;
                        const popupHtml = `
                            <div class="flex flex-col">
                                ${spot.image_url ? `<img src="${spot.image_url}" class="w-full h-32 object-cover border-b border-[#00f3ff]/30" />` : ''}
                                <div class="p-3">
                                    <h3 class="text-lg font-bold text-[#00f3ff] mb-1 leading-tight">${spot.name}</h3>
                                    <p class="text-xs text-gray-300 mb-1 truncate"><i class="fa-solid fa-location-dot"></i> ${spot.city}</p>
                                    <p class="text-sm font-bold text-[#00ff9d] mb-2"><i class="fa-solid fa-coins"></i> ${spot.price}</p>
                                    ${spot.note ? `<p class="text-xs text-gray-400 bg-white/10 p-2 rounded mb-2">${spot.note}</p>` : ''}
                                    <a href="${navLink}" target="_blank" class="block w-full py-2 bg-gradient-to-r from-[#00f3ff] to-[#bc13fe] text-center text-white font-bold rounded-lg text-sm transition-all hover:opacity-90">
                                        <i class="fa-solid fa-location-arrow"></i> 導航前往
                                    </a>
                                </div>
                            </div>
                        `;
                        marker.bindPopup(popupHtml);
                        markerGroupRef.current.addLayer(marker);
                    }
                });
            }, [locations]);

            // 搜尋地標
            const handleSearch = async (e) => {
                e.preventDefault();
                if (!searchQuery.trim()) return;
                setIsSearching(true);
                
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(searchQuery)}&countrycodes=tw&limit=1`);
                    const data = await res.json();
                    
                    if (data && data.length > 0) {
                        const { lat, lon } = data[0];
                        mapInstanceRef.current.flyTo([lat, lon], 16, { duration: 1.5 });
                    } else {
                        alert("找不到該地標，請嘗試其他關鍵字！");
                    }
                } catch (err) { console.error(err); }
                setIsSearching(false);
                document.activeElement.blur(); 
            };

            // 定位目前位置
            const locateMe = () => {
                if (!navigator.geolocation) return alert('不支援定位功能');
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const { latitude, longitude } = pos.coords;
                        mapInstanceRef.current.flyTo([latitude, longitude], 16, { duration: 1.5 });
                        
                        L.circleMarker([latitude, longitude], {
                            icon: L.divIcon({
                                className: 'user-loc',
                                html: `<div class="w-5 h-5 bg-[#ff4757] rounded-full border-[3px] border-white shadow-[0_0_20px_#ff4757] animate-pulse"></div>`,
                                iconSize: [20, 20], iconAnchor: [10, 10]
                            })
                        }).addTo(mapInstanceRef.current).bindPopup("您目前的位置").openPopup();
                    },
                    (err) => alert('無法取得定位，請確認手機已開啟位置權限。'),
                    { enableHighAccuracy: true }
                );
            };

            // 開啟回報視窗 (自動擷取地圖中心點)
            const handleOpenReport = () => {
                if (mapInstanceRef.current) {
                    const center = mapInstanceRef.current.getCenter();
                    setReportLocation({ lat: center.lat, lng: center.lng });
                }
                setIsReportOpen(true);
            };

            return (
                <div className="w-full h-full relative overflow-hidden flex-1">
                    {/* 地圖容器 */}
                    <div ref={mapRef} style={{width: '100%', height: '100%'}} className="absolute inset-0 z-0"></div>

                    {/* --- 浮動 UI 層 --- */}
                    <div className="absolute inset-0 z-[50] pointer-events-none">
                        
                        {/* 頂部搜尋列 (適配瀏海 Safe Area) */}
                        <div className="absolute left-4 right-4 sm:left-1/2 sm:-translate-x-1/2 sm:w-[400px] pointer-events-auto safe-top-search">
                            <form onSubmit={handleSearch} className="flex items-center glass-panel rounded-full overflow-hidden shadow-lg p-1">
                                <a href="index.html" className="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-white transition-colors">
                                    <i className="fa-solid fa-house"></i>
                                </a>
                                <input 
                                    type="text" 
                                    placeholder="搜尋地標或縣市..." 
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    className="flex-1 bg-transparent border-none text-white px-2 focus:outline-none text-base"
                                />
                                <button type="submit" className="w-10 h-10 bg-[#00f3ff]/20 text-[#00f3ff] rounded-full flex items-center justify-center hover:bg-[#00f3ff] hover:text-black transition-colors">
                                    {isSearching ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-magnifying-glass"></i>}
                                </button>
                            </form>
                        </div>

                        {/* 右上角：管理員入口 (適配瀏海 Safe Area) */}
                        {role !== 'guest' && (
                            <button 
                                onClick={onSwitchToAdmin}
                                className="absolute right-4 w-12 h-12 glass-panel rounded-full text-[#bc13fe] flex items-center justify-center shadow-lg pointer-events-auto hover:bg-[#bc13fe]/20 safe-top-admin"
                                title="管理中心"
                            >
                                <i className="fa-solid fa-user-shield text-xl"></i>
                            </button>
                        )}

                        {/* 🔥 畫面正中央：拖曳定位準心 */}
                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-full z-[40] pointer-events-none flex flex-col items-center">
                            <div className="bg-gradient-to-r from-[#bc13fe] to-[#8a2be2] text-white text-xs font-bold px-3 py-1.5 rounded-full shadow-[0_0_15px_rgba(188,19,254,0.6)] mb-1 whitespace-nowrap border border-white/20">
                                拖曳地圖以定出車位
                            </div>
                            <i className="fa-solid fa-location-dot text-4xl text-[#ff4757] drop-shadow-[0_5px_5px_rgba(0,0,0,0.5)]"></i>
                        </div>

                        {/* 右下角：定位按鈕 */}
                        <button 
                            onClick={locateMe}
                            className="absolute right-5 w-12 h-12 bg-white/10 backdrop-blur border border-white/20 text-white rounded-full flex items-center justify-center shadow-lg pointer-events-auto hover:bg-white/20 transition-colors safe-bottom-locate"
                        >
                            <i className="fa-solid fa-crosshairs text-xl"></i>
                        </button>

                        {/* 右下角：超巨大回報 FAB */}
                        <button 
                            onClick={handleOpenReport}
                            className="absolute right-5 w-16 h-16 bg-gradient-to-tr from-[#00f3ff] to-[#bc13fe] text-white rounded-full flex items-center justify-center shadow-[0_5px_25px_rgba(0,243,255,0.5)] pointer-events-auto hover:scale-105 active:scale-95 transition-all z-[60] safe-bottom-fab"
                        >
                            <i className="fa-solid fa-plus text-3xl"></i>
                        </button>
                    </div>

                    {/* --- 回報車位 Bottom Sheet Modal --- */}
                    {isReportOpen && (
                        <div className="absolute inset-0 z-[100] flex items-end sm:items-center justify-center bg-black/60 backdrop-blur-sm pointer-events-auto">
                            <div className="absolute inset-0" onClick={() => setIsReportOpen(false)}></div>
                            
                            <div className="w-full max-w-lg bg-[#0f172a] rounded-t-3xl sm:rounded-3xl border-t sm:border border-[#00f3ff]/30 shadow-2xl relative bottom-sheet max-h-[90dvh] overflow-y-auto overflow-x-hidden safe-padding-bottom">
                                <div className="w-12 h-1.5 bg-gray-600 rounded-full mx-auto my-3 sm:hidden"></div>
                                
                                <button onClick={() => setIsReportOpen(false)} className="absolute top-4 right-4 w-8 h-8 bg-white/10 rounded-full flex items-center justify-center hover:bg-white/20 transition-colors z-10">
                                    <i className="fa-solid fa-xmark text-white"></i>
                                </button>

                                <div className="p-6 pt-2">
                                    <ReportForm 
                                        db={db} storage={storage} user={user} 
                                        onClose={() => setIsReportOpen(false)} 
                                        initialLocation={reportLocation}
                                    />
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // === 4. 車位回報表單 (支援直接輸入座標 & 拖曳定位解析) ===
        function ReportForm({ db, storage, user, onClose, initialLocation }) {
            const [formData, setFormData] = useState({ 
                name: '', city: '台北市', address: '', lat: '', lng: '', 
                priceType: '免費', priceAmount: '', gmap: '', note: '', provider: '熱心車友' 
            });
            const [imageFile, setImageFile] = useState(null);
            const [previewUrl, setPreviewUrl] = useState('');
            const [loading, setLoading] = useState(false);
            const [msg, setMsg] = useState('');

            // 初始化時讀取使用者名稱，以及進行反向地理編碼 (Reverse Geocoding)
            useEffect(() => {
                if (user && !user.isAnonymous) {
                    getDoc(doc(db, "users", user.uid)).then(d => {
                        if (d.exists()) setFormData(prev => ({...prev, provider: d.data().displayName || d.data().lineName || '熱心車友'}));
                    }).catch(()=>{});
                }
                
                if (initialLocation) {
                    setFormData(prev => ({...prev, lat: initialLocation.lat, lng: initialLocation.lng}));
                    setMsg('🌍 正在自動解析此處地點資訊...');
                    
                    // 透過 OpenStreetMap 進行免費的反向解析
                    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${initialLocation.lat}&lon=${initialLocation.lng}&zoom=18&addressdetails=1`)
                    .then(res => res.json())
                    .then(data => {
                        if(data && data.address) {
                            const addr = data.address;
                            const city = addr.city || addr.county || addr.town || '台北市';
                            const matchedCity = TAIWAN_CITIES.find(c => city.includes(c) || c.includes(city)) || '台北市';
                            const road = addr.road || '';
                            const suburb = addr.suburb || addr.village || '';
                            const finalAddress = `${suburb}${road}` || data.display_name.split(',')[0];
                            
                            setFormData(prev => ({
                                ...prev, 
                                city: matchedCity, 
                                address: finalAddress
                            }));
                            setMsg('✅ 地理資訊自動填入成功');
                            setTimeout(() => setMsg(''), 2500);
                        } else {
                            setMsg('');
                        }
                    })
                    .catch(() => setMsg(''));
                }
            }, [user, initialLocation]);

            const compressImage = (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (e) => {
                        const img = new Image(); img.src = e.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let { width, height } = img;
                            if (width > 800) { height *= 800 / width; width = 800; }
                            canvas.width = width; canvas.height = height;
                            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                            canvas.toBlob(blob => blob ? resolve(new File([blob], `${Date.now()}.webp`, { type: 'image/webp' })) : reject(), 'image/webp', 0.5);
                        };
                    };
                });
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true); setMsg('🚀 傳輸中...');
                try {
                    let url = "";
                    if (imageFile) {
                        const file = await compressImage(imageFile);
                        const uploadTask = await uploadBytesResumable(ref(storage, `parking_images/${file.name}`), file);
                        url = await getDownloadURL(uploadTask.ref);
                    }
                    const price = formData.priceType === '免費' ? '免費' : (formData.priceAmount ? `${formData.priceType}：${formData.priceAmount}` : formData.priceType);

                    await addDoc(collection(db, "parking_locations"), {
                        ...formData, 
                        lat: parseFloat(formData.lat) || 0, lng: parseFloat(formData.lng) || 0,
                        price: price, image_url: url, status: "pending", created_at: serverTimestamp()
                    });
                    
                    alert('✨ 回報成功！已送交總部審核，感謝您的熱心貢獻！');
                    onClose(); 
                } catch (error) { setMsg('❌ 傳輸失敗：' + error.message); }
                setLoading(false);
            };

            return (
                <form onSubmit={handleSubmit} className="space-y-4">
                    <h2 className="text-2xl font-bold mb-4 text-center text-[#00f3ff]"><i className="fa-solid fa-satellite-dish"></i> 停車情報回報</h2>
                    
                    <div className="grid grid-cols-2 gap-3">
                        <div className="col-span-2">
                            <label className="text-xs text-[#00f3ff]">停車場名稱 *</label>
                            <input required type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full bg-black/40 border border-[#00f3ff]/30 rounded-xl px-3 py-2 text-white outline-none focus:border-[#bc13fe]" placeholder="例：羅東夜市周邊" />
                        </div>
                        
                        <div>
                            <label className="text-xs text-[#00f3ff]">縣市 *</label>
                            <select value={formData.city} onChange={e => setFormData({...formData, city: e.target.value})} className="w-full bg-black/40 border border-[#00f3ff]/30 rounded-xl px-3 py-2 text-white outline-none focus:border-[#bc13fe]">
                                {TAIWAN_CITIES.map(c => <option key={c} value={c} className="bg-gray-900">{c}</option>)}
                            </select>
                        </div>
                        
                        <div>
                            <label className="text-xs text-[#00f3ff]">詳細地址</label>
                            <input type="text" value={formData.address} onChange={e => setFormData({...formData, address: e.target.value})} className="w-full bg-black/40 border border-[#00f3ff]/30 rounded-xl px-3 py-2 text-white outline-none focus:border-[#bc13fe]" />
                        </div>
                    </div>

                    {/* 🔥 開放手動修改與直接輸入座標 */}
                    <div className="bg-black/30 border border-white/10 rounded-xl p-3">
                        <div className="flex justify-between items-center mb-2">
                            <div className="text-xs text-[#00f3ff] font-bold"><i className="fa-solid fa-location-crosshairs"></i> 據點座標 (可直接修改)</div>
                        </div>
                        <div className="grid grid-cols-2 gap-2">
                            <input type="number" step="any" placeholder="緯度 Lat" value={formData.lat} onChange={e => setFormData({...formData, lat: e.target.value})} className="w-full bg-black/50 border border-gray-600 rounded-md px-2 py-1 text-sm text-[#FFD700] outline-none focus:border-[#bc13fe]" />
                            <input type="number" step="any" placeholder="經度 Lng" value={formData.lng} onChange={e => setFormData({...formData, lng: e.target.value})} className="w-full bg-black/50 border border-gray-600 rounded-md px-2 py-1 text-sm text-[#FFD700] outline-none focus:border-[#bc13fe]" />
                        </div>
                    </div>

                    <div className="grid grid-cols-2 gap-3">
                        <div>
                            <label className="text-xs text-[#00f3ff]">收費</label>
                            <select value={formData.priceType} onChange={e => setFormData({...formData, priceType: e.target.value})} className="w-full bg-black/40 border border-[#00f3ff]/30 rounded-xl px-3 py-2 text-white outline-none">
                                <option value="免費" className="bg-gray-900">免費</option><option value="計時" className="bg-gray-900">計時</option><option value="計次" className="bg-gray-900">計次</option>
                            </select>
                        </div>
                        {formData.priceType !== '免費' && (
                            <div>
                                <label className="text-xs text-[#00f3ff]">費率</label>
                                <input type="text" value={formData.priceAmount} onChange={e => setFormData({...formData, priceAmount: e.target.value})} className="w-full bg-black/40 border border-[#00f3ff]/30 rounded-xl px-3 py-2 text-white outline-none" placeholder="例：30/H" />
                            </div>
                        )}
                    </div>

                    <div className="col-span-2">
                        <label className="text-xs text-[#00f3ff]">實景照片</label>
                        <label className="flex flex-col items-center justify-center w-full h-24 border-2 border-dashed border-[#00f3ff]/30 rounded-xl cursor-pointer hover:bg-[#00f3ff]/10 relative overflow-hidden">
                            {previewUrl ? <img src={previewUrl} className="absolute inset-0 w-full h-full object-cover" /> : <div className="text-gray-400 text-sm"><i className="fa-solid fa-camera text-[#00f3ff] mb-1"></i> 上傳照片</div>}
                            <input type="file" className="hidden" accept="image/*" onChange={(e) => { if(e.target.files[0]){ setImageFile(e.target.files[0]); setPreviewUrl(URL.createObjectURL(e.target.files[0])); } }} />
                        </label>
                    </div>

                    <div>
                        <label className="text-xs text-[#00f3ff]">備註事項</label>
                        <input type="text" value={formData.note} onChange={e => setFormData({...formData, note: e.target.value})} className="w-full bg-black/40 border border-[#00f3ff]/30 rounded-xl px-3 py-2 text-white outline-none" placeholder="有無雨遮、是否陡坡？" />
                    </div>

                    {msg && <div className="text-[#00ff9d] text-center text-xs animate-pulse font-bold">{msg}</div>}
                    
                    <button disabled={loading} type="submit" className="w-full py-3 bg-gradient-to-r from-[#00f3ff] to-[#bc13fe] text-white font-bold rounded-xl mt-2 active:scale-95 transition-transform">
                        {loading ? '上傳中...' : '提交審核'}
                    </button>
                </form>
            );
        }

        // === 5. 管理員後台元件 ===
        function AdminPanel({ db, auth, user, role }) {
            const [pendingSpots, setPendingSpots] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => { 
                if(user && !user.isAnonymous && (role === 'admin' || role === 'silver')) {
                    getDocs(query(collection(db, "parking_locations"), where("status", "==", "pending"))).then(snap => {
                        const spots = []; snap.forEach(d => spots.push({ id: d.id, ...d.data() })); setPendingSpots(spots); setLoading(false);
                    }).catch(()=>setLoading(false));
                }
            }, [user, role]);

            if (!user || user.isAnonymous || role === 'guest') return <div className="text-center mt-10">請先從首頁登入</div>;
            if (role !== 'admin' && role !== 'silver') return <div className="text-center mt-10 text-red-500 font-bold">權限不足</div>;

            const handleAction = async (id, action) => {
                if(!confirm(`確定要${action==='approved'?'核准':'刪除'}這筆資料嗎？`)) return;
                try {
                    if(action==='approved') await updateDoc(doc(db, "parking_locations", id), { status: "approved" });
                    else await deleteDoc(doc(db, "parking_locations", id));
                    setPendingSpots(pendingSpots.filter(s => s.id !== id));
                } catch (e) { alert("操作失敗"); }
            };

            return (
                <div className="glass-panel rounded-3xl p-6 mb-10">
                    <h2 className="text-xl font-bold text-[#bc13fe] mb-6"><i className="fa-solid fa-clipboard-check"></i> 待審核名單 ({pendingSpots.length})</h2>
                    {loading ? <p className="text-center">讀取中...</p> : pendingSpots.length === 0 ? <p className="text-center text-gray-500">無待審資料</p> : 
                        <div className="space-y-4">
                            {pendingSpots.map(spot => (
                                <div key={spot.id} className="bg-black/40 border border-white/10 rounded-2xl p-4">
                                    {spot.image_url && <img src={spot.image_url} className="w-full h-32 object-cover rounded-xl mb-3" />}
                                    <div className="font-bold text-[#FFD700] mb-1">{spot.name}</div>
                                    <div className="text-sm text-gray-300 mb-2">【{spot.city}】{spot.address}</div>
                                    <div className="flex gap-2 mt-4">
                                        <button onClick={() => handleAction(spot.id, 'approved')} className="flex-1 bg-[#00ff9d]/20 text-[#00ff9d] py-2 rounded-xl font-bold">核准</button>
                                        <button onClick={() => handleAction(spot.id, 'rejected')} className="flex-1 bg-[#ff4757]/20 text-[#ff4757] py-2 rounded-xl font-bold">退回</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    }
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
