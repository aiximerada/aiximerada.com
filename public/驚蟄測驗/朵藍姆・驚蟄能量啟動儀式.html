<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>朵藍姆・驚蟄能量啟動儀式</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&display=swap');
        
        body { 
            font-family: 'Noto Serif TC', serif; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            background-color: #faf5ff; 
        }

        /* 浮動特效 */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        .floating { animation: float 4s ease-in-out infinite; }
        .delay-1 { animation-delay: 0s; }
        .delay-2 { animation-delay: 0.7s; }
        .delay-3 { animation-delay: 1.4s; }
        .delay-4 { animation-delay: 0.3s; }
        .delay-5 { animation-delay: 1.1s; }
        .delay-6 { animation-delay: 1.8s; }

        .reveal-anim { 
            animation: revealUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }
        @keyframes revealUp { 
            0% { opacity: 0; transform: translateY(20px); } 
            100% { opacity: 1; transform: translateY(0); } 
        }

        #capture-area {
            background-color: #ffffff;
            position: relative;
        }
    </style>
</head>

<body class="min-h-screen py-8 md:py-12 px-4 sm:px-6 text-gray-800 flex flex-col items-center relative">
    
    <div class="w-full max-w-3xl bg-white/80 p-6 sm:p-10 rounded-[2rem] shadow-xl border border-purple-100 relative z-10" id="main-content-container">
        
        <header class="text-center mb-10 space-y-5">
            <h1 class="text-3xl sm:text-4xl font-bold text-purple-900 mb-2 tracking-[0.1em] leading-tight">
                朵藍姆・驚蟄能量<br class="block sm:hidden">啟動儀式
            </h1>
            <h2 class="text-base sm:text-lg font-semibold text-amber-600 tracking-widest px-2">
                《 萬物復甦，你的內在力量正在啟動什麼？ 》
            </h2>
            
            <div class="max-w-xl mx-auto bg-purple-50 py-8 px-5 rounded-3xl mt-8 border border-purple-100 transition-all duration-300" id="guide-box">
                <p class="mb-5 text-gray-600 tracking-wider text-sm sm:text-base leading-relaxed">
                    今天，請給自己三分鐘。<br>深呼吸三次，將手放在心口，問自己：
                </p>
                <p class="text-xl sm:text-2xl font-bold text-purple-900 my-4 tracking-widest">
                    「此刻，我的內在力量<br class="block sm:hidden">正在啟動什麼？」
                </p>
                <p class="text-xs sm:text-sm text-purple-600 font-bold tracking-widest mt-5 transition-colors" id="guide-text">
                    ✧ 憑直覺點擊一張圖騰，讓靈魂為你指引 ✧
                </p>
            </div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 sm:gap-6 mb-10" id="card-grid">
            <div class="totem-card floating delay-1 relative cursor-pointer transition-all duration-300" onclick="showResult('A', this, 'S__213467149_0.jpg')">
                <div class="card-inner bg-white p-2 rounded-2xl shadow-sm border border-purple-50 transition-all duration-300"><img src="S__213467149_0.jpg" alt="圖騰 A" class="w-full rounded-xl object-cover pointer-events-none"></div>
            </div>
            <div class="totem-card floating delay-2 relative cursor-pointer transition-all duration-300" onclick="showResult('B', this, 'S__213467150_0.jpg')">
                <div class="card-inner bg-white p-2 rounded-2xl shadow-sm border border-purple-50 transition-all duration-300"><img src="S__213467150_0.jpg" alt="圖騰 B" class="w-full rounded-xl object-cover pointer-events-none"></div>
            </div>
            <div class="totem-card floating delay-3 relative cursor-pointer transition-all duration-300" onclick="showResult('C', this, 'S__213467151_0.jpg')">
                <div class="card-inner bg-white p-2 rounded-2xl shadow-sm border border-purple-50 transition-all duration-300"><img src="S__213467151_0.jpg" alt="圖騰 C" class="w-full rounded-xl object-cover pointer-events-none"></div>
            </div>
            <div class="totem-card floating delay-4 relative cursor-pointer transition-all duration-300" onclick="showResult('D', this, 'S__213467152_0.jpg')">
                <div class="card-inner bg-white p-2 rounded-2xl shadow-sm border border-purple-50 transition-all duration-300"><img src="S__213467152_0.jpg" alt="圖騰 D" class="w-full rounded-xl object-cover pointer-events-none"></div>
            </div>
            <div class="totem-card floating delay-5 relative cursor-pointer transition-all duration-300" onclick="showResult('E', this, 'S__213467153_0.jpg')">
                <div class="card-inner bg-white p-2 rounded-2xl shadow-sm border border-purple-50 transition-all duration-300"><img src="S__213467153_0.jpg" alt="圖騰 E" class="w-full rounded-xl object-cover pointer-events-none"></div>
            </div>
            <div class="totem-card floating delay-6 relative cursor-pointer transition-all duration-300" onclick="showResult('F', this, 'S__213467154_0.jpg')">
                <div class="card-inner bg-white p-2 rounded-2xl shadow-sm border border-purple-50 transition-all duration-300"><img src="S__213467154_0.jpg" alt="圖騰 F" class="w-full rounded-xl object-cover pointer-events-none"></div>
            </div>
        </div>

        <div id="result-wrapper" class="hidden flex flex-col items-center w-full">
            
            <div id="capture-area" class="w-full relative p-8 sm:p-10 rounded-3xl border border-amber-200 text-center mb-6 shadow-sm">
                <p class="text-xs text-purple-600 font-bold tracking-[0.2em] mb-6">✦ 朵藍姆・宇宙圖騰靈導員 ✦</p>

                <div class="w-32 h-32 mx-auto mb-6 rounded-2xl p-2 bg-white shadow-sm border border-gray-100">
                    <img id="result-img" src="" alt="你的專屬圖騰" class="w-full h-full object-contain rounded-xl">
                </div>
                
                <h3 id="result-title" class="text-xl sm:text-2xl font-bold text-amber-700 mb-6 tracking-widest"></h3>
                <div class="w-8 h-0.5 bg-amber-300 mx-auto mb-6 rounded-full"></div>
                <p id="result-text" class="text-base text-gray-700 leading-loose tracking-wider whitespace-pre-line font-medium"></p>
                
                <p class="text-[11px] text-gray-400 mt-10 tracking-widest">萬物復甦，你醒在哪個維度？</p>
            </div>

            <div class="w-full max-w-sm flex flex-col gap-3 mt-2">
                <button id="generate-btn" onclick="generateImage()" class="w-full flex items-center justify-center gap-2 bg-purple-700 text-white px-6 py-4 rounded-full text-base font-bold tracking-widest hover:bg-purple-800 transition-all shadow-lg">
                    ✨ 製作專屬神諭圖卡分享
                </button>
                
                <button onclick="resetDraw()" class="w-full flex items-center justify-center gap-2 bg-purple-50 text-purple-700 border border-purple-200 px-6 py-3.5 rounded-full text-sm font-bold tracking-widest hover:bg-purple-100 transition-all">
                    ↺ 再抽一次
                </button>
            </div>
        </div>
    </div>

    <div id="final-share-section" class="hidden w-full max-w-xl mx-auto mt-6 flex flex-col items-center px-4 reveal-anim pb-20">
        
        <div class="bg-amber-50 text-amber-800 px-6 py-3 rounded-full text-sm font-bold tracking-widest mb-6 flex items-center gap-2 border border-amber-200 shadow-sm animate-bounce">
            <span>👇 請長按下方圖片儲存圖片 👇</span>
        </div>

        <img id="generated-final-image" src="" alt="你的神諭卡" class="w-full rounded-3xl shadow-2xl border border-gray-200 mb-8 pointer-events-auto">

        <h4 class="text-gray-600 font-bold tracking-widest mb-4">儲存圖片後，立刻分享到：</h4>
        
        <div class="flex flex-col sm:flex-row gap-4 w-full justify-center">
            <a href="instagram://" fallback-href="https://www.instagram.com/" onclick="openApp(event)" class="flex-1 flex items-center justify-center gap-2 bg-gradient-to-r from-[#833AB4] via-[#FD1D1D] to-[#F56040] text-white px-5 py-3.5 rounded-2xl text-sm font-bold tracking-wider shadow-md active:scale-95 transition-transform">
                打開 Instagram
            </a>
            <a href="fb://profile" fallback-href="https://www.facebook.com/" onclick="openApp(event)" class="flex-1 flex items-center justify-center gap-2 bg-[#1877F2] text-white px-5 py-3.5 rounded-2xl text-sm font-bold tracking-wider shadow-md active:scale-95 transition-transform">
                打開 Facebook
            </a>
            <a href="line://msg/text/?這是我抽到的驚蟄指引！萬物復甦，你醒在哪個維度？" fallback-href="https://line.me/" onclick="openApp(event)" class="flex-1 flex items-center justify-center gap-2 bg-[#06C755] text-white px-5 py-3.5 rounded-2xl text-sm font-bold tracking-wider shadow-md active:scale-95 transition-transform">
                打開 LINE
            </a>
        </div>

        <button onclick="resetDraw()" class="mt-10 text-gray-500 font-bold tracking-widest hover:text-purple-600 transition-colors underline underline-offset-4 text-sm">
            ↺ 重新測驗
        </button>
    </div>

    <script>
        const data = {
            'A': { title: 'A｜🔥 生命之火啟動', text: '你內在的慾望不是慾望，而是創造力。\n燃燒的是更高維度的召喚。\n擴展正在發生，你的意識正在拉升。' },
            'B': { title: 'B｜🌱 自我覺察升級', text: '外在不是答案。\n你的洞察已成熟。\n向內深耕，新的視野正在等你跨出那一步。' },
            'C': { title: 'C｜🔥 靜默中的爆發力', text: '等待不是停滯。\n那是不動聲色的蓄能。\n時機已到，你的火焰將穿越舊課題。' },
            'D': { title: 'D｜🌅 靈魂智慧甦醒', text: '那些不被理解的歷程，都是準備。\n你其實早已準備好。\n春風正在推你向前。' },
            'E': { title: 'E｜🌊 穩定中的創造力', text: '你的沉靜，是力量。\n當你安住內在，創造力會自然上升。\n限制，只來自未被允許的渴望。' },
            'F': { title: 'F｜🌬 落地的靈魂種子', text: '你有無限創意。\n但種子需要土地。\n選擇一個立足點，讓夢開始發芽。' }
        };

        let hasSelected = false;

        function showResult(choice, selectedElement, imgSrc) {
            if (hasSelected) return; 
            hasSelected = true;

            const wrapper = document.getElementById('result-wrapper');
            const titleElement = document.getElementById('result-title');
            const textElement = document.getElementById('result-text');
            const resultImg = document.getElementById('result-img');
            const allCards = document.querySelectorAll('.totem-card');
            
            // 改變指引文字狀態
            const guideText = document.getElementById('guide-text');
            guideText.innerText = "✧ 這是靈魂給你的驚蟄指引 ✧";
            guideText.classList.replace('text-purple-600', 'text-amber-600');
            document.getElementById('guide-box').classList.replace('bg-purple-50', 'bg-amber-50');

            // 處理卡片鎖定狀態
            allCards.forEach(card => {
                const innerDiv = card.querySelector('.card-inner');
                card.style.animation = 'none'; 
                card.classList.remove('cursor-pointer');

                if (card === selectedElement) {
                    card.classList.add('scale-105', 'z-20');
                    innerDiv.className = 'card-inner bg-amber-50 p-2 rounded-2xl border-2 border-amber-400 shadow-lg transition-all duration-300';
                } else {
                    card.classList.add('opacity-40', 'scale-90', 'grayscale');
                }
            });

            titleElement.innerText = data[choice].title;
            textElement.innerText = data[choice].text;
            resultImg.src = imgSrc;

            wrapper.classList.remove('hidden');
            wrapper.classList.add('reveal-anim');

            setTimeout(() => {
                wrapper.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 300);
        }

        // ================= 新增：重置抽卡功能 =================
        function resetDraw() {
            hasSelected = false; // 解除鎖定

            // 1. 還原頂部引導文字與背景
            const guideText = document.getElementById('guide-text');
            guideText.innerText = "✧ 憑直覺點擊一張圖騰，讓靈魂為你指引 ✧";
            guideText.classList.replace('text-amber-600', 'text-purple-600');
            document.getElementById('guide-box').classList.replace('bg-amber-50', 'bg-purple-50');

            // 2. 還原所有卡片狀態
            const allCards = document.querySelectorAll('.totem-card');
            allCards.forEach(card => {
                const innerDiv = card.querySelector('.card-inner');
                // 移除選中與未選中的特效
                card.classList.remove('scale-105', 'z-20', 'opacity-40', 'scale-90', 'grayscale');
                // 恢復游標與浮動動畫
                card.classList.add('cursor-pointer');
                card.style.animation = ''; 
                // 還原內部框線與背景
                innerDiv.className = 'card-inner bg-white p-2 rounded-2xl shadow-sm border border-purple-50 transition-all duration-300';
            });

            // 3. 隱藏結果區塊
            const wrapper = document.getElementById('result-wrapper');
            wrapper.classList.add('hidden');
            wrapper.classList.remove('reveal-anim');

            // 4. 隱藏截圖分享區塊，並把主容器顯示回來（針對截圖後的重置）
            document.getElementById('final-share-section').classList.add('hidden');
            document.getElementById('main-content-container').style.display = 'block';

            // 5. 平滑滾動回最上方
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ================= 截圖與生成圖片功能 =================
        async function generateImage() {
            const captureArea = document.getElementById('capture-area');
            const generateBtn = document.getElementById('generate-btn');
            const originalText = generateBtn.innerHTML;
            
            generateBtn.innerText = "✨ 正在合成圖片，請稍候...";
            generateBtn.classList.add('opacity-70', 'cursor-not-allowed');

            try {
                window.scrollTo(0, 0);

                const canvas = await html2canvas(captureArea, {
                    scale: 2, 
                    backgroundColor: "#ffffff",
                    useCORS: true, 
                    allowTaint: true
                });
                
                const imgData = canvas.toDataURL("image/png");
                
                document.getElementById('main-content-container').style.display = 'none';
                document.getElementById('generated-final-image').src = imgData;
                
                const finalSection = document.getElementById('final-share-section');
                finalSection.classList.remove('hidden');

                window.scrollTo(0, 0);
                
                // 復原按鈕文字，以防使用者按了「重置」後按鈕文字沒回來
                generateBtn.innerHTML = originalText;
                generateBtn.classList.remove('opacity-70', 'cursor-not-allowed');
                
            } catch (error) {
                console.error('截圖失敗:', error);
                alert('圖片合成失敗，請重新整理網頁再試一次。');
                generateBtn.innerHTML = originalText;
                generateBtn.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        }

        // ================= App 喚醒功能 =================
        function openApp(event) {
            event.preventDefault();
            const target = event.currentTarget;
            const appUrl = target.getAttribute('href');
            const fallbackUrl = target.getAttribute('fallback-href');

            window.location.href = appUrl;

            setTimeout(() => {
                if (document.hidden || document.webkitHidden) return; 
                window.open(fallbackUrl, '_blank');
            }, 1500);
        }
    </script>
</body>
</html>
