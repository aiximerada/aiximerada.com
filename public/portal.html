<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>網址傳送門 - 玉露寶庫</title>
    
    <!-- 引入主題設定 -->
    <script src="theme.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- React 核心 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            font-family: 'Microsoft JhengHei', sans-serif; 
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            color: #fff;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* 滾動條美化 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        ::-webkit-scrollbar-thumb { background: #3bc6e4; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #00f3ff; }

        /* 星空背景特效 */
        .space-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .star-field { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background-repeat: repeat; opacity: 0.5; animation: rotateSpace 240s linear infinite; }
        .stars-distant { background-image: radial-gradient(1px 1px at 10% 15%, #fff, transparent), radial-gradient(1px 1px at 30% 60%, #ddd, transparent); background-size: 300px 300px; }
        @keyframes rotateSpace { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 玻璃擬態卡片 */
        .glass-card {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        /* 輸入框特效 */
        .cyber-input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            transition: all 0.3s ease;
        }
        .cyber-input:focus {
            outline: none;
            border-color: #00f3ff;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
            background: rgba(0, 0, 0, 0.6);
        }
    </style>
</head>
<body>
    <div class="space-container">
        <div class="star-field stars-distant"></div>
    </div>
    
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect } = React;
        const { createRoot } = ReactDOM;

        // --- Firebase Imports ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, onSnapshot, query, where, deleteDoc, doc, updateDoc, orderBy, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 🔥 設定您的 Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAAo6on0f2QUbPaRfxpIEb2uvhKxDvPUvs",
            authDomain: "yulubox.firebaseapp.com",
            projectId: "yulubox",
            storageBucket: "yulubox.firebasestorage.app",
            messagingSenderId: "256466567852",
            appId: "1:256466567852:web:233b74668908ffcb9b9509"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'portal-system'; // 資料庫分區 ID

        // --- 主程式 ---
        function App() {
            // 權限與狀態
            const [user, setUser] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [loading, setLoading] = useState(true);

            // 使用者提取區 State
            const [accessCode, setAccessCode] = useState('');
            const [retrievedPortal, setRetrievedPortal] = useState(null);
            const [retrieveError, setRetrieveError] = useState('');
            const [showQRFor, setShowQRFor] = useState(null);

            // 管理員區 State
            const [portals, setPortals] = useState([]);
            const [isEditing, setIsEditing] = useState(false);
            const [editId, setEditId] = useState(null);
            const [adminForm, setAdminForm] = useState({
                projectName: '', 
                password: '',
                items: [{ note: '', url: '' }]
            });

            // 1. 初始化與權限驗證 (完全移除匿名登入，避免報錯)
            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
                    if (currentUser) {
                        setUser(currentUser);
                        try {
                            // 透過 UID 讀取個人資料判定權限
                            const userDocRef = doc(db, "users", currentUser.uid);
                            const userDocSnap = await getDoc(userDocRef);
                            
                            let role = 'member';
                            if (userDocSnap.exists()) {
                                role = userDocSnap.data().role;
                            } else {
                                // 備用方案
                                const q = query(collection(db, "users"), where("email", "==", currentUser.email));
                                const snap = await getDocs(q);
                                snap.forEach(d => { role = d.data().role; });
                            }
                            
                            // 同時開放 admin 和 silver 擁有管理權限
                            setIsAdmin(role === 'admin' || role === 'silver');
                        } catch (error) {
                            console.error("權限驗證失敗：", error);
                            setIsAdmin(false);
                        }
                    } else {
                        // 🔥 關鍵修正：如果是未登入者，直接將狀態設為訪客，不要去呼叫 signInAnonymously()
                        setUser(null);
                        setIsAdmin(false);
                    }
                    setLoading(false); // 結束載入狀態
                });
                return () => unsubscribe();
            }, []);

            // 2. 載入傳送門清單 (僅限管理員)
            useEffect(() => {
                if (!user || !isAdmin) return;
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'links'), orderBy('createdAt', 'desc'));
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setPortals(data);
                });
                return () => unsubscribe();
            }, [user, isAdmin]);

            // --- 使用者操作邏輯 (所有人皆可操作) ---
            const handleRetrieve = async (e) => {
                e.preventDefault();
                if (!accessCode.trim()) return;
                setRetrieveError('');
                setRetrievedPortal(null);
                setShowQRFor(null);

                try {
                    // 根據密碼搜尋對應的專案
                    const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'links'), where("password", "==", accessCode.trim()));
                    const snap = await getDocs(q);
                    
                    if (snap.empty) {
                        setRetrieveError("⚠️ 密碼錯誤或傳送門已失效");
                    } else {
                        setRetrievedPortal({ id: snap.docs[0].id, ...snap.docs[0].data() });
                        setAccessCode('');
                    }
                } catch (error) {
                    console.error("讀取錯誤：", error);
                    setRetrieveError("系統讀取失敗。若您是訪客，請確認資料庫開放了讀取權限。");
                }
            };

            // --- 管理員操作邏輯 ---
            const handleAddItem = () => {
                setAdminForm(prev => ({
                    ...prev,
                    items: [...prev.items, { note: '', url: '' }]
                }));
            };

            const handleRemoveItem = (index) => {
                setAdminForm(prev => ({
                    ...prev,
                    items: prev.items.filter((_, i) => i !== index)
                }));
            };

            const handleItemChange = (index, field, value) => {
                const newItems = [...adminForm.items];
                newItems[index][field] = value;
                setAdminForm({ ...adminForm, items: newItems });
            };

            const handleAdminSubmit = async (e) => {
                e.preventDefault();
                if (!adminForm.projectName.trim()) return alert("請輸入專案名稱");
                if (!adminForm.password.trim()) return alert("請輸入提取密碼");
                
                const validItems = adminForm.items.filter(item => item.url.trim() !== '').map(item => ({
                    note: item.note.trim() || '未命名連結',
                    url: item.url.trim().startsWith('http') ? item.url.trim() : `https://${item.url.trim()}`
                }));

                if (validItems.length === 0) return alert("請至少提供一個有效的網址");

                try {
                    setLoading(true);
                    
                    // 檢查密碼是否重複
                    if (!isEditing) {
                        const checkQ = query(collection(db, 'artifacts', appId, 'public', 'data', 'links'), where("password", "==", adminForm.password.trim()));
                        const checkSnap = await getDocs(checkQ);
                        if (!checkSnap.empty) {
                            setLoading(false);
                            return alert("此密碼已被使用，請更換一個");
                        }
                    }

                    const payload = {
                        projectName: adminForm.projectName.trim(),
                        password: adminForm.password.trim(),
                        items: validItems,
                        updatedAt: new Date().toISOString()
                    };

                    if (isEditing && editId) {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'links', editId), payload);
                        alert("專案已更新！");
                    } else {
                        payload.createdAt = new Date().toISOString();
                        payload.authorId = user.uid;
                        payload.authorEmail = user.email;
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'links'), payload);
                        alert("專案建立成功！");
                    }

                    setAdminForm({ projectName: '', password: '', items: [{ note: '', url: '' }] });
                    setIsEditing(false);
                    setEditId(null);
                } catch (error) {
                    console.error(error);
                    alert("儲存失敗，請檢查權限");
                } finally {
                    setLoading(false);
                }
            };

            const startEdit = (portal) => {
                setAdminForm({
                    projectName: portal.projectName || '',
                    password: portal.password,
                    items: portal.items.length > 0 ? portal.items : [{ note: '', url: '' }]
                });
                setIsEditing(true);
                setEditId(portal.id);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const cancelEdit = () => {
                setAdminForm({ projectName: '', password: '', items: [{ note: '', url: '' }] });
                setIsEditing(false);
                setEditId(null);
            };

            const handleDelete = async (id) => {
                if (confirm("確定要徹底銷毀這個傳送門專案嗎？此操作無法復原。")) {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'links', id));
                }
            };

            // 畫面載入中
            if (loading) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center">
                        <i className="fa-solid fa-circle-notch fa-spin text-4xl text-[#00f3ff] mb-4"></i>
                        <p className="text-[#00f3ff] font-bold tracking-widest">系統連線中...</p>
                    </div>
                );
            }

            // 主畫面渲染
            return (
                <div className="w-full max-w-5xl mx-auto px-4 py-8 md:py-12 relative z-10 flex flex-col items-center">
                    
                    {/* Header */}
                    <div className="w-full flex justify-between items-center mb-10">
                        <a href={user ? "vip_area.html" : "index.html"} className="text-[#00f3ff] hover:text-white transition-colors font-bold flex items-center gap-2">
                            <i className="fa-solid fa-chevron-left"></i> {user ? '返回星員區' : '返回首頁'}
                        </a>
                        <div className="text-right">
                            {isAdmin ? 
                                <span className="bg-[#FFD700] text-black px-3 py-1 rounded-full text-xs font-bold"><i className="fa-solid fa-shield-halved"></i> 管理員模式</span> : 
                                (user ? 
                                    <span className="bg-[rgba(255,255,255,0.1)] text-gray-300 px-3 py-1 rounded-full text-xs font-bold"><i className="fa-solid fa-user-astronaut"></i> 一般星員</span> :
                                    <span className="bg-gray-700 text-white px-3 py-1 rounded-full text-xs font-bold"><i className="fa-solid fa-user-secret"></i> 訪客</span>
                                )
                            }
                        </div>
                    </div>

                    <div className="text-center mb-12">
                        <h1 className="text-4xl md:text-5xl font-black mb-3 text-transparent bg-clip-text bg-gradient-to-r from-white to-[#00f3ff] drop-shadow-[0_0_15px_rgba(0,243,255,0.5)]">
                            網址傳送門
                        </h1>
                        <p className="text-gray-400 tracking-widest text-sm md:text-base uppercase">Secure URL Portal System</p>
                    </div>

                    {/* 提取區 (所有人：包含訪客皆可使用) */}
                    <div className="glass-card w-full max-w-xl rounded-3xl p-8 mb-12 relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-[#00f3ff] to-transparent opacity-50"></div>
                        
                        <h2 className="text-2xl font-bold text-[#00f3ff] mb-6 flex items-center justify-center gap-3">
                            <i className="fa-solid fa-unlock-keyhole"></i> 提取專案資源
                        </h2>
                        
                        <form onSubmit={handleRetrieve} className="flex flex-col gap-4">
                            <div className="relative">
                                <i className="fa-solid fa-key absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                <input 
                                    type="text" 
                                    placeholder="請輸入傳送密碼..." 
                                    value={accessCode}
                                    onChange={(e) => setAccessCode(e.target.value)}
                                    className="cyber-input w-full py-4 pl-12 pr-4 rounded-xl text-lg text-center tracking-widest"
                                    autoComplete="off"
                                />
                            </div>
                            {retrieveError && <p className="text-[#ff4757] font-bold text-center animate-pulse">{retrieveError}</p>}
                            <button type="submit" className="w-full py-4 rounded-xl bg-gradient-to-r from-[#00f3ff] to-[#bc13fe] text-white font-bold text-lg hover:shadow-[0_0_20px_rgba(0,243,255,0.4)] transition-all active:scale-95">
                                <i className="fa-solid fa-rocket mr-2"></i> 啟動傳送
                            </button>
                        </form>

                        {/* 提取結果顯示 */}
                        {retrievedPortal && (
                            <div className="mt-8 pt-8 border-t border-[rgba(255,255,255,0.1)] animate-in fade-in slide-in-from-bottom-4">
                                <div className="flex flex-col items-center justify-center gap-2 mb-6">
                                    <div className="flex items-center gap-2">
                                        <span className="w-3 h-3 rounded-full bg-[#00ff9d] animate-ping"></span>
                                        <h3 className="text-xl font-bold text-[#00ff9d]">傳送門已開啟</h3>
                                    </div>
                                    <div className="text-2xl font-black text-[#FFD700] mt-2">
                                        📁 {retrievedPortal.projectName || '未命名專案'}
                                    </div>
                                </div>
                                
                                <div className="space-y-4">
                                    {retrievedPortal.items.map((item, idx) => (
                                        <div key={idx} className="bg-[rgba(0,0,0,0.3)] border border-[rgba(255,255,255,0.1)] rounded-xl p-5 hover:border-[#00f3ff] transition-colors">
                                            <div className="font-bold text-white text-lg mb-1">{item.note}</div>
                                            <div className="text-gray-400 text-sm break-all mb-4">{item.url}</div>
                                            
                                            <div className="flex flex-wrap gap-3">
                                                <a href={item.url} target="_blank" rel="noopener noreferrer" className="flex-1 bg-[#00f3ff] text-black font-bold py-2 px-4 rounded-lg flex justify-center items-center gap-2 hover:bg-white transition-colors">
                                                    <i className="fa-solid fa-arrow-up-right-from-square"></i> 直接開啟
                                                </a>
                                                <button 
                                                    onClick={() => setShowQRFor(showQRFor === idx ? null : idx)}
                                                    className="flex-1 bg-[rgba(255,255,255,0.1)] text-white font-bold py-2 px-4 rounded-lg flex justify-center items-center gap-2 hover:bg-[rgba(255,255,255,0.2)] transition-colors"
                                                >
                                                    <i className="fa-solid fa-qrcode"></i> {showQRFor === idx ? '隱藏 QR' : '顯示 QR Code'}
                                                </button>
                                            </div>

                                            {/* QR Code 顯示區 */}
                                            {showQRFor === idx && (
                                                <div className="mt-4 p-4 bg-white rounded-xl flex flex-col items-center animate-in zoom-in">
                                                    <img 
                                                        src={`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(item.url)}`} 
                                                        alt="QR Code" 
                                                        className="w-40 h-40"
                                                    />
                                                    <p className="text-black text-xs mt-2 font-bold text-center">掃描上方條碼立即前往</p>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>

                    {/* 管理員控制台 (僅限 Admin) */}
                    {isAdmin && (
                        <div className="w-full">
                            <div className="flex items-center gap-4 mb-6 opacity-80">
                                <div className="h-[1px] flex-1 bg-gradient-to-r from-transparent to-[#FFD700]"></div>
                                <h2 className="text-xl font-bold text-[#FFD700]"><i className="fa-solid fa-user-shield"></i> 管理員控制台</h2>
                                <div className="h-[1px] flex-1 bg-gradient-to-l from-transparent to-[#FFD700]"></div>
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
                                {/* 左側：新增/編輯表單 */}
                                <div className="glass-card rounded-3xl p-6 md:p-8 border-[#FFD700]">
                                    <h3 className="text-xl font-bold mb-6 text-white flex justify-between items-center">
                                        <span>{isEditing ? '編輯專案' : '建立新專案'}</span>
                                        {isEditing && <button onClick={cancelEdit} className="text-sm bg-[rgba(255,255,255,0.1)] px-3 py-1 rounded-full text-gray-300 hover:text-white"><i className="fa-solid fa-xmark"></i> 取消</button>}
                                    </h3>
                                    
                                    <form onSubmit={handleAdminSubmit}>
                                        <div className="mb-4">
                                            <label className="block text-sm font-bold text-[#FFD700] mb-2">1. 專案名稱</label>
                                            <input 
                                                type="text" 
                                                required
                                                placeholder="例：國小機器人營隊資料" 
                                                value={adminForm.projectName}
                                                onChange={(e) => setAdminForm({...adminForm, projectName: e.target.value})}
                                                className="cyber-input w-full py-3 px-4 rounded-lg"
                                            />
                                        </div>

                                        <div className="mb-6">
                                            <label className="block text-sm font-bold text-[#FFD700] mb-2">2. 設定提取密碼</label>
                                            <input 
                                                type="text" 
                                                required
                                                placeholder="中英文皆可，建議簡短好記" 
                                                value={adminForm.password}
                                                onChange={(e) => setAdminForm({...adminForm, password: e.target.value})}
                                                className="cyber-input w-full py-3 px-4 rounded-lg"
                                            />
                                        </div>

                                        <div className="mb-6">
                                            <label className="block text-sm font-bold text-[#FFD700] mb-2">3. 設定連結項目</label>
                                            
                                            <div className="space-y-4">
                                                {adminForm.items.map((item, index) => (
                                                    <div key={index} className="flex gap-2 items-start bg-[rgba(0,0,0,0.3)] p-3 rounded-lg border border-[rgba(255,255,255,0.05)] relative">
                                                        <div className="flex-1 space-y-2">
                                                            <input 
                                                                type="text" 
                                                                placeholder="連結名稱 (例: 雲端講義)" 
                                                                value={item.note}
                                                                onChange={(e) => handleItemChange(index, 'note', e.target.value)}
                                                                className="cyber-input w-full py-2 px-3 rounded-md text-sm"
                                                            />
                                                            <input 
                                                                type="text" 
                                                                required
                                                                placeholder="網址 (https://...)" 
                                                                value={item.url}
                                                                onChange={(e) => handleItemChange(index, 'url', e.target.value)}
                                                                className="cyber-input w-full py-2 px-3 rounded-md text-sm font-mono"
                                                            />
                                                        </div>
                                                        {adminForm.items.length > 1 && (
                                                            <button type="button" onClick={() => handleRemoveItem(index)} className="text-[#ff4757] hover:bg-[rgba(255,71,87,0.1)] p-2 rounded-md transition-colors mt-1">
                                                                <i className="fa-solid fa-trash"></i>
                                                            </button>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                            
                                            <button type="button" onClick={handleAddItem} className="mt-3 w-full py-2 border border-dashed border-[#00f3ff] text-[#00f3ff] rounded-lg font-bold hover:bg-[rgba(0,243,255,0.1)] transition-colors">
                                                <i className="fa-solid fa-plus"></i> 新增一個網址項目
                                            </button>
                                        </div>

                                        <button type="submit" disabled={loading} className="w-full py-3 bg-[#FFD700] text-black font-black text-lg rounded-xl hover:shadow-[0_0_20px_rgba(255,215,0,0.5)] transition-all active:scale-95 disabled:opacity-50">
                                            {loading ? <i className="fa-solid fa-spinner fa-spin"></i> : (isEditing ? '儲存變更' : '發佈專案')}
                                        </button>
                                    </form>
                                </div>

                                {/* 右側：現有清單 */}
                                <div className="glass-card rounded-3xl p-6 md:p-8 flex flex-col max-h-[600px]">
                                    <h3 className="text-xl font-bold mb-4 text-white">
                                        <i className="fa-solid fa-database text-[#00f3ff]"></i> 已建立的專案 ({portals.length})
                                    </h3>
                                    
                                    <div className="overflow-y-auto pr-2 space-y-4 flex-1">
                                        {portals.length === 0 ? (
                                            <div className="text-center text-gray-500 py-10">尚無資料</div>
                                        ) : (
                                            portals.map(portal => (
                                                <div key={portal.id} className={`bg-[rgba(0,0,0,0.4)] p-4 rounded-xl border-l-4 ${editId === portal.id ? 'border-[#FFD700] bg-[rgba(255,215,0,0.05)]' : 'border-[#00f3ff]'} relative group`}>
                                                    <div className="absolute top-4 right-4 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                                        <button onClick={() => startEdit(portal)} className="w-8 h-8 rounded-full bg-blue-500/20 text-blue-400 flex items-center justify-center hover:bg-blue-500 hover:text-white transition-colors" title="編輯">
                                                            <i className="fa-solid fa-pen text-xs"></i>
                                                        </button>
                                                        <button onClick={() => handleDelete(portal.id)} className="w-8 h-8 rounded-full bg-red-500/20 text-red-400 flex items-center justify-center hover:bg-red-500 hover:text-white transition-colors" title="刪除">
                                                            <i className="fa-solid fa-trash text-xs"></i>
                                                        </button>
                                                    </div>

                                                    <div className="text-lg font-bold text-[#FFD700] mb-2 pr-16">{portal.projectName || '未命名專案'}</div>

                                                    <div className="flex items-center gap-2 mb-3">
                                                        <i className="fa-solid fa-key text-gray-400 text-sm"></i>
                                                        <span className="font-mono bg-white text-black px-2 py-0.5 rounded font-bold">{portal.password}</span>
                                                    </div>
                                                    
                                                    <div className="text-sm text-gray-400 mt-2 space-y-1">
                                                        {portal.items.map((item, i) => (
                                                            <div key={i} className="truncate">
                                                                <span className="text-gray-300 font-bold mr-1">{item.note}:</span>
                                                                <a href={item.url} target="_blank" className="hover:text-[#00f3ff] transition-colors">{item.url}</a>
                                                            </div>
                                                        ))}
                                                    </div>
                                                    <div className="flex justify-between items-center mt-3 pt-3 border-t border-[rgba(255,255,255,0.05)]">
                                                        <div className="text-xs text-gray-500"><i className="fa-solid fa-user"></i> {portal.authorEmail || '未知發佈者'}</div>
                                                        <div className="text-xs text-gray-600">
                                                            {portal.updatedAt ? '更新於 ' : '建立於 '}{portal.updatedAt?.split('T')[0] || portal.createdAt?.split('T')[0]}
                                                        </div>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
