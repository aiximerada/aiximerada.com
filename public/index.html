    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230f172a'/%3E%3Cpolygon points='50,10 61,35 88,35 67,52 75,79 50,65 25,79 33,52 12,35 39,35' fill='%2300f3ff' stroke='%23fff' stroke-width='2' stroke-linejoin='round'/%3E%3C/svg%3E">

    <!-- 🔥 DNS 預先連線與模組預載：大幅縮短手機端載入時間 -->
    <link rel="preconnect" href="https://unpkg.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js">
    <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js">

    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --main-gold: #FFD700;
            --accent-amber: #FDB931;
            --deep-space: #0f172a;
            --suisei-cyan: #3bc6e4;
            --neon-green: #00ff9d;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            color: #fff;
            min-height: 100vh; margin: 0;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none; 
        }

        /* --- ✨ 星空背景特效 (加入 GPU 硬體加速) --- */
        .space-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; pointer-events: none; }
        .star-field { 
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background-repeat: repeat; opacity: 0.5; 
            animation-timing-function: linear; animation-iteration-count: infinite;
            will-change: transform; /* 🔥 強制 GPU 渲染 */
            transform: translateZ(0); 
        }
        
        .stars-distant {
            background-image: radial-gradient(1px 1px at 10% 15%, #fff, transparent), radial-gradient(1px 1px at 30% 60%, #ddd, transparent), radial-gradient(1px 1px at 70% 20%, #eee, transparent);
            background-size: 300px 300px; animation-name: rotateSpace; animation-duration: 240s;
        }
        
        .stars-mid {
            background-image: radial-gradient(1.5px 1.5px at 25% 10%, #fff, transparent), radial-gradient(1.5px 1.5px at 60% 35%, #eef, transparent);
            background-size: 400px 400px; opacity: 0.6; animation-name: rotateSpace; animation-duration: 180s; animation-direction: reverse;
        }
        
        .gold-twinklers {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(2px 2px at 20% 30%, var(--main-gold), transparent), radial-gradient(3px 3px at 65% 25%, #fff59d, transparent);
            background-size: 100% 100%; opacity: 0; animation: occasionalFlash 12s ease-in-out infinite;
            will-change: opacity; /* 🔥 強制 GPU 渲染 */
            transform: translateZ(0);
        }

        @keyframes rotateSpace { from { transform: rotate(0deg) translateZ(0); } to { transform: rotate(360deg) translateZ(0); } }
        @keyframes occasionalFlash { 0%, 40%, 100% { opacity: 0; } 55% { opacity: 1; filter: brightness(2) blur(1px); } 85% { opacity: 0; } }

        /* --- 啟動畫面 --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #090A0F; display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 999999; color: var(--suisei-cyan); transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .splash-icon { font-size: 4.5rem; margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(59,198,228,0.6)); animation: pulseStar 1.5s infinite alternate ease-in-out; }
        @keyframes pulseStar { 0% { transform: scale(0.9) translateY(0); opacity: 0.8; } 100% { transform: scale(1.1) translateY(-10px); opacity: 1; filter: drop-shadow(0 0 25px rgba(59,198,228,1)); } }

        /* --- 主內容 --- */
        header { text-align: center; padding: calc(80px + env(safe-area-inset-top)) 20px 40px; position: relative; z-index: 1; }
        h1 { font-size: 3.5rem; margin: 0; text-shadow: 0 0 25px var(--suisei-cyan); font-weight: 900; letter-spacing: 2px; }
        
        .portal-wrapper {
            width: 100%; max-width: 1000px; padding: 20px;
            display: flex; flex-direction: column; gap: 30px;
            flex-grow: 1; justify-content: center; position: relative; z-index: 1;
            padding-bottom: calc(40px + env(safe-area-inset-bottom));
        }
        .portal-split { display: flex; gap: 30px; width: 100%; min-height: 260px; }
        
        /* 卡片樣式優化 */
        .portal-card {
            flex: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            text-decoration: none; color: #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            will-change: transform; /* 🔥 強制 GPU 渲染 */
            transform: translateZ(0);
        }
        
        .portal-card:hover { 
            transform: translateY(-8px) translateZ(0); 
            background: rgba(59, 198, 228, 0.15); 
            border-color: var(--suisei-cyan); 
            box-shadow: 0 20px 50px rgba(59, 198, 228, 0.3); 
        }
        .portal-card:active { transform: scale(0.96) translateZ(0); }
        
        .portal-card i { font-size: 4rem; color: var(--suisei-cyan); margin-bottom: 20px; transition: 0.4s; filter: drop-shadow(0 0 10px rgba(59,198,228,0.5)); }
        .portal-card:hover i { transform: scale(1.1) rotate(10deg); color: #fff; }
        
        .portal-title { font-size: 2rem; font-weight: bold; letter-spacing: 5px; }

        /* 車位回報卡片特別樣式 */
        .parking-portal { 
            background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(254, 243, 199, 0.9) 100%); 
            color: #0b1021; min-height: 220px; flex-direction: row; justify-content: space-between; padding: 0 80px; 
        }
        .parking-portal:hover { transform: translateY(-8px) translateZ(0); box-shadow: 0 0 60px rgba(245, 158, 11, 0.5); border-color: #fff; background: #fff; }
        .parking-portal:active { transform: scale(0.96) translateZ(0); }
        .parking-portal i { color: #0b1021; font-size: 5rem; order: 2; filter: none; }
        .parking-portal:hover i { color: #f59e0b; transform: scale(1.1) rotate(-10deg); }
        .parking-info { order: 1; text-align: left; }
        .parking-info h2 { font-size: 2.8rem; margin: 0; font-weight: 900; letter-spacing: 5px; } 
        .parking-info p { font-size: 1.1rem; margin: 10px 0 0 0; color: #4b5563; font-weight: bold; letter-spacing: 2px; }

        @media (max-width: 768px) {
            .portal-split { flex-direction: column; min-height: auto; }
            .portal-card { min-height: 200px; }
            .parking-portal { padding: 30px; flex-direction: column-reverse; text-align: center; }
            .parking-portal i { margin-bottom: 20px; order: 1; }
            .parking-info { order: 2; text-align: center; }
        }

        /* 浮動按鈕 */
        #admin-fab-container { position: fixed; bottom: calc(40px + env(safe-area-inset-bottom)); right: 30px; z-index: 9999; }
        .fab-btn { 
            width: 65px; height: 65px; border-radius: 50%; 
            background: var(--suisei-cyan); border: none; color: #fff; 
            font-size: 1.6rem; cursor: pointer; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center;
        }
        .fab-btn:hover { transform: scale(1.15) rotate(15deg); box-shadow: 0 0 30px var(--suisei-cyan); }
        .fab-btn:active { transform: scale(0.9); }
        
        .fab-btn.logged-in {
            background: linear-gradient(135deg, var(--neon-green), #059669);
            color: #0b1021;
        }
        .fab-btn.logged-in:hover { box-shadow: 0 0 30px var(--neon-green); }
    </style>
</head>
<body>

    <!-- 🔥 極速啟動畫面 -->
    <div id="splash-screen">
        <i class="fa-solid fa-rocket splash-icon"></i>
        <h2 style="font-size: 1.8rem; font-weight: 900; letter-spacing: 4px; margin:0;">玉露寶庫</h2>
        <p style="color: #94a3b8; font-size: 0.9rem; mt-2; letter-spacing: 2px;">系統引擎啟動中...</p>
    </div>

    <div class="space-container">
        <div class="star-field stars-distant"></div>
        <div class="star-field stars-mid"></div>
        <div class="gold-twinklers"></div>
    </div>
    
    <header>
        <h1><span id="typed-title"></span></h1>
    </header>

    <main class="portal-wrapper">
        <div class="portal-split">
            <a href="entertainment.html" class="portal-card" data-aos="fade-right">
                <i class="fa-solid fa-gamepad"></i>
                <div class="portal-title">娛樂</div>
            </a>
            
            <a href="tools.html" class="portal-card" data-aos="fade-left">
                <i class="fa-solid fa-screwdriver-wrench"></i>
                <div class="portal-title">工具</div>
            </a>
        </div>
        
        <!-- 重機停車專屬入口 -->
        <a href="車位回報.html" class="portal-card parking-portal" data-aos="fade-up">
            <div class="parking-info">
                <h2>重機停車</h2>
                <p>全台友善停車地圖</p>
            </div>
            <i class="fa-solid fa-motorcycle"></i>
        </a>
    </main>

    <div id="admin-fab-container">
        <button id="authBtn" class="fab-btn" onclick="checkAuthRedirect()" title="會員系統">
            <i class="fa-solid fa-right-to-bracket"></i>
        </button>
    </div>

    <!-- 🔥 延遲載入 (Defer) 外部套件，防止阻擋畫面繪製 -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js" defer></script>
    <script src="https://unpkg.com/typed.js@2.0.16/dist/typed.umd.js" defer></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // 🔥 Config
        const firebaseConfig = {
            apiKey: "AIzaSyAAo6on0f2QUbPaRfxpIEb2uvhKxDvPUvs",
            authDomain: "yulubox.firebaseapp.com",
            projectId: "yulubox",
            storageBucket: "yulubox.firebasestorage.app",
            messagingSenderId: "256466567852",
            appId: "1:256466567852:web:233b74668908ffcb9b9509",
            measurementId: "G-YPCY41EKWX"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        const authBtn = document.getElementById('authBtn');
        let isUserLoggedIn = false;

        // 偵測是否已登入
        onAuthStateChanged(auth, (user) => {
            if (user && !user.isAnonymous) {
                isUserLoggedIn = true;
                authBtn.innerHTML = '<i class="fa-solid fa-crown"></i>';
                authBtn.classList.add('logged-in');
                authBtn.title = "進入會員專區";
            } else {
                isUserLoggedIn = false;
                authBtn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i>';
                authBtn.classList.remove('logged-in');
                authBtn.title = "會員登入";
            }
        });

        // 按鈕點擊行為
        window.checkAuthRedirect = function() {
            if (isUserLoggedIn) {
                window.location.href = 'vip_area.html';
            } else {
                window.location.href = 'login.html';
            }
        }

        // 🔥 當 DOM 載入完成，移除啟動畫面並初始化動畫
        window.addEventListener('load', () => {
            const splash = document.getElementById('splash-screen');
            if(splash) {
                splash.style.opacity = '0';
                setTimeout(() => splash.remove(), 600); // 動畫結束後徹底從 DOM 移除，釋放記憶體
            }

            AOS.init({ duration: 800, once: true });
            
            new Typed('#typed-title', {
                strings: ['玉露寶庫'], 
                typeSpeed: 100,      
                loop: false,         
                showCursor: false,    
                onComplete: function(self) { self.cursor.remove(); }
            });
        });
    </script>
</body>
</html>
